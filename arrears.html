<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Simtec — Arrears Overview</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2.38.4/dist/umd/supabase.js"></script>
<style>
body{font-family:system-ui,sans-serif}
.card{background:#1e293b;border:1px solid #334155;border-radius:.75rem;padding:1.1rem 1.25rem}
.lbl{font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;color:#c9a84c;font-weight:700}
.k{color:#7c8aa0;font-size:.75rem}
.v{color:#e6edf6;font-size:.9rem;font-weight:600}
.sq{width:10px;height:10px;border-radius:2px;display:inline-block}
.btn{padding:.4rem .8rem;border-radius:.5rem;font-size:.8rem;font-weight:600;cursor:pointer;border:1px solid #334155;background:#1e293b;color:#94a3b8}
.btn.on{background:#c9a84c;color:#1a2438;border-color:#c9a84c}
.arr:hover{background:#243049}
@media print{.noprint{display:none!important}body{background:#fff;color:#000}.card{border-color:#ccc}}
</style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

<nav class="bg-slate-900 border-b border-slate-800 px-6 py-3 flex items-center gap-3 noprint">
  <span class="font-bold tracking-wide text-lg">SIMTEC</span>
  <span class="text-slate-400 text-sm">Arrears Overview</span>
</nav>

<div class="max-w-6xl mx-auto p-6">
  <div id="summary" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5"></div>

  <div class="flex flex-wrap items-center gap-2 mb-4 noprint">
    <span class="text-xs text-slate-500 mr-1">Sort</span>
    <button class="btn" data-sort="weeks">Weeks behind</button>
    <button class="btn" data-sort="arrears">Amount behind</button>
    <button class="btn" data-sort="name">Name</button>
    <span class="w-px h-5 bg-slate-700 mx-1"></span>
    <span class="text-xs text-slate-500 mr-1">Show</span>
    <button class="btn" data-filter="all">All in arrears</button>
    <button class="btn" data-filter="red">3+ weeks only</button>
    <button class="btn ml-auto" onclick="window.print()">🖨 Print</button>
  </div>

  <div id="list"></div>
  <div id="state" class="text-center text-slate-500 py-20">Loading arrears…</div>

  <div class="mt-5 flex flex-wrap gap-4 text-xs text-slate-500 noprint">
    <span><span class="sq" style="background:#1faa5a"></span> Paid</span>
    <span><span class="sq" style="background:#e0a010"></span> Late — recovered</span>
    <span><span class="sq" style="background:#dc2626"></span> Missed / overdue</span>
    <span><span class="sq" style="background:#475569"></span> Upcoming</span>
  </div>
</div>

<script>
const SUPABASE_URL='https://jvqjoenaungubpoegyvf.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2cWpvZW5hdW5ndWJwb2VneXZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MzQyMjYsImV4cCI6MjA5NjExMDIyNn0.ypVt8578XTdNwBH6TRDn30s1cF_rHTu67qCWYv5XHcQ';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const $=id=>document.getElementById(id);
const DAY=86400000;
const today=new Date();today.setHours(12,0,0,0);
const fmt=n=>'$'+(+n||0).toLocaleString('en-NZ',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD=d=>d?new Date(d+'T12:00:00').toLocaleDateString('en-NZ',{day:'2-digit',month:'short',year:'numeric'}):'—';
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const titleCase=s=>(s||'').replace(/_/g,' ').replace(/\b\w/g,m=>m.toUpperCase());

// ── Payment maths (same rules as the client page) ──────────────────────────
function analyse(order,pays){
  const first=order.first_payment_date;
  const total=order.instalment_count||156;
  const wkOf=d=>first?Math.round((new Date(d+'T12:00:00')-new Date(first+'T12:00:00'))/(7*DAY))+1:0;
  const dueDate=w=>first?new Date(new Date(first+'T12:00:00').getTime()+(w-1)*7*DAY):null;
  let paid=0;const wk={};
  for(const p of pays){
    if(p.direction==='debit'&&p.status==='successful')paid+=(+p.amount||0);
    if(p.direction==='refund'&&p.status==='successful')paid-=(+p.amount||0);
    const w=wkOf(p.payment_date);if(w<1)continue;
    if(p.recovers_payment_id)continue;
    if(p.status==='successful'){if(wk[w]!=='amber')wk[w]='green';}
    else if(p.status==='failed'){if(!wk[w])wk[w]='failed';}
  }
  for(const p of pays){
    if(!p.recovers_payment_id)continue;
    const failed=pays.find(x=>x.payment_id===p.recovers_payment_id);
    const w=wkOf((failed&&failed.payment_date)||p.payment_date);
    if(w>=1)wk[w]='amber';
  }
  let redCount=0,amberCount=0;const cells=[];
  for(let w=1;w<=total;w++){
    const due=dueDate(w);const past=due&&due<today;
    let st=wk[w],cls,label;
    if(st==='green'){cls='#1faa5a';label='Paid';}
    else if(st==='amber'){cls='#e0a010';label='Late — recovered';amberCount++;}
    else if(st==='failed'){if(past){cls='#dc2626';label='Missed';redCount++;}else{cls='#475569';label='Upcoming';}}
    else{cls='#475569';label='Upcoming';}
    cells.push({w,cls,label,due});
  }
  const contract=+order.contract_value||0;
  const pct=contract?paid/contract*100:0;
  return {paid,contract,balance:contract-paid,pct,cells,redCount,amberCount,total};
}

// ── State ──────────────────────────────────────────────────────────────────
let rows=[], sortBy='weeks', filter='all';

async function load(){
  const {data:orders,error}=await sb.from('sim_orders')
    .select('*, sim_customers(*), sim_order_items(product_name,quantity), sim_payment_events(*)')
    .eq('order_status','active');
  if(error){$('state').innerHTML=`<span class="text-red-400">${esc(error.message)}</span>`;return;}
  rows=[];
  for(const o of (orders||[])){
    const pays=o.sim_payment_events||[];
    const a=analyse(o,pays);
    if(a.redCount<1)continue;                       // only customers actually behind
    const inst=+o.instalment_amount||(a.total?a.contract/a.total:0);
    const lastPaid=pays.filter(p=>p.direction==='debit'&&p.status==='successful')
                       .map(p=>p.payment_date).sort().pop();
    const cust=o.sim_customers||{};
    const product=(o.sim_order_items||[]).map(i=>i.product_name).filter(Boolean).join(', ')||'—';
    rows.push({
      custId:cust.id||o.customer_id,
      name:`${cust.first_name||''} ${cust.last_name||''}`.trim()||'(no name)',
      mobile:cust.mobile||'', product,
      consultant:o.consultant_name||'',
      weeks:a.redCount, arrears:a.redCount*inst, amber:a.amberCount,
      paid:a.paid, contract:a.contract, balance:a.balance, pct:a.pct,
      lastPaid, delivered:o.delivery_status==='delivered', deliveryStatus:o.delivery_status||'pending',
      cells:a.cells
    });
  }
  render();
}

function render(){
  $('state').classList.add('hidden');
  document.querySelectorAll('[data-sort]').forEach(b=>b.classList.toggle('on',b.dataset.sort===sortBy));
  document.querySelectorAll('[data-filter]').forEach(b=>b.classList.toggle('on',b.dataset.filter===filter));

  let view=rows.slice();
  if(filter==='red')view=view.filter(r=>r.weeks>=3);
  view.sort((a,b)=> sortBy==='name'?a.name.localeCompare(b.name)
                  : sortBy==='arrears'?b.arrears-a.arrears
                  : b.weeks-a.weeks || b.arrears-a.arrears);

  // summary (over the filtered view)
  const totArr=view.reduce((s,r)=>s+r.arrears,0);
  const totBal=view.reduce((s,r)=>s+r.balance,0);
  const custs=new Set(view.map(r=>r.name)).size;
  const stat=(lbl,val,tone)=>`<div class="card"><div class="lbl">${lbl}</div><div class="text-2xl font-bold ${tone||''} mt-1">${val}</div></div>`;
  $('summary').innerHTML=
    stat('In arrears', view.length, 'text-white')+
    stat('Customers', custs, 'text-white')+
    stat('Total behind', fmt(totArr), 'text-red-400')+
    stat('Outstanding balance', fmt(totBal), 'text-amber-300');

  if(!view.length){$('list').innerHTML=`<div class="text-center text-slate-500 py-16">🎉 No customers in arrears${filter==='red'?' by 3+ weeks':''}.</div>`;return;}

  $('list').innerHTML=view.map(r=>{
    const sev=r.weeks>=3?'#dc2626':'#e0a010';
    const strip=r.cells.filter(c=>c.due&&c.due<=today).slice(-24)
      .map(c=>`<span class="sq" style="background:${c.cls}" title="Week ${c.w} — ${c.label} (${fmtD(c.due.toISOString().slice(0,10))})"></span>`).join('');
    return `<div class="card arr mb-3" style="cursor:pointer" onclick="location.href='client.html?c=${r.custId}'" title="Open ${esc(r.name)}'s full history">
      <div class="flex flex-wrap items-start gap-4">
        <div class="flex-1 min-w-[180px]">
          <div class="flex items-center gap-2">
            <span class="font-semibold text-white">${esc(r.name)}</span>
            ${r.delivered?'<span class="text-[10px] px-1.5 py-0.5 rounded bg-red-900/50 text-red-300 font-semibold">DELIVERED</span>':'<span class="text-[10px] px-1.5 py-0.5 rounded bg-slate-700 text-slate-300">'+esc(titleCase(r.deliveryStatus))+'</span>'}
          </div>
          <div class="text-xs text-slate-500 mt-0.5">${esc(r.mobile)}</div>
          <div class="text-xs text-slate-400 mt-1">${esc(r.product)}</div>
          ${r.consultant?`<div class="text-xs text-slate-500 mt-1">Consultant: <span class="text-slate-300">${esc(r.consultant)}</span></div>`:''}
        </div>
        <div class="text-center px-2">
          <div class="k">Weeks behind</div>
          <div class="text-2xl font-bold" style="color:${sev}">${r.weeks}</div>
        </div>
        <div class="text-center px-2">
          <div class="k">Amount behind</div>
          <div class="text-lg font-bold text-red-400">${fmt(r.arrears)}</div>
        </div>
        <div class="text-right px-2 min-w-[130px]">
          <div class="k">Paid / Contract</div>
          <div class="v">${fmt(r.paid)} <span class="text-slate-500 font-normal">/ ${fmt(r.contract)}</span></div>
          <div class="k mt-1">${r.pct.toFixed(1)}% paid · bal ${fmt(r.balance)}</div>
          <div class="k mt-1">Last paid: ${fmtD(r.lastPaid)}</div>
        </div>
      </div>
      <div class="mt-3 flex items-center justify-between gap-3">
        <div class="flex flex-wrap gap-1">${strip}</div>
        <span class="text-xs text-yellow-500/80 whitespace-nowrap noprint">View full history →</span>
      </div>
    </div>`;
  }).join('');
}

document.querySelectorAll('[data-sort]').forEach(b=>b.onclick=()=>{sortBy=b.dataset.sort;render();});
document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{filter=b.dataset.filter;render();});

load();
</script>
</body>
</html>
