<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simtec — Disputes Tribunal Submission</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--navy:#122347;--gold:#c6a15b;--line:#c9d2de;}
  *{box-sizing:border-box}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#1a2334;background:#eef1f5;margin:0}
  .no-print{background:#122347;padding:10px 16px;display:flex;gap:8px;align-items:center;position:sticky;top:0;z-index:5}
  .no-print .brand{color:#fff;font-weight:700}
  .no-print .sp{margin-left:auto}
  button{background:#fff;color:var(--navy);border:1px solid #cbd4df;border-radius:8px;padding:9px 16px;font-weight:600;font-size:14px;cursor:pointer}
  button.solid{background:var(--gold);border-color:var(--gold);color:#1a1a1a}
  .page{max-width:820px;margin:16px auto;background:#fff;padding:34px 44px;border:1px solid var(--line)}
  h1{font-size:20px;color:var(--navy);margin:0 0 3px}
  .sub{font-size:12px;color:#5b6a80;margin-bottom:16px;border-bottom:2px solid var(--gold);padding-bottom:12px}
  h2{font-size:12.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--navy);margin:20px 0 8px;border-bottom:1px solid var(--line);padding-bottom:4px}
  .row{display:flex;gap:24px;flex-wrap:wrap}
  .f{margin:5px 0;flex:1;min-width:220px}
  .f .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:#7a8798}
  .f .v{font-size:14.5px;font-weight:600;border-bottom:1px solid var(--line);min-height:22px;padding:2px 0}
  p{font-size:13.5px;line-height:1.55}
  table{width:100%;border-collapse:collapse;margin-top:6px}
  th,td{border:1px solid var(--line);padding:6px 9px;text-align:left;font-size:12.5px;vertical-align:top}
  th{background:#f3f6fa;color:var(--navy);text-transform:uppercase;font-size:10.5px}
  .amt{font-size:20px;font-weight:800;color:var(--navy)}
  .chk{font-size:13px;line-height:1.9}
  .note{font-size:11px;color:#8a97a6;margin-top:6px}
  .warn{background:#fff8ec;border:1px solid #e6d3a8;border-radius:8px;padding:10px 13px;font-size:12px;color:#6b5518;margin:14px 0}
  @media print{ body{background:#fff} .no-print{display:none!important} .page{margin:0;border:none;max-width:100%;padding:8px 10px} @page{margin:14mm} }
</style>
</head>
<body>
<div class="no-print">
  <span class="brand">Disputes Tribunal Submission</span>
  <span class="sp"></span>
  <button onclick="location.href='further-action.html'">Back</button>
  <button class="solid" onclick="window.print()">🖨 Print / Save PDF</button>
</div>
<div id="out"><div class="page">Loading…</div></div>

<script>
const sb = supabase.createClient("https://jvqjoenaungubpoegyvf.supabase.co","sb_publishable_J4MYTdJJyEaWe-GadpwdYA_upPT2rKw");
const id = new URLSearchParams(location.search).get("id");
const esc=s=>(s||"").toString().replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const fmt=n=>"$"+(Math.round((n||0)*100)/100).toLocaleString();
const auDate=v=>{if(!v)return"—";const m=String(v).match(/^(\d{4})-(\d{2})-(\d{2})/);return m?m[3]+"/"+m[2]+"/"+m[1]:v;};
const dt=v=>{if(!v)return"";const d=new Date(v);return isNaN(d)?v:d.toLocaleString("en-NZ",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});};
const freqWord=f=>({weekly:"weekly",fortnightly:"fortnightly",monthly:"monthly"}[f]||"weekly");

async function run(){
  if(!id){ $out("<div class='page'>No case specified.</div>"); return; }
  const {data:o}=await sb.from("sim_orders").select("*").eq("id",id).single();
  if(!o){ $out("<div class='page'>Order not found.</div>"); return; }
  let c={}; if(o.customer_id){ const {data}=await sb.from("sim_customers").select("*").eq("id",o.customer_id).single(); c=data||{}; }
  const {data:items}=await sb.from("sim_order_items").select("product_name,quantity").eq("order_id",id);
  const {data:contacts}=await sb.from("debt_contacts").select("*").eq("order_id",id).order("contact_at",{ascending:true});

  const name=`${c.first_name||""} ${c.last_name||""}`.trim();
  const paid=+o.amount_paid_to_date||0, contract=+o.contract_value||0, bal=contract-paid;
  const prod=(items||[]).map(i=>`${i.product_name}${i.quantity>1?` ×${i.quantity}`:""}`).join(", ")||"a Simtec Therapeutic mattress";
  const delivered = o.delivery_status==="delivered" || o.delivery_status==="partial";

  const narrative =
    `The respondent entered into a credit sale agreement with the applicant on ${auDate(o.order_date)} for the purchase of ${esc(prod)}, `+
    `for a total contract price of ${fmt(contract)}, payable by ${freqWord(o.payment_frequency)} instalments via direct debit. `+
    (delivered?`The goods were delivered to the respondent on ${auDate(o.delivery_date)}. `:`` )+
    `The respondent has paid ${fmt(paid)} to date and has failed to maintain the agreed payments, leaving a balance of ${fmt(bal)} outstanding and due. `+
    `Under clause 9 of the applicant's Terms and Conditions of Sale (accepted by the respondent on execution of the order form), the respondent acknowledged that the full outstanding balance remains payable following delivery. `+
    `Despite the attempts to resolve the matter set out below, the respondent has failed to bring the account up to date or make satisfactory arrangements to do so.`;

  const contactRows = (contacts&&contacts.length)
    ? contacts.map(x=>`<tr><td class="whitespace-nowrap">${dt(x.contact_at)}</td><td>${esc(x.method)}</td><td>${esc(x.outcome)}</td><td>${esc(x.notes||"")}</td></tr>`).join("")
    : `<tr><td colspan="4" style="color:#8a97a6">No contact attempts recorded yet — log these before lodging, as the Tribunal requires evidence of attempts to resolve.</td></tr>`;

  document.getElementById("out").innerHTML=`
  <div class="page">
    <h1>Disputes Tribunal — Claim Details</h1>
    <div class="sub">Prepared from Simtec Therapeutic records — transcribe into the official Disputes Tribunal claim form (paper or online at disputestribunal.govt.nz)</div>

    <div class="warn"><b>Before lodging:</b> the Disputes Tribunal does not hear <i>undisputed</i> debt. Ensure the contact history below shows a genuine dispute or failure to resolve, and have this reviewed by your legal advisor. Claims must be brought within 6 years. Current claim limit is $60,000.</div>

    <h2>Applicant (the party making the claim)</h2>
    <div class="row">
      <div class="f"><div class="l">Name</div><div class="v">Simtec Therapeutic Limited</div></div>
      <div class="f"><div class="l">NZBN</div><div class="v">&nbsp;</div></div>
    </div>
    <div class="row">
      <div class="f"><div class="l">Address</div><div class="v">297 Neilsons Rd, Onehunga, Auckland</div></div>
      <div class="f"><div class="l">Phone</div><div class="v">09 886 9897</div></div>
    </div>
    <div class="row">
      <div class="f"><div class="l">Email</div><div class="v">&nbsp;</div></div>
      <div class="f"><div class="l">Nearest District Court</div><div class="v">Auckland</div></div>
    </div>

    <h2>Respondent (the party the claim is against)</h2>
    <div class="row">
      <div class="f"><div class="l">Full name</div><div class="v">${esc(name)||"&nbsp;"}</div></div>
      <div class="f"><div class="l">Phone</div><div class="v">${esc(c.mobile)||"&nbsp;"}</div></div>
    </div>
    <div class="row">
      <div class="f"><div class="l">Address</div><div class="v">${esc(o.delivery_address||c.address)||"&nbsp;"}</div></div>
      <div class="f"><div class="l">Email</div><div class="v">${esc(c.email)||"&nbsp;"}</div></div>
    </div>

    <h2>Second respondent (joint purchaser / co-signer, if any)</h2>
    <div class="note">Complete if the order form was signed by more than one purchaser — under the Terms of Sale, joint signatories are jointly and severally liable.</div>
    <div class="row">
      <div class="f"><div class="l">Full name</div><div class="v">&nbsp;</div></div>
      <div class="f"><div class="l">Phone</div><div class="v">&nbsp;</div></div>
    </div>
    <div class="f"><div class="l">Address</div><div class="v">&nbsp;</div></div>

    <h2>Amount claimed</h2>
    <div class="amt">${fmt(bal)}</div>
    <div class="note">Outstanding balance of the contract price. You may also claim reasonable recovery costs and the filing fee, per clause 9 of the Terms of Sale — add these on the official form.</div>

    <h2>Details of the dispute</h2>
    <p>${narrative}</p>

    <h2>Applicant's contact with the respondent (attempts to resolve)</h2>
    <table><thead><tr><th>Date &amp; time</th><th>Method</th><th>Outcome</th><th>Notes</th></tr></thead>
      <tbody>${contactRows}</tbody></table>

    <h2>Supporting documents to attach</h2>
    <div class="chk">
      ☐ Signed Sales Order Form &nbsp;&nbsp; ☐ Terms and Conditions of Sale<br>
      ☐ Payment history / statement of account &nbsp;&nbsp; ☐ Record of contact attempts (above)<br>
      ☐ Delivery docket / proof of delivery &nbsp;&nbsp; ☐ Any correspondence with the respondent
    </div>

    <div class="note" style="margin-top:20px">Generated by the Simtec system on ${new Date().toLocaleDateString("en-NZ")}. Figures drawn from the customer's account at time of generation. Not legal advice — confirm with your legal advisor before lodging.</div>
  </div>`;
}
function $out(h){document.getElementById("out").innerHTML=h;}
run();
</script>
</body>
</html>
