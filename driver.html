<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Simtec — Run Sheet</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2.38.4/dist/umd/supabase.js"></script>
<script src="auth.js?v=3" data-roles="admin,manager,office,driver"></script>
<style>
body{font-family:system-ui,sans-serif}
.card{background:#1e293b;border:1px solid #334155;border-radius:.9rem;padding:1.1rem 1.25rem}
.lbl{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:#c9a84c;font-weight:700}
.num{min-width:2.4rem;height:2.4rem;border-radius:.6rem;background:#0f172a;color:#c9a84c;font-weight:800;font-size:1.1rem;display:flex;align-items:center;justify-content:center}
.act{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;min-height:3rem;padding:0 1.1rem;border-radius:.7rem;font-size:1rem;font-weight:700;text-decoration:none;cursor:pointer;border:none}
.gold{background:#c9a84c;color:#1a2438}
.ghost{background:#0f172a;color:#7dd3fc;border:1px solid #334155}
.done{opacity:.55}
@media print{.noprint{display:none!important}body{background:#fff;color:#000}.card{border-color:#ccc}}
</style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

<nav class="bg-slate-900 border-b border-slate-800 px-5 py-3 flex items-center gap-3 noprint">
  <a href="home.html" style="color:#cbd5e1;text-decoration:none;font-size:.85rem;margin-right:8px">‹ Home</a><span class="font-bold tracking-wide text-lg">SIMTEC</span>
  <span class="text-slate-400 text-sm">Run sheet</span>
  <button class="act ghost ml-auto" style="min-height:2.4rem;font-size:.85rem" onclick="load()">↻ Refresh</button>
</nav>

<div class="max-w-2xl mx-auto p-4">
  <div id="head"></div>
  <div id="list"></div>
  <div id="done"></div>
  <div id="state" class="text-center text-slate-500 py-20">Loading today's run…</div>
</div>

<script>
const SUPABASE_URL='https://jvqjoenaungubpoegyvf.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2cWpvZW5hdW5ndWJwb2VneXZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MzQyMjYsImV4cCI6MjA5NjExMDIyNn0.ypVt8578XTdNwBH6TRDn30s1cF_rHTu67qCWYv5XHcQ';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const $=id=>document.getElementById(id);
const DAY=86400000;
const today=new Date();today.setHours(12,0,0,0);
const now=new Date();
const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const suburb=a=>{const p=(a||'').split(',');return (p[1]||p[0]||'').trim();};
const digits=s=>(s||'').replace(/[^0-9+]/g,'');

// Payment check used ONLY to hold back a stop that is no longer cleared.
// Nothing financial is ever shown on this screen.
let RULES=[];
function ruleFor(depositPct){
  let r=RULES[0]||{weekly:8,fortnightly:4,monthly:2,miss_allowed:1};
  for(const x of RULES){ if(depositPct*100 >= x.min_deposit_pct) r=x; }
  return r;
}
function cleared(o,payAcct,counts){
  if(o.order_status==='cancelled')return false;
  if(o.delivery_authorised===true) return true;                     // admin override
  const c=o.cooling_off_expires; const coolOk=c?new Date(c+'T12:00:00')<=today:true;
  if(!coolOk) return false;
  if(o.affordability_passed===false) return false;
  const contract=+payAcct.contract_value||0;
  const paid=+payAcct.amount_paid_to_date||0;
  const isCash=(payAcct.payment_method||'').toLowerCase()==='cash';
  const depositPct = contract>0 ? (+payAcct.deposit_amount||0)/contract : 0;
  if(payAcct.paid_in_full || isCash || depositPct>=0.5) return true;
  if(contract<=0) return false;
  const rule=ruleFor(depositPct);
  const need=(rule && rule.required_pct!=null) ? rule.required_pct : 10;
  const ref=payAcct.ezidebit_payer_ref;
  const misses = ref && counts[ref] ? counts[ref].dishonour_count : 0;
  if(misses > (rule?rule.miss_allowed:1)) return false;
  return (paid/contract*100) >= need;
}

async function load(){
  $('state').style.display='';$('state').textContent='Loading today\u2019s run…';
  const {data:rules}=await sb.from('delivery_rules').select('*').order('min_deposit_pct'); RULES=rules||[];
  const {data:orders,error}=await sb.from('sim_orders')
    .select('*, sim_customers(first_name,last_name,mobile,address), sim_order_items(product_name,quantity)')
    .lte('delivery_date',todayStr);
  if(error){$('state').innerHTML=`<span class="text-red-400">${esc(error.message)}</span>`;return;}
  // for paid-via deliveries, clearance is judged on the PAYER's account
  const pvIds=[...new Set((orders||[]).map(o=>o.paid_via_order_id).filter(Boolean))];
  let payerMap={};
  if(pvIds.length){
    const {data:po}=await sb.from('sim_orders').select('id,contract_value,amount_paid_to_date,first_payment_date,payment_frequency,order_date,cooling_off_expires,affordability_passed,payment_method,paid_in_full,deposit_amount,ezidebit_payer_ref').in('id',pvIds);
    (po||[]).forEach(p=>payerMap[p.id]=p);
  }
  const refs=[...new Set((orders||[]).map(o=>{const pa=o.paid_via_order_id?(payerMap[o.paid_via_order_id]||o):o; return pa.ezidebit_payer_ref;}).filter(Boolean))];
  let counts={};
  if(refs.length){ const {data:cd}=await sb.rpc('sim_delivery_counts',{refs}); (cd||[]).forEach(r=>counts[r.payer_ref]={paid_count:r.paid_count,dishonour_count:r.dishonour_count}); }
  const run=[],doneList=[];
  for(const o of (orders||[])){
    const cust=o.sim_customers||{};
    const items=(o.sim_order_items||[]).map(i=>({name:i.product_name,qty:+i.quantity||1}));
    const stop={
      id:o.id, name:`${cust.first_name||''} ${cust.last_name||''}`.trim()||'(no name)',
      phone:cust.mobile||'', address:o.delivery_address||cust.address||'',
      items, product:items.map(i=>(i.qty>1?i.qty+'× ':'')+i.name).join(', ')||'—',
      time:o.delivery_time||''
    };
    if(o.delivery_status==='delivered'){doneList.push(stop);continue;}
    const payAcct = o.paid_via_order_id ? (payerMap[o.paid_via_order_id]||o) : o;   // judge payments on payer
    if(!cleared(o,payAcct,counts))continue;               // held back for the office — not shown to the driver
    run.push(stop);
  }
  run.sort((x,y)=>suburb(x.address).localeCompare(suburb(y.address))||x.address.localeCompare(y.address));
  render(run,doneList);
}

function render(run,doneList){
  $('state').style.display='none';
  const dstr=new Date(todayStr+'T12:00:00').toLocaleDateString('en-NZ',{weekday:'long',day:'numeric',month:'long'});
  const load={};run.forEach(r=>r.items.forEach(i=>load[i.name]=(load[i.name]||0)+i.qty));
  const loadStr=Object.entries(load).map(([n,q])=>`${q}× ${esc(n)}`).join(' · ');
  const stops=run.map(r=>r.address).filter(Boolean);
  let route='';
  if(stops.length){const dest=encodeURIComponent(stops[stops.length-1]);const wp=stops.slice(0,-1).map(encodeURIComponent).join('|');
    route=`https://www.google.com/maps/dir/?api=1&destination=${dest}${wp?`&waypoints=${wp}`:''}&travelmode=driving`;}

  $('head').innerHTML=`<div class="card mb-4" style="border-color:#c9a84c">
      <div class="lbl">${esc(dstr)}</div>
      <div class="text-2xl font-bold mt-1">${run.length} stop${run.length!==1?'s':''} to deliver</div>
      ${loadStr?`<div class="lbl mt-3">Load onto the truck</div><div class="text-slate-100 mt-1">${loadStr}</div>`:''}
      ${route?`<a class="act gold noprint mt-4" style="width:100%" href="${route}" target="_blank">🧭 Start route in Maps</a>`:''}
    </div>`;

  if(!run.length){$('list').innerHTML=`<div class="text-center text-slate-500 py-14">No deliveries left for today.</div>`;}
  else $('list').innerHTML=run.map((r,i)=>`<div class="card mb-3">
      <div class="flex items-start gap-3">
        <div class="num">${i+1}</div>
        <div class="flex-1 min-w-0">
          <div class="text-lg font-bold text-white">${esc(r.name)}</div>
          <div class="text-lg text-slate-100 mt-1 leading-snug">${esc(r.address)||'<span class="text-slate-500">No address on file</span>'}</div>
          ${r.time?`<div class="lbl mt-2">Time · ${esc(r.time)}</div>`:''}
          <div class="lbl mt-2">Deliver</div>
          <div class="text-slate-200">${esc(r.product)}</div>
        </div>
      </div>
      <div class="flex flex-wrap gap-2 mt-4 noprint">
        ${r.address?`<a class="act ghost" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.address)}" target="_blank">📍 Maps</a>`:''}
        ${r.phone?`<a class="act ghost" href="tel:${digits(r.phone)}">📞 Call</a>`:''}
        <button class="act ghost" onclick="window.open('docket.html?id='+'${r.id}','_blank')">🖨 Docket</button>
        <button class="act gold" style="margin-left:auto" onclick="markDelivered('${r.id}','${esc(r.name).replace(/'/g,"\\'")}')">✓ Delivered</button>
      </div>
    </div>`).join('');

  $('done').innerHTML = doneList.length
    ? `<div class="mt-6"><div class="lbl mb-2">Delivered today · ${doneList.length}</div>`
      + doneList.map(r=>`<div class="card done mb-2 py-3"><span class="font-semibold">${esc(r.name)}</span> <span class="text-slate-400 text-sm">— ${esc(r.address)}</span></div>`).join('')
      + `</div>`
    : '';
}

window.markDelivered=async(id,name)=>{
  if(!confirm(`Mark ${name} as delivered?`))return;
  const {error}=await sb.from('sim_orders').update({delivery_status:'delivered'}).eq('id',id);
  if(error){alert(error.message);return;}
  await load();
};

load();
</script>
</body>
</html>
