<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simtec — Add Customer / Sale</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js?v=3" data-roles="admin,manager,office"></script>
<style>
  :root{
    --navy:#122347; --navy2:#1c3363; --gold:#c6a15b; --ink:#1a2334;
    --line:#d9e0ea; --bg:#eef1f5; --ok:#1c6b34; --okbg:#e7f6ec; --err:#a02020; --errbg:#fdecec; --warn:#8a6d00; --warnbg:#fff6da;
  }
  *{box-sizing:border-box}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);margin:0}
  header{background:var(--navy);color:#fff;padding:16px 22px;display:flex;align-items:center;gap:12px}
  header h1{font-size:18px;margin:0;font-weight:600;letter-spacing:.3px}
  header .tag{margin-left:auto;font-size:12px;color:#b9c6de}
  header a.home{color:#b9c6de;text-decoration:none;font-size:13px;font-weight:600}
  header a.home:hover{color:#fff}
  .wrap{max-width:920px;margin:22px auto;padding:0 16px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px 22px;margin-bottom:18px}
  .card h2{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--navy);margin:0 0 16px;padding-bottom:10px;border-bottom:2px solid var(--gold);display:inline-block}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 18px}
  .grid.three{grid-template-columns:1fr 1fr 1fr}
  label{display:block;font-weight:600;font-size:12.5px;margin-bottom:5px;color:#3a4759}
  .req label::after{content:" *";color:var(--gold)}
  input,select{width:100%;padding:10px 11px;border:1px solid #cbd4df;border-radius:8px;font-size:15px;font-family:inherit;background:#fff}
  input:focus,select:focus{outline:2px solid var(--navy2);border-color:var(--navy2)}
  .hint{font-size:11.5px;color:#7a8798;margin-top:4px}
  .full{grid-column:1/-1}
  table.prod{width:100%;border-collapse:collapse;margin-top:4px}
  table.prod th,table.prod td{border:1px solid var(--line);padding:7px;text-align:center}
  table.prod th{background:#f3f6fa;font-size:12px;color:var(--navy)}
  table.prod td.rl{text-align:left;font-weight:600;background:#f8fafc;white-space:nowrap}
  table.prod input{width:60px;padding:7px 6px;text-align:center}
  table.prod td.na{background:#f1f3f6}
  .extras{display:flex;gap:22px;flex-wrap:wrap;margin-top:14px;align-items:end}
  .extras .fld{width:120px}
  .actions{display:flex;align-items:center;gap:16px;margin-top:4px}
  button{background:var(--navy);color:#fff;border:none;border-radius:9px;padding:13px 26px;font-size:15px;font-weight:600;cursor:pointer}
  button:hover{background:var(--navy2)}
  button:disabled{opacity:.5;cursor:default}
  button.ghost{background:#fff;color:var(--navy);border:1px solid #cbd4df}
  #msg{display:none;padding:12px 14px;border-radius:8px;font-size:14px;margin-bottom:16px;white-space:pre-wrap}
  .ok{background:var(--okbg);color:var(--ok);border:1px solid #b6e0c4}
  .err{background:var(--errbg);color:var(--err);border:1px solid #f2bdbd}
  .warn{background:var(--warnbg);color:var(--warn);border:1px solid #ecd98a}
  .recent{font-size:14px}
  .recent .row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
  .recent .row:last-child{border-bottom:none}
  .recent .nm{font-weight:600;flex:1}
  .recent .meta{color:#6b7889;font-size:13px}
  .empty{color:#7a8798;font-size:13.5px;padding:6px 0}
  @media(max-width:640px){.grid,.grid.three{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <a href="home.html" class="home">‹ Home</a>
  <h1>Simtec — Add Customer / Sale</h1>
  <span class="tag" id="count"></span>
</header>

<div class="wrap">
  <div id="msg"></div>

  <div class="card">
    <h2>Customer</h2>
    <div class="grid">
      <div class="req"><label for="first">First name</label><input id="first" autocomplete="off"></div>
      <div class="req"><label for="last">Last name</label><input id="last" autocomplete="off"></div>
      <div class="req"><label for="mobile">Mobile</label><input id="mobile" type="tel" placeholder="021 234 5678"><div class="hint" id="mobileHint"></div></div>
      <div><label for="email">Email</label><input id="email" type="email" autocomplete="off"></div>
      <div class="full"><label for="address">Street address</label><input id="address" autocomplete="off"></div>
      <div><label for="city">Suburb / City</label><input id="city" autocomplete="off"></div>
      <div><label for="postcode">Postcode</label><input id="postcode" autocomplete="off"></div>
    </div>
  </div>

  <div class="card">
    <h2>Sale</h2>
    <div class="grid three">
      <div class="req"><label for="orderDate">Sale date</label><input id="orderDate" type="date"></div>
      <div class="req"><label for="consultant">Consultant</label><input id="consultant" list="consultants" autocomplete="off"><datalist id="consultants"></datalist></div>
      <div><label for="saleType">Sale type</label>
        <select id="saleType"><option value="">—</option><option value="solicited">Solicited</option><option value="unsolicited">Unsolicited</option></select></div>

      <div><label for="payMethod">Payment method</label>
        <select id="payMethod">
          <option value="">—</option>
          <option value="weekly_dd">Weekly direct debit</option>
          <option value="fortnightly_dd">Fortnightly direct debit</option>
          <option value="deposit_50">50% deposit</option>
          <option value="pay_in_full">Pay in full</option>
          <option value="cash">Cash</option>
        </select></div>
      <div><label for="payFreq">Payment frequency</label>
        <select id="payFreq" onchange="schedulePreview()"><option value="">—</option><option value="weekly">Weekly</option><option value="fortnightly">Fortnightly</option><option value="monthly">Monthly</option></select></div>
      <div><label for="payAmount">Payment amount ($ per period)</label>
        <input id="payAmount" type="number" min="0" step="0.01" placeholder="minimum" oninput="scheduleTouched=true;schedulePreview()">
        <div class="hint" id="payAmountHint">Leave blank to use the minimum. Enter a higher figure if the customer chose to pay more.</div></div>
      <div><label for="payerRef">Ezidebit Payer ID</label><input id="payerRef" placeholder="551-000-000" autocomplete="off"></div>

      <div class="req"><label for="contract">Total sale value ($)</label><input id="contract" type="number" min="0" step="0.01" readonly><div class="hint" id="totalHint">Calculated from the products below.</div></div>
      <div><label for="deposit">Deposit amount ($)</label><input id="deposit" type="number" min="0" step="0.01" value="0"></div>

      <div><label for="firstPay">First payment date</label><input id="firstPay" type="date" onchange="schedulePreview()"></div>
      <div style="grid-column:1/-1"><div id="schedPreview" class="hint" style="padding:8px 10px;background:#f4f7fa;border:1px solid #d9e0ea;border-radius:8px"></div></div>
      <div><label for="delStatus">Delivery status</label>
        <select id="delStatus">
          <option value="pending">Pending</option>
          <option value="scheduled">Scheduled</option>
          <option value="delivered">Delivered</option>
          <option value="on_hold">On hold</option>
          <option value="cancelled">Cancelled</option>
        </select></div>
    </div>
  </div>

  <div class="card">
    <h2>Products</h2>
    <table class="prod" id="prodTable"></table>
    <div class="extras">
      <div class="fld"><label for="pillow">Pillows</label><input id="pillow" type="number" min="0" step="1" placeholder="0"></div>
      <div class="fld"><label for="delivery">Delivery fee</label><input id="delivery" type="number" min="0" step="1" placeholder="0"></div>
    </div>
  </div>

  <div class="card">
    <div class="actions">
      <button id="save">Save customer &amp; sale</button>
      <button class="ghost" id="clear" type="button">Clear form</button>
    </div>
  </div>

  <div class="card">
    <h2>Recently added</h2>
    <div class="recent" id="recent"><div class="empty">Nothing yet — saved customers will appear here.</div></div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://jvqjoenaungubpoegyvf.supabase.co";
const SUPABASE_KEY = "sb_publishable_J4MYTdJJyEaWe-GadpwdYA_upPT2rKw";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const $ = id => document.getElementById(id);
function auDate(v){
  if(!v) return "";
  if(typeof v==="string"){ const m=v.match(/^(\d{4})-(\d{2})-(\d{2})/); if(m) return m[3]+"/"+m[2]+"/"+m[1]; const dt=new Date(v); if(isNaN(dt)) return v; v=dt; }
  const d=String(v.getDate()).padStart(2,"0"), mo=String(v.getMonth()+1).padStart(2,"0");
  return d+"/"+mo+"/"+v.getFullYear();
}
const msg = $("msg");
function show(text, cls){ msg.style.display="block"; msg.className=cls; msg.textContent=text; window.scrollTo({top:0,behavior:"smooth"}); }
function clearMsg(){ msg.style.display="none"; }

// ---- product grid ----
const SIZES = ["King Single","Queen","Super King","Cal King"];
const RANGES = [
  {name:"Mk I",      sizes:["King Single","Queen","Super King"]},
  {name:"Mk II",     sizes:["King Single","Queen","Super King"]},
  {name:"Mk III",    sizes:["King Single","Queen","Super King","Cal King"]},
  {name:"BB (Base)", sizes:["King Single","Queen","Super King","Cal King"]},
  {name:"MP",        sizes:["King Single","Queen","Super King","Cal King"]},
];
const ABBR = {"King Single":"KS","Queen":"Q","Super King":"SK","Cal King":"CK"};
(function buildGrid(){
  let h = "<tr><th style='text-align:left'>Range</th>" + SIZES.map(s=>`<th>${s}</th>`).join("") + "</tr>";
  for(const r of RANGES){
    h += `<tr><td class="rl">${r.name}</td>`;
    for(const s of SIZES){
      if(r.sizes.includes(s)){
        h += `<td><input type="number" min="0" step="1" placeholder="0" data-range="${r.name}" data-size="${s}"></td>`;
      } else {
        h += `<td class="na">—</td>`;
      }
    }
    h += "</tr>";
  }
  $("prodTable").innerHTML = h;
})();

// ---- pricing / auto-calculated total ----
const PRICES = {}; // config key -> retail price
function sizeKey(size){ return ({"King Single":"king_single","Queen":"queen","Super King":"super_king","Cal King":"california_king"})[size] || ""; }
function cellConfigKey(range,size){
  const rk = ({"Mk I":"mk1","Mk II":"mk2","Mk III":"mk3","BB (Base)":"base","MP":"protector"})[range];
  return rk ? rk+"_"+sizeKey(size) : null;
}
function productName(range,size){
  const ns = size==="Cal King" ? "California King" : size;
  if(range==="Mk I"||range==="Mk II"||range==="Mk III") return range+" "+ns;
  if(range==="BB (Base)") return ns+" Bed Base";
  if(range==="MP") return ns+" Protector";
  if(range==="Pillow") return "Pillow";
  if(range==="Delivery") return "Delivery fee";
  return range;
}
const PERIODS={weekly:{per:7,total:156,word:"week"},fortnightly:{per:14,total:78,word:"fortnight"},monthly:{per:30.44,total:36,word:"month"}};
let scheduleTouched=false;   // did the operator type an amount, or are we showing the minimum?

// Minimum instalment = contract spread over the standard term for that frequency.
function minInstalment(){
  const contract=Number($("contract").value)||0;
  const f=PERIODS[$("payFreq").value]; if(!f||contract<=0) return 0;
  return contract/f.total;
}

// What we will actually store: the typed amount if given, else the minimum.
function chosenInstalment(){
  const typed=parseFloat($("payAmount").value);
  if(typed>0) return typed;
  return minInstalment();
}

function schedulePreview(){
  const box=$("schedPreview"); if(!box) return;
  const f=PERIODS[$("payFreq").value];
  const contract=Number($("contract").value)||0;
  if(!f || contract<=0){ box.textContent="Choose a frequency to see the schedule."; return; }

  const min=minInstalment();
  const inst=chosenInstalment();
  if(!(inst>0)){ box.textContent=""; return; }

  // Placeholder shows the minimum until they type their own.
  $("payAmount").placeholder = "min "+min.toFixed(2);

  // Deposit reduces what's financed.
  const deposit=Number($("deposit").value)||0;
  const financed=Math.max(0, contract-deposit);
  const payments=inst>0?Math.ceil(financed/inst):0;
  const last=financed-inst*(payments-1);
  const weeks=Math.round(payments*f.per/7);
  const yrs=(weeks/52).toFixed(1);

  let msg=`<b>${payments} payment${payments!==1?"s":""}</b> of $${inst.toFixed(2)} per ${f.word}`;
  if(last>0 && Math.abs(last-inst)>0.01) msg+=` (last one $${last.toFixed(2)})`;
  msg+=` — about <b>${weeks} weeks</b> (${yrs} yrs) to clear ${deposit>0?`$${financed.toFixed(2)} after the deposit`:"the balance"}.`;

  if(inst>min+0.01){
    const minPayments=Math.ceil(financed/min);
    const saved=minPayments-payments;
    msg+=`<br><span style="color:#1c6b34">Paying $${(inst-min).toFixed(2)} more than the $${min.toFixed(2)} minimum — clears about ${saved} ${f.word}s sooner.</span>`;
  }
  if(inst<min-0.01){
    msg+=`<br><span style="color:#b4342e">This is below the $${min.toFixed(2)} minimum for a ${($("payFreq").value)} plan — the loan would run past the standard term.</span>`;
  }
  if(weeks>156) msg+=`<br><span style="color:#b8860b">Over the 3-year (156-week) target.</span>`;
  box.innerHTML=msg;
}

function recalcTotal(){
  if(!Object.keys(PRICES).length) return;          // prices didn't load → leave total editable
  let total=0, missing=false;
  document.querySelectorAll('#prodTable input[data-range]').forEach(inp=>{
    const q=parseInt(inp.value,10); if(!q||q<0) return;
    const key=cellConfigKey(inp.dataset.range,inp.dataset.size);
    const price=key?PRICES[key]:null;
    if(price==null){ missing=true; return; }
    total += q*price;
  });
  const pil=parseInt($("pillow").value,10);   if(pil>0){ const p=PRICES["pillow"];   if(p==null) missing=true; else total+=pil*p; }
  const del=parseInt($("delivery").value,10); if(del>0){ const p=PRICES["delivery"]; if(p==null) missing=true; else total+=del*p; }
  $("contract").value = total.toFixed(2);
  $("contract").readOnly = !missing;               // locked when everything is priced; editable if a price is missing
  $("contract").style.background = missing ? "#fff" : "#f3f6fa";
  const hnt=$("totalHint");
  if(hnt) hnt.textContent = missing
    ? "⚠ A selected product has no price in the products config — check the total."
    : "Calculated from the products above.";
  schedulePreview();
}
async function loadPrices(){
  try{
    const {data}=await sb.from("config").select("key,value").eq("category","products");
    (data||[]).forEach(r=>{ const rt=r.value && r.value.retail; if(rt!=null) PRICES[r.key]=Number(rt); });
  }catch(e){}
  if(Object.keys(PRICES).length){
    $("contract").readOnly=true; $("contract").style.background="#f3f6fa"; recalcTotal();
  }else{
    $("contract").readOnly=false;
    const hnt=$("totalHint"); if(hnt) hnt.textContent="Enter the total manually (product prices unavailable).";
  }
  document.querySelectorAll('#prodTable input[data-range]').forEach(inp=>inp.addEventListener("input",recalcTotal));
  $("pillow").addEventListener("input",recalcTotal);
  $("delivery").addEventListener("input",recalcTotal);
  $("deposit").addEventListener("input",schedulePreview);
}

// ---- phone normalise / validate ----
function normNZ(raw){
  if(!raw) return {e164:"", flag:"missing"};
  const digits = String(raw).replace(/\D/g,"");
  if(!digits) return {e164:"", flag:"missing"};
  let nsn;
  if(String(raw).trim().startsWith("+64") || digits.startsWith("64")) nsn = digits.slice(2);
  else if(digits.startsWith("0")) nsn = digits.slice(1);
  else nsn = digits;
  const e164 = "+64" + nsn;
  let flag;
  if(nsn[0]==="2" && nsn.length>=8 && nsn.length<=10) flag="ok";
  else if("346789".includes(nsn[0])) flag="landline";
  else flag="check";
  return {e164, flag};
}
$("mobile").addEventListener("input", ()=>{
  const {e164,flag} = normNZ($("mobile").value);
  const el = $("mobileHint");
  if(!$("mobile").value){ el.textContent=""; el.style.color=""; return; }
  if(flag==="ok"){ el.textContent="Will be saved as "+e164; el.style.color="#1c6b34"; }
  else if(flag==="landline"){ el.textContent="Looks like a landline ("+e164+") — texts won't reach it"; el.style.color="#8a6d00"; }
  else { el.textContent="Doesn't look like a valid NZ number ("+e164+")"; el.style.color="#a02020"; }
});

// auto-fill frequency from method
$("payMethod").addEventListener("change", ()=>{
  const m=$("payMethod").value;
  if(m==="weekly_dd") $("payFreq").value="weekly";
  else if(m==="fortnightly_dd") $("payFreq").value="fortnightly";
});

// ---- consultants ----
const FALLBACK_CONSULTANTS = ["Yazan Othman","Kenzie Lam Sam","Stacey Numanga","PJ Tonga","Anovale Tovio","Brooke Komene","Kono Harris","Rita Neli","Tame Cooper","Matt"];
const TEAM = {"Kenzie Lam Sam":"Kenzie Lam Sam","Anovale Tovio":"Kenzie Lam Sam","PJ Tonga":"Kenzie Lam Sam","Rita Neli":"Kenzie Lam Sam","Tame Cooper":"Kenzie Lam Sam","Yazan Othman":"Yazan Othman","Brooke Komene":"Yazan Othman","Kono Harris":"Yazan Othman","Stacey Numanga":"Yazan Othman"};
async function loadConsultants(){
  let names = FALLBACK_CONSULTANTS;
  try{
    const {data} = await sb.from("commission_consultants").select("name");
    if(data && data.length) names = [...new Set(data.map(d=>d.name).filter(Boolean))].sort();
  }catch(e){}
  $("consultants").innerHTML = names.map(n=>`<option value="${n}">`).join("");
}

// ---- recent list ----
async function loadRecent(){
  try{
    const {count} = await sb.from("sim_customers").select("id",{count:"exact",head:true});
    if(typeof count==="number") $("count").textContent = count + " customers in system";
  }catch(e){}
  try{
    const {data:orders} = await sb.from("sim_orders")
      .select("id,customer_id,consultant_name,contract_value,order_date")
      .order("created_at",{ascending:false}).limit(8);
    if(!orders || !orders.length){ return; }
    const ids = [...new Set(orders.map(o=>o.customer_id).filter(Boolean))];
    let custMap = {};
    if(ids.length){
      const {data:custs} = await sb.from("sim_customers").select("id,first_name,last_name,mobile").in("id",ids);
      (custs||[]).forEach(c=>custMap[c.id]=c);
    }
    const rows = orders.map(o=>{
      const c = custMap[o.customer_id] || {};
      const nm = [c.first_name,c.last_name].filter(Boolean).join(" ") || "(no name)";
      const val = o.contract_value!=null ? "$"+Number(o.contract_value).toLocaleString() : "";
      const meta = [o.consultant_name, val, auDate(o.order_date)].filter(Boolean).join(" · ");
      return `<div class="row"><span class="nm">${nm}</span><span class="meta">${meta}</span></div>`;
    }).join("");
    $("recent").innerHTML = rows;
  }catch(e){}
}

// ---- save ----
$("save").addEventListener("click", save);
async function save(){
  clearMsg();
  const first=$("first").value.trim(), last=$("last").value.trim();
  const {e164, flag} = normNZ($("mobile").value);
  const consultant=$("consultant").value.trim();
  const orderDate=$("orderDate").value || null;
  const contract = $("contract").value===""? null : Number($("contract").value);

  if(!first || !last){ return show("Enter the customer's first and last name.","err"); }
  if(flag==="missing" || flag==="check"){ return show("Enter a valid mobile number before saving.","err"); }
  if(!consultant){ return show("Choose or type the consultant for this sale.","err"); }
  if(!orderDate){ return show("Set the sale date.","err"); }
  if(!contract || contract<=0){ return show("Add at least one product — the total is $0.","err"); }

  const btn=$("save"); btn.disabled=true; const original=btn.textContent; btn.textContent="Saving…";
  try{
    // 1. customer
    const address = [$("address").value.trim(), $("city").value.trim(), $("postcode").value.trim()].filter(Boolean).join(", ");
    const {data:cust,error:e1} = await sb.from("sim_customers")
      .insert({first_name:first,last_name:last,mobile:e164,email:$("email").value.trim()||null,address:address||null})
      .select("id").single();
    if(e1) throw new Error("Saving customer: "+e1.message);

    // 2. order
    const method=$("payMethod").value||null;
    // Record the agreed payment. chosenInstalment() returns the typed amount if the
    // operator entered one, otherwise the minimum (contract ÷ standard term).
    const schedInst = (method==="pay_in_full"||method==="cash") ? 0 : chosenInstalment();
    const _f = PERIODS[$("payFreq").value];
    const _dep = Number($("deposit").value)||0;
    const _fin = Math.max(0, contract-_dep);
    const schedTerm = (schedInst>0) ? Math.ceil(_fin/schedInst) : 0;
    const order = {
      customer_id:cust.id, order_date:orderDate, consultant_name:consultant,
      team_leader_name:TEAM[consultant]||null,
      sale_type:$("saleType").value||null,
      payment_method:method,
      payment_frequency:$("payFreq").value||null,
      contract_value:contract,
      amount_paid_to_date:0,
      deposit_amount:$("deposit").value===""?0:Number($("deposit").value),
      deposit_date:$("firstPay").value||null,
      ezidebit_payer_ref:($("payerRef").value.replace(/\D/g,"")||null),
      first_payment_date:$("firstPay").value||null,
      // The schedule, recorded at the point of sale so arrears is right from day one.
      // Store what the customer actually agreed — the typed amount, or the minimum.
      instalment_amount: schedInst>0 ? schedInst : null,
      term_periods:      schedTerm>0 ? schedTerm : null,
      schedule_start_date: $("firstPay").value||null,   // arrears reads this
      next_payment_date:   $("firstPay").value||null,
      delivery_status:$("delStatus").value,
      order_status:"active",
      paid_in_full: method==="pay_in_full"
    };
    const {data:ord,error:e2} = await sb.from("sim_orders").insert(order).select("id").single();
    if(e2) throw new Error("Saving sale: "+e2.message);

    // 3. product lines — write the full product_name (delivery/arrears screens AND
    //    the commission feed both match on product_name), plus unit price + line number.
    const items=[]; let ln=0;
    const addLine=(name,priceKey,qty)=>{ if(qty>0){ items.push({order_id:ord.id, line_no:++ln, product_name:name, quantity:qty, unit_price:(priceKey&&PRICES[priceKey]!=null)?PRICES[priceKey]:null}); } };
    document.querySelectorAll('#prodTable input[data-range]').forEach(inp=>{
      addLine(productName(inp.dataset.range,inp.dataset.size), cellConfigKey(inp.dataset.range,inp.dataset.size), parseInt(inp.value,10));
    });
    addLine("Pillow","pillow",parseInt($("pillow").value,10));
    addLine("Delivery fee","delivery",parseInt($("delivery").value,10));
    if(items.length){
      const {error:e3} = await sb.from("sim_order_items").insert(items);
      if(e3) throw new Error("Customer and sale saved, but product lines failed: "+e3.message);
    }

    let note = flag==="landline" ? "  (Heads up: the number looks like a landline — it won't receive texts.)" : "";
    show(`Saved ${first} ${last}.` + note, "ok");
    clearForm();
    loadRecent();
  }catch(err){
    show(String(err.message||err), "err");
  }finally{
    btn.disabled=false; btn.textContent=original;
  }
}

$("clear").addEventListener("click", clearForm);
function clearForm(){
  // A clean slate after every save. Everything the operator can type or choose is
  // reset — no field is left carrying data from the last customer, which is how a
  // half-filled or duplicate order slips through.
  ["first","last","mobile","email","address","city","postcode","payerRef",
   "contract","firstPay","payAmount","deposit","pillow","delivery"].forEach(id=>{
     const el=$(id); if(el) el.value="";
  });
  $("deposit").value="0";
  $("saleType").value=""; $("payMethod").value=""; $("payFreq").value=""; $("delStatus").value="pending";
  $("consultant").value="";
  $("orderDate").value = new Date().toISOString().slice(0,10);   // reset to today
  const mh=$("mobileHint"); if(mh) mh.textContent="";
  const sp=$("schedPreview"); if(sp) sp.innerHTML="";
  const ah=$("payAmountHint"); if(ah) ah.textContent="Leave blank to use the minimum. Enter a higher figure if the customer chose to pay more.";
  $("payAmount").placeholder="minimum";
  scheduleTouched=false;
  document.querySelectorAll('#prodTable input[data-range]').forEach(i=>i.value="");
  recalcTotal();
  window.scrollTo({top:0,behavior:"smooth"});   // back to the top for the next entry
}

// init
$("orderDate").value = new Date().toISOString().slice(0,10);
loadConsultants();
loadPrices();
loadRecent();
</script>
