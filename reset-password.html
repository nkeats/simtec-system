<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simtec — Reset password</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--navy:#122347;--navy2:#1c3363;--gold:#c6a15b;--ink:#1a2334;--line:#d9e0ea;--bg:#eef1f5;--err:#a02020;--errbg:#fdecec;--ok:#1c6b34;--okbg:#e7f6ec;}
  *{box-sizing:border-box}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;width:100%;max-width:380px;padding:34px 30px;box-shadow:0 10px 30px rgba(18,35,71,.08)}
  .brand{text-align:center;margin-bottom:22px}
  .brand .t{font-size:24px;font-weight:800;color:var(--navy);letter-spacing:.5px}
  .brand .s{font-size:11px;letter-spacing:.24em;color:var(--gold);font-weight:700;margin-top:2px}
  h2{font-size:15px;color:var(--navy);text-align:center;margin:0 0 6px}
  p.sub{font-size:12.5px;color:#6b7889;text-align:center;margin:0 0 8px}
  label{display:block;font-weight:600;font-size:12.5px;margin:14px 0 5px;color:#3a4759}
  input{width:100%;padding:11px 12px;border:1px solid #cbd4df;border-radius:8px;font-size:15px}
  input:focus{outline:2px solid var(--navy2);border-color:var(--navy2)}
  button{width:100%;background:var(--navy);color:#fff;border:none;border-radius:9px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;margin-top:20px}
  button:hover{background:var(--navy2)} button:disabled{opacity:.5;cursor:default}
  .link{display:block;text-align:center;margin-top:16px;font-size:13px;color:var(--navy2);text-decoration:none}
  #msg{display:none;margin-top:16px;padding:10px 12px;border-radius:8px;font-size:13.5px}
  .err{background:var(--errbg);color:var(--err);border:1px solid #f2bdbd}
  .ok{background:var(--okbg);color:var(--ok);border:1px solid #b6e0c4}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><div class="t">SIMTEC</div><div class="s">THERAPEUTIC</div></div>
  <h2>Set a new password</h2>
  <p class="sub" id="who"></p>
  <div id="form" style="display:none">
    <label for="p1">New password</label>
    <input id="p1" type="password" autocomplete="new-password" placeholder="At least 8 characters">
    <label for="p2">Confirm new password</label>
    <input id="p2" type="password" autocomplete="new-password">
    <button id="save">Save new password</button>
  </div>
  <div id="msg"></div>
  <a class="link" href="login.html">Back to log in</a>
</div>

<script>
const sb = supabase.createClient("https://jvqjoenaungubpoegyvf.supabase.co","sb_publishable_J4MYTdJJyEaWe-GadpwdYA_upPT2rKw");
const $=id=>document.getElementById(id);
function show(t,cls){ const m=$("msg"); m.style.display="block"; m.className=cls; m.textContent=t; }

// The reset link puts a recovery session in place. Wait for it, then show the form.
let ready=false;
sb.auth.onAuthStateChange((event, session)=>{
  if(session && !ready){ ready=true; $("form").style.display="block"; $("who").textContent = session.user?.email ? "for "+session.user.email : ""; }
});
// Fallback: if a session already exists on load
(async()=>{
  const {data:{session}} = await sb.auth.getSession();
  if(session && !ready){ ready=true; $("form").style.display="block"; $("who").textContent = session.user?.email ? "for "+session.user.email : ""; }
  else if(!session){ setTimeout(()=>{ if(!ready) show("This reset link is invalid or has expired. Request a new one from the log-in page.","err"); }, 2500); }
})();

async function save(){
  const p1=$("p1").value, p2=$("p2").value;
  if(p1.length<8){ return show("Password must be at least 8 characters.","err"); }
  if(p1!==p2){ return show("The two passwords don't match.","err"); }
  const btn=$("save"); btn.disabled=true; const orig=btn.textContent; btn.textContent="Saving…";
  try{
    const {error}=await sb.auth.updateUser({password:p1});
    if(error) throw error;
    $("form").style.display="none";
    show("Password updated. You can now log in with your new password.","ok");
    setTimeout(()=>location.replace("login.html"), 2200);
  }catch(e){ show(e.message||"Couldn't update the password.","err"); btn.disabled=false; btn.textContent=orig; }
}
$("save").addEventListener("click", save);
</script>
</body>
</html>
