// ── Commission calc ────────────────────────────────────────────────────────
function calc(sales,bonuses,deds,retBal,payBasis){
  const s=S();
  let units=0;
  for(const sale of sales){if(sale.status==='cancelled')continue;for(const it of(sale.items||[]))
    if(it.product?.commission_type!=='zero')units+=it.quantity;}
  const rate=units<=s.tier1_max?s.tier1_amount:units<=s.tier2_max?s.tier2_amount:s.tier3_amount;
  let sc=0,ac=0;
  for(const sale of sales){
    if(sale.status==='cancelled')continue;
    let elig=false;
    for(const it of(sale.items||[])){
      const p=it.product;if(!p)continue;
      if(p.commission_type==='fixed'){sc+=p.fixed_amount*it.quantity;elig=true;}
      if(p.commission_type==='tier'){sc+=rate*it.quantity;elig=true;}
    }
    if(elig&&sale.paid_in_full)ac+=s.cash_bonus;
  }
  const payout=(bonuses||[]).find(b=>b.description==='__RETENTION_PAYOUT__');
  const payoutAmt=+payout?.amount||0;
  const mb=(bonuses||[]).filter(b=>b.description!=='__RETENTION_PAYOUT__').reduce((a,b)=>a+(+b.amount||0),0);
  const gs=sc+ac,gross=gs+mb;
  let ret=0;
  // Retention only accrues for consultants on 'commission'. On 'retainer' → no retention withheld.
  if(payBasis!=='retainer' && retBal<s.retention_cap)ret=Math.min(gs*s.retention_rate,s.retention_cap-retBal);
  const td=(deds||[]).reduce((a,d)=>a+(+d.amount||0),0);
  return{units,rate,sc,ac,mb,gs,gross,ret,td,payout:payoutAmt,net:gross-ret-td+payoutAmt,retAfter:retBal+ret-payoutAmt};
}

// For a FINALISED run, the stored retention balance ALREADY includes this run's
// weekly retention (finalise banked it). So when we re-display/print the invoice we
// must recover the true PRE-week opening, or calc() adds this week again and the
// closing balance shows double. For a draft run the stored balance IS the opening.
async function openingRetBal(storedBal, run, consultantId){
  if(!run || run.status!=='finalised') return storedBal;
  const{data}=await sb.from('commission_retention_adjustments')
    .select('amount').eq('pay_run_id',run.id).eq('consultant_id',consultantId)
    .in('reason',['weekly_retention','retention_payout']);
  const net=(data||[]).reduce((a,r)=>a+(+r.amount||0),0);   // weekly_retention(+) + payout(−)
  return storedBal - net;
}

// Giveaway balances: balance owed = SUM(giveaways) − SUM(repayments in finalised runs)
function givBalances(giveaways,repayDeds,finalisedRunIds){
  const fin=new Set(finalisedRunIds||[]);
  const m={};
  const b=id=>m[id]||(m[id]={taken:0,repaid:0,balance:0});
  (giveaways||[]).forEach(g=>{b(g.consultant_id).taken+=(+g.amount||0);});
  (repayDeds||[]).forEach(d=>{if(fin.has(d.pay_run_id))b(d.consultant_id).repaid+=(+d.amount||0);});
  Object.values(m).forEach(x=>x.balance=x.taken-x.repaid);
  return m;
}

// ── Cash Week ──────────────────────────────────────────────────────────────
// The boss runs a "big cash week": paying consultants DAILY to motivate them.
// Cash goes out the day AFTER the sale, so the grid runs Tue→Mon (Tuesday pays
// Monday's sales … Monday pays the weekend's). Wednesday then settles the balance.
//
// The trap: the per-unit rate depends on the WEEK'S FINAL VOLUME (1-4=$200,
// 5-9=$300, 10+=$400), so it keeps moving. You can't correctly allocate
// retention per-deal on the day — the rate isn't known yet.
//
// So each day's suggested payout = (entitlement on the units so far this week)
// − (cash already handed out earlier in the week). That produces the retrospective
// uplift automatically when someone crosses a bracket.
//
// Daily payments are ADVANCES, not commission events. At payday they're posted to
// the pay run as a deduction, so Wednesday pays only the balance. WITHOUT that
// posting the pay run would pay the whole lot again.
let cwWeek=null, CWDATA=null;

function mondayOf(d){ const x=new Date(d); x.setHours(12,0,0,0); const dow=(x.getDay()+6)%7; x.setDate(x.getDate()-dow); return x; }
const isoD=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const cwMoney=n=>(n<0?'-$':'$')+Math.abs(+n||0).toLocaleString('en-NZ',{minimumFractionDigits:2,maximumFractionDigits:2});
const cwRate=u=>{const s=S(); return u<=s.tier1_max?s.tier1_amount:u<=s.tier2_max?s.tier2_amount:s.tier3_amount;};

// Recompute one consultant's row: cumulative units drive the rate, and each day's
// suggestion is what's owed to date less what's already gone out.
function cwRecalcRow(row){
  const s=S();
  let cumU=0,cumP=0,cumR=0;
  row.cells.forEach(c=>{
    cumU+=(+c.units||0);
    const gross=cumU*cwRate(cumU);
    const retDue=row.retainer?0:gross*s.retention_rate;
    const cashDue=gross-retDue;
    c.cumU=cumU; c.rate=cwRate(cumU);
    c.sugP=Math.max(0,cashDue-cumP);
    c.sugR=Math.max(0,retDue-cumR);
    cumP+=(+c.paid||0); cumR+=(+c.ret||0);
  });
  row.totUnits=cumU; row.totPaid=cumP; row.totRet=cumR;
  const gross=cumU*cwRate(cumU);
  row.gridEnt=gross;
  row.gridRet=row.retainer?0:gross*s.retention_rate;
  row.gridCash=gross-row.gridRet;
  row.owing=row.gridCash-cumP;
  return row;
}

async function showCashWeek(){
  if(!cwWeek) cwWeek=isoD(mondayOf(new Date()));
  const weekStart=cwWeek;                                   // Monday — sales week Mon–Sun
  const weekEnd=isoD(new Date(new Date(cwWeek+'T12:00:00').getTime()+6*86400000));
  // payout days: Tue (pays Mon's sales) … Mon (pays Sunday's)
  const days=[]; for(let i=1;i<=7;i++){
    const d=new Date(new Date(cwWeek+'T12:00:00').getTime()+i*86400000);
    const sd=new Date(d.getTime()-86400000);
    days.push({iso:isoD(d), lbl:d.toLocaleDateString('en-NZ',{weekday:'short'}), dm:`${d.getDate()}/${d.getMonth()+1}`,
               sales:sd.toLocaleDateString('en-NZ',{weekday:'short'})});
  }
  const active=consultants.filter(c=>c.active);
  const ids=active.map(c=>c.id);

  const [{data:wks},{data:sl}]=await Promise.all([
    sb.from('commission_cash_weeks').select('*').eq('week_start',weekStart).in('consultant_id',ids),
    sb.from('commission_sales').select('consultant_id,status,commission_sale_items(quantity,commission_products(commission_type))')
      .in('consultant_id',ids).gte('sale_date',weekStart).lte('sale_date',weekEnd)
  ]);
  const weeks={}; (wks||[]).forEach(w=>weeks[w.consultant_id]=w);
  let adv=[]; const wkIds=(wks||[]).map(w=>w.id);
  if(wkIds.length){ const {data:a}=await sb.from('commission_cash_advances').select('*').in('cash_week_id',wkIds); adv=a||[]; }

  // what the SYSTEM thinks was sold this week (for the cross-check)
  const sysU={}; (sl||[]).forEach(x=>{ if(x.status==='cancelled')return;
    (x.commission_sale_items||[]).forEach(i=>{ if(i.commission_products?.commission_type!=='zero') sysU[x.consultant_id]=(sysU[x.consultant_id]||0)+i.quantity; }); });

  CWDATA={weekStart, weekEnd, days, rows:active.map(c=>{
    const cells=days.map(d=>{
      const a=adv.find(x=>x.consultant_id===c.id && x.advance_date===d.iso);
      return {iso:d.iso, id:a?a.id:null, units:a?(+a.units||0):0, paid:a?(+a.cash_paid||0):0, ret:a?(+a.retention_allocated||0):0};
    });
    return cwRecalcRow({con:c, retainer:c.pay_basis==='retainer', cells, wk:weeks[c.id]||null, sysUnits:sysU[c.id]||0});
  })};

  render_cw();
}

        <div class="ml-auto flex items-center gap-3">

          <button class="btn gold" onclick="cwSaveAll()">Save</button>
        </div>
      </div>
    </div>

    <div class="card" style="overflow-x:auto">
      <table class="text-xs" style="border-collapse:separate;border-spacing:0">
        <thead>
          <tr class="text-slate-500">
            <th class="text-left pb-1 pr-3" style="position:sticky;left:0;background:#1e293b;z-index:2">Consultant</th>
            ${days.map(d=>`<th colspan="3" class="text-center pb-1 px-1" style="border-left:1px solid #334155">
                <div class="text-slate-300 font-semibold">${d.lbl} ${d.dm}</div>
                <div class="text-slate-600" style="font-size:10px">pays ${d.sales}'s sales</div></th>`).join('')}
            <th colspan="3" class="text-center pb-1 px-2" style="border-left:2px solid #c9a84c">
              <div class="text-yellow-500 font-semibold">Week</div></th>

            <th class="pb-2 px-1" style="border-left:2px solid #c9a84c">Paid</th><th class="pb-2 px-1">Ret</th><th class="pb-2 px-1">Owing Wed</th>
          </tr>
        </thead>
        <tbody>
        ${rows.map((r,ri)=>`<tr style="border-top:1px solid #334155">
          <td class="py-1.5 pr-3 font-medium text-slate-200 whitespace-nowrap" style="position:sticky;left:0;background:#1e293b;z-index:2">
            ${esc(r.con.name)}${r.retainer?'<span class="text-slate-600" style="font-size:9px"> retainer</span>':''}
            <div class="text-slate-600" style="font-size:9px">${r.totUnits} units @ $${cwRate(r.totUnits)}${r.sysUnits!==r.totUnits?` · <span style="color:#fbbf24">system says ${r.sysUnits}</span>`:''}</div>
          </td>
          ${r.cells.map((c,di)=>`
            <td class="py-1 px-0.5 text-center" style="border-left:1px solid #334155">${inp('u',ri,di,c.units,'0')}</td>
            <td class="py-1 px-0.5 text-center">${inp('p',ri,di,c.paid,c.sugP.toFixed(0))}</td>
            <td class="py-1 px-0.5 text-center">${inp('r',ri,di,c.ret,c.sugR.toFixed(0))}</td>`).join('')}
          <td class="py-1.5 px-2 text-right text-sky-300 font-semibold whitespace-nowrap" style="border-left:2px solid #c9a84c" id="tp${ri}">${cwMoney(r.totPaid)}</td>

      <div class="flex flex-wrap gap-2">

        ).join('') || '<span class="text-slate-600 text-xs">Nothing to post yet.</span>'}
      </div>
    </div>
  </div>`;
}

// live edit → recompute that row's suggestions and totals
window.cwEdit=function(el){
  const ri=+el.dataset.r, di=+el.dataset.d, k=el.dataset.k;
  const row=CWDATA.rows[ri], cell=row.cells[di];
  const v=el.value===''?0:parseFloat(el.value)||0;
  if(k==='u') cell.units=v; else if(k==='p') cell.paid=v; else cell.ret=v;
  cwRecalcRow(row);
  // refresh this row's placeholders (the suggestions) without losing focus
  row.cells.forEach((c,d)=>{
    const p=document.querySelector(`input[data-r="${ri}"][data-d="${d}"][data-k="p"]`);
    const r=document.querySelector(`input[data-r="${ri}"][data-d="${d}"][data-k="r"]`);
    if(p&&p!==el) p.placeholder=c.sugP.toFixed(0);
    if(r&&r!==el) r.placeholder=c.sugR.toFixed(0);
  });
  const tp=$('tp'+ri), tr=$('tr'+ri), to=$('to'+ri);
  if(tp) tp.textContent=cwMoney(row.totPaid);
  if(tr) tr.textContent=cwMoney(row.totRet);

// \u2500\u2500 persistence: entries autosave so nothing is lost on navigation \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// Everything typed is written to commission_cash_advances as you go, and
// showCashWeek() reads it back on load \u2014 so a week's numbers persist until
// they're reconciled (posted) or you clear them. Saves are serialised through
// cwSaveChain: a save always finishes (setting each new row's id) before the
// next one starts, so a cell can never be inserted twice / double-counted.
let cwSaveChain=Promise.resolve(), cwSaveTimer=null;

function cwSetSaveState(t){ const el=$('cwSaveState'); if(el) el.textContent=t; }

// the actual writer \u2014 upserts every touched cell. Throws on DB error so the
// chain's handler can surface it; leaves already-saved cells with their id set.
async function cwPersistCore(){
  const who=(window.SIMTEC_USER&&(window.SIMTEC_USER.full_name||window.SIMTEC_USER.email))||'staff';
  let n=0;
  for(const row of CWDATA.rows){
    const touched=row.cells.filter(c=>c.units||c.paid||c.ret||c.id);
    if(!touched.length) continue;
    let wkId=row.wk?.id;
    if(!wkId){
      const {data:nw,error:ew}=await sb.from('commission_cash_weeks')
        .insert({consultant_id:row.con.id,week_start:CWDATA.weekStart,status:'open',opened_by:who}).select().single();
      if(ew) throw new Error('Couldn\u2019t open a cash week for '+row.con.name+': '+ew.message);
      wkId=nw.id; row.wk=nw;
    }
    for(const c of touched){
      const payload={cash_week_id:wkId,consultant_id:row.con.id,advance_date:c.iso,
        units:c.units||0,cash_paid:c.paid||0,retention_allocated:c.ret||0,created_by:who};
      if(c.id){ const {error}=await sb.from('commission_cash_advances').update(payload).eq('id',c.id);
        if(error) throw new Error('Couldn\u2019t save '+row.con.name+': '+error.message); }
      else if(c.units||c.paid||c.ret){
        const {data,error}=await sb.from('commission_cash_advances').insert(payload).select().single();
        if(error) throw new Error('Couldn\u2019t save '+row.con.name+': '+error.message);
        c.id=data.id;
      }
      n++;
    }
  }
  return n;
}

// queue a save behind any in-flight one (never runs two writers concurrently)
function cwQueueSave(){
  cwSetSaveState('Saving\u2026');
  cwSaveChain=cwSaveChain.then(cwPersistCore).then(
    ()=>{ cwSetSaveState('All changes saved \u2713'); },
    e=>{ console.error(e); cwSetSaveState('\u26a0 not saved'); alert(e.message); }
  );
  return cwSaveChain;
}

// debounced autosave while typing
function cwScheduleSave(){ cwSetSaveState('Saving\u2026'); clearTimeout(cwSaveTimer); cwSaveTimer=setTimeout(cwQueueSave,600); }
// immediate flush when a field loses focus (e.g. before navigating away)
window.cwFlush=()=>{ clearTimeout(cwSaveTimer); cwQueueSave(); };

// the gold Save button: flush any pending edits, then refresh the view
window.cwSaveAll=async()=>{
  clearTimeout(cwSaveTimer);
  await cwQueueSave();
  renderApp();
};

window.delRun=async(id,weekEnding)=>{
  // Look up the run + its sales
  const[{data:run},{data:saleRows,error:eLook}]=await Promise.all([
    sb.from('commission_pay_runs').select('*').eq('id',id).single(),
    sb.from('commission_sales').select('id').eq('pay_run_id',id),
  ]);
  if(eLook){err(eLook);return;}
  const saleIds=(saleRows||[]).map(s=>s.id);
  const n=saleIds.length;
  const fin=run&&run.status==='finalised';
  // DRAFT delete now KEEPS the sales (un-assigns them) so a mistaken delete is recoverable —
  // the sales return to the pool and a new run for the week re-gathers them. Only a FINALISED
  // delete still permanently removes sales (and it reverses retention), because detaching paid
  // sales could let them be paid twice.
  const msg=fin
    ?`Delete the FINALISED pay run for week ending ${fmtD(weekEnding)}?\n\nThis will REVERSE the retention added for this week, then permanently remove the run and its ${n} sale${n===1?'':'s'}, bonuses and deductions.\n\nThis cannot be undone.`
    :`Delete the DRAFT pay run for week ending ${fmtD(weekEnding)}?\n\nThe ${n} sale${n===1?'':'s'} in it will be UN-ASSIGNED and KEPT (not deleted) — a new run for this week will gather them again. Any bonuses/deductions on this run are removed.\n\nThe sales are safe; only the run itself is removed.`;
  if(!confirm(msg))return;
  try{
    if(fin){
      // ===== FINALISED: reverse retention, then permanently delete (unchanged behaviour) =====
      // 1. Gather every retention adjustment tied to this run or its sales
      let adjs=[];
      const{data:aRun}=await sb.from('commission_retention_adjustments').select('*').eq('pay_run_id',id);
      adjs=adjs.concat(aRun||[]);
      if(saleIds.length){
        const{data:aSale}=await sb.from('commission_retention_adjustments').select('*').in('sale_id',saleIds);
        (aSale||[]).forEach(a=>{if(!adjs.find(x=>x.id===a.id))adjs.push(a);});
      }
      // 2. Reverse their net effect on each consultant's retention balance
      const byCon={};adjs.forEach(a=>{byCon[a.consultant_id]=(byCon[a.consultant_id]||0)+(+a.amount||0);});
      for(const cid of Object.keys(byCon)){
        const{data:ret}=await sb.from('commission_retention').select('*').eq('consultant_id',cid).maybeSingle();
        const cur=+ret?.balance||0;
        await sb.from('commission_retention').upsert({consultant_id:cid,balance:Math.max(0,cur-byCon[cid]),updated_at:new Date().toISOString()},{onConflict:'consultant_id'});
      }
      // 3. Remove those adjustment rows (clears references + avoids orphans)
      if(adjs.length){
        await sb.from('commission_retention_adjustments').delete().eq('pay_run_id',id);
        if(saleIds.length)await sb.from('commission_retention_adjustments').delete().in('sale_id',saleIds);
      }
      // 4. Delete line items, then sales/bonuses/deductions, then the run
      if(saleIds.length){
        const{error:eItems}=await sb.from('commission_sale_items').delete().in('sale_id',saleIds);
        if(eItems)throw eItems;
      }
      for(const tbl of ['commission_sales','commission_bonuses','commission_deductions']){
        const{error}=await sb.from(tbl).delete().eq('pay_run_id',id);
        if(error)throw error;
      }
      const{error:eRun}=await sb.from('commission_pay_runs').delete().eq('id',id);
      if(eRun)throw eRun;
      toast('Finalised pay run deleted and retention reversed.');
    } else {
      // ===== DRAFT: KEEP the sales — just un-assign them — and remove only the run + its bonuses/deductions =====
      const{error:eDetach}=await sb.from('commission_sales').update({pay_run_id:null}).eq('pay_run_id',id);
      if(eDetach)throw eDetach;
      for(const tbl of ['commission_bonuses','commission_deductions']){
        const{error}=await sb.from(tbl).delete().eq('pay_run_id',id);
        if(error)throw error;
      }
      const{error:eRun}=await sb.from('commission_pay_runs').delete().eq('id',id);
      if(eRun)throw eRun;
      toast(`Pay run removed — ${n} sale${n===1?'':'s'} kept and un-assigned.`);
    }
    go('runs');
  }catch(e){err(e);}
};

      if(payout===0){await sb.from('commission_bonuses').delete().eq('id',existing.id);bonuses.splice(bonuses.indexOf(existing),1);}
      else{await sb.from('commission_bonuses').update({amount:payout}).eq('id',existing.id);existing.amount=payout;}
    }else if(payout>0){
      const{data,error}=await sb.from('commission_bonuses').insert({pay_run_id:runId,consultant_id:consId,description:'__RETENTION_PAYOUT__',amount:payout}).select().single();

  window.updateGivRepay=async(val)=>{

      if(amt===0){await sb.from('commission_deductions').delete().eq('id',existing.id);deds.splice(deds.indexOf(existing),1);}
      else{await sb.from('commission_deductions').update({amount:amt}).eq('id',existing.id);existing.amount=amt;}
    }else if(amt>0){
      const{data,error}=await sb.from('commission_deductions').insert({pay_run_id:runId,consultant_id:consId,deduction_type:'giveaway_repayment',description:'Giveaway repayment',amount:amt,quantity:1}).select().single();

    }

        <button class="btn gold flex-1" onclick="saveSale()">Save Sale</button>
        <button class="btn dark flex-1" onclick="closeMod()">Cancel</button>
      </div>`);

    window.saveSale=async()=>{
      if(run?.status==='finalised'){toast('Run finalised — un-finalise first.',false);closeMod();return;}
      const date=$('mdate')?.value,cust=$('mcust')?.value?.trim();

      const{data:sale,error}=await sb.from('commission_sales').insert({pay_run_id:runId,consultant_id:consId,sale_date:date,customer_name:cust,paid_in_full:$('mpaidfull')?.checked||false}).select().single();
      if(error){err(error);return;}
      const validItems=window.items.filter(i=>i.pid);
      if(validItems.length){
        const inserts=validItems.map(it=>({sale_id:sale.id,product_id:it.pid,quantity:it.qty}));
        const{data:si,error:sie}=await sb.from('commission_sale_items').insert(inserts).select('id,quantity,product_id,commission_products(*)');

        sales.push({...sale,items:(si||[]).map(i=>({...i,product:i.commission_products}))});
      }else{sales.push({...sale,items:[]});}
      closeMod();render();toast('Sale added');
    };
  };

      <label class="text-xs text-slate-400 block mb-1">Description</label>

    };

      <select id="mtype" class="inp mb-3" onchange="updDed()">

        <option value="retainer">Retainer</option>
        <option value="other">Other</option>

      <div id="mqtyrow">

        <input type="number" id="mqty" value="1" min="1" class="inp w-24 mb-3" oninput="updDed()">
      </div>
      <label class="text-xs text-slate-400 block mb-1">Description</label>
      <input type="text" id="mdesc" placeholder="Optional details" class="inp mb-3">
      <label class="text-xs text-slate-400 block mb-1">Amount ($)</label>
      <input type="number" id="mamt" value="${pc}" min="0" step="0.01" class="inp mb-4">

        <button class="btn gold flex-1" onclick="saveDed()">Save</button>
        <button class="btn dark flex-1" onclick="closeMod()">Cancel</button>
      </div>`);
    window.updDed=()=>{
      const t=$('mtype')?.value,q=+$('mqty')?.value||1;
      $('mqtyrow').style.display=t==='pillow'?'':'none';
      if(t==='pillow')$('mamt').value=(q*pc).toFixed(2);
    };
    window.saveDed=async()=>{
      if(run?.status==='finalised'){toast('Run finalised — un-finalise first.',false);closeMod();return;}
      const amt=+$('mamt')?.value;if(!amt){toast('Please enter an amount',false);return;}
      const{data,error}=await sb.from('commission_deductions').insert({
        pay_run_id:runId,consultant_id:consId,
        deduction_type:$('mtype').value,
        description:$('mdesc')?.value?.trim()||null,
        quantity:+$('mqty')?.value||1,amount:amt
      }).select().single();
      if(error){err(error);return;}
      (deds||(deds=[])).push(data);closeMod();render();toast('Deduction added');
    };
  };

  render();
}

    sb.from('commission_consultants').select('*').eq('active',true).order('name'),
    sb.from('commission_giveaways').select('*'),
    sb.from('commission_deductions').select('consultant_id,amount,pay_run_id').eq('deduction_type','giveaway_repayment'),

            <td class="py-2.5 text-right text-slate-400">${fmt(b.repaid)}</td>
            <td class="py-2.5 text-right font-semibold ${b.balance>0?'text-yellow-400':'text-slate-500'}">${fmt(b.balance)}</td>

      <label class="text-xs text-slate-400 block mb-1">Amount ($)</label>
      <input type="number" id="gamt" value="${isGiv?rt:''}" min="0" step="0.01" class="inp mb-3" ${isGiv?'':'placeholder="0.00"'}>

    window.gUpd=()=>{const q=+$('gqty').value||1;$('gamt').value=(q*(+S().pillow_charge||0)).toFixed(2);};
    window.saveGiv=async()=>{
      const kind=$('gkind').value;
      const q=+$('gqty').value||1, amt=+$('gamt').value;
      const notes=$('gnotes').value.trim()||null;

      const{error}=await sb.from('commission_giveaways').insert({consultant_id:$('gcons').value,kind,

        unit_charge:kind==='giveaway'?(+S().pillow_charge||0):amt,
        amount:amt,taken_date:$('gdate').value,notes});

      const done={giveaway:'Giveaway recorded',advance:'Cash advance recorded',loan:'Loan recorded'};

  window.openingModal=(cid)=>{

    window.saveOpening=async(id)=>{
      const amt=+$('oamt').value;if(!amt){toast('Enter an amount',false);return;}
      const{error}=await sb.from('commission_giveaways').insert({consultant_id:id,kind:'opening',item:'Opening balance',amount:amt,taken_date:new Date().toISOString().split('T')[0],notes:$('onotes').value.trim()||null});
      if(error){err(error);return;}
      closeMod();toast('Opening balance set');go('giveaways');

  window.givHistory=(cid)=>{
    const rows=(byCons[cid]||[]).slice().sort((a,b)=>(b.taken_date||'').localeCompare(a.taken_date||''));

      <div class="max-h-80 overflow-auto">
      ${rows.length?rows.map(g=>`<div class="flex items-center justify-between text-sm py-2 border-b border-slate-700/50">

                return tag?`<span style="font-size:10px;font-weight:700;color:${tag[1]};border:1px solid ${tag[1]}55;border-radius:10px;padding:1px 7px;margin-left:6px">${tag[0]}</span>`:'';})()}</div>
              <div class="text-xs text-slate-500">${fmtD(g.taken_date)}${g.notes?' — '+g.notes:''}</div></div>
        <div class="flex items-center gap-3"><span class="text-yellow-400">${fmt(g.amount)}</span><button class="text-slate-600 hover:text-red-400 text-xs" onclick="delGiv('${g.id}')">✕</button></div>
      </div>`).join(''):'<p class="text-slate-500 text-sm py-3">Nothing recorded yet.</p>'}
      </div>
      <div class="mt-4"><button class="btn dark w-full" onclick="closeMod()">Close</button></div>`);
  };
  window.delGiv=async(id)=>{
    if(!confirm('Remove this entry? This changes the balance owed.'))return;
    const{error}=await sb.from('commission_giveaways').delete().eq('id',id);
    if(error){err(error);return;}
    closeMod();toast('Entry removed');go('giveaways');
  };
}

// ── Awards-night override payout report (printable) ─────────────────────────
window.showOverridePayoutReport=async()=>{
  try{
    const[{data:tls},{data:ovs}]=await Promise.all([
      sb.from('commission_consultants').select('id,name').eq('is_team_leader',true).order('name'),
      sb.from('commission_overrides').select('team_leader_id,amount,reason,created_at'),
    ]);

      const mine=(ovs||[]).filter(o=>o.team_leader_id===t.id);
      const owed=mine.reduce((a,o)=>a+(+o.amount||0),0);
      const payouts=mine.filter(o=>o.reason==='payout').sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
      const lastPayout=payouts.length?new Date(payouts[0].created_at).toLocaleDateString('en-NZ',{day:'2-digit',month:'short',year:'numeric'}):'—';
      return{name:t.name,owed,lastPayout};
    }).filter(r=>r.owed>0.005); // only team leaders with something owed
    const grand=rows.reduce((a,r)=>a+r.owed,0);

// ── Setup ──────────────────────────────────────────────────────────────────
async function showSetup(){
  let tab='consultants';
  async function render(){
    const[{data:cons},{data:prods}]=await Promise.all([
      sb.from('commission_consultants').select('*').order('name'),
      sb.from('commission_products').select('*').order('name'),
    ]);
    consultants=cons||[];products=prods||[];
    $('app').innerHTML=`
      <div class="p-8 max-w-3xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">Consultants & Products</h1>
        <div class="flex gap-2 mb-6">

        </div>
        <div id="tabc"></div>
      </div>`;

    window.setTab=t=>{tab=t;render();};

    if(tab==='consultants'){

      $('tabc').innerHTML=`
        <div class="flex gap-3 mb-4">
          <input type="text" id="newcons" placeholder="Consultant full name" class="inp flex-1" onkeydown="if(event.key==='Enter')addCons()">
          <button class="btn gold px-4" onclick="addCons()">Add</button>
        </div>
        <div class="card divide-y divide-slate-700">
          ${!consultants.length?'<p class="text-slate-500 text-sm text-center py-4">No consultants yet</p>':
            consultants.map(c=>`<div class="py-4">
              <div class="flex items-center justify-between mb-2">
                <span class="text-sm font-medium ${c.active?'text-white':'text-slate-500 line-through'}">${c.name}</span>
                <button onclick="togCons('${c.id}',${c.active})" class="text-xs px-2.5 py-1 rounded-full bg-slate-700 text-slate-400 hover:text-${c.active?'red':'green'}-400">
                  ${c.active?'Deactivate':'Reactivate'}
                </button>
              </div>
              <div class="flex items-center gap-3">
                <span class="text-xs text-slate-500">Opening retention balance:</span>
                <div class="flex items-center gap-1"><span class="text-slate-500 text-xs">$</span>
                  <input type="number" id="ret_${c.id}" value="${retMap[c.id]||0}" min="0" step="0.01" class="inp w-28 text-sm py-1">

                <button onclick="saveRetBal('${c.id}')" class="btn dark text-xs py-1 px-3">Update</button>

              </div>
              <div class="flex items-center gap-3 mt-2">
                <label class="flex items-center gap-1.5 text-xs text-slate-400">Pay basis:
                  <select id="paybasis_${c.id}" onchange="savePayBasis('${c.id}')" class="inp text-sm py-1 w-36">
                    <option value="commission" ${(c.pay_basis||'commission')==='commission'?'selected':''}>Commission</option>
                    <option value="retainer" ${c.pay_basis==='retainer'?'selected':''}>Retainer (no retention)</option>
                  </select>
                </label>
                <span id="pbmsg_${c.id}" class="text-xs text-green-400 hidden">Saved</span>
              </div>
              <div class="flex items-center gap-3 mt-2">
                <label class="flex items-center gap-1.5 text-xs text-slate-400"><input type="checkbox" id="gstreg_${c.id}" ${c.gst_registered?'checked':''} onchange="saveGst('${c.id}')"> GST registered</label>
                <select id="gstrate_${c.id}" onchange="saveGst('${c.id}')" class="inp text-sm py-1 w-32" ${c.gst_registered?'':'disabled'}>
                  <option value="15" ${(+c.gst_rate||15)===15?'selected':''}>15% (NZ)</option>
                  <option value="10" ${(+c.gst_rate)===10?'selected':''}>10% (AU)</option>

            </div>`).join('')}

        if(error){err(error);return;}

        await render();

      window.saveRetBal=async(id)=>{
        const val=+($('ret_'+id)?.value||0);
        const{error}=await sb.from('commission_retention').upsert({consultant_id:id,balance:val,updated_at:new Date().toISOString()},{onConflict:'consultant_id'});

        const msg=$('retmsg_'+id);if(msg){msg.classList.remove('hidden');setTimeout(()=>msg.classList.add('hidden'),2000);}

        if(error){err(error);return;}

        const msg=$('pbmsg_'+id);if(msg){msg.classList.remove('hidden');setTimeout(()=>msg.classList.add('hidden'),2000);}
      };
      window.saveGst=async(id)=>{
        const reg=$('gstreg_'+id)?.checked||false;
        const rate=+($('gstrate_'+id)?.value||15);
        const sel=$('gstrate_'+id);if(sel)sel.disabled=!reg;
        const{error}=await sb.from('commission_consultants').update({gst_registered:reg,gst_rate:rate}).eq('id',id);
        if(error){err(error);return;}
        const c=consultants.find(x=>x.id===id);if(c){c.gst_registered=reg;c.gst_rate=rate;}
        const msg=$('gstmsg_'+id);if(msg){msg.classList.remove('hidden');setTimeout(()=>msg.classList.add('hidden'),2000);}
      };
    }else{
      $('tabc').innerHTML=`
        <div class="card mb-4">
          <div class="text-xs text-slate-400 uppercase font-medium mb-3">Add a product</div>
          <div class="flex flex-wrap items-end gap-3">
            <div class="flex-1" style="min-width:160px">
              <label class="text-xs text-slate-500 block mb-1">Product name</label>
              <input type="text" id="np_name" placeholder="e.g. Mk III Queen" class="inp">
            </div>
            <div>
              <label class="text-xs text-slate-500 block mb-1">Commission type</label>
              <select id="np_type" class="inp" onchange="document.getElementById('np_fixed').disabled=this.value!=='fixed'">
                <option value="tier">Tier (weekly rate)</option>
                <option value="fixed">Fixed amount</option>
                <option value="zero">Zero (no commission)</option>
              </select>
            </div>
            <div>
              <label class="text-xs text-slate-500 block mb-1">Fixed $</label>
              <input type="number" id="np_fixed" value="0" min="0" step="1" class="inp w-24" disabled>
            </div>
            <label class="flex items-center gap-2 text-sm text-slate-300 pb-2"><input type="checkbox" id="np_cb" checked class="w-4 h-4"> Cash bonus</label>
            <button class="btn gold px-4" onclick="addProd()">Add</button>
          </div>
        </div>
        <p class="text-xs text-slate-500 mb-3">Tip: the product <b>Name</b> must match the order form / import spreadsheet exactly, or sales won't link. Only <b>Mk I King Single</b> should be Zero.</p>
        <div class="card divide-y divide-slate-700">
          ${products.map(p=>`
          <div class="py-4">
            <div class="flex flex-wrap items-end gap-3">
              <div class="flex-1" style="min-width:150px">
                <label class="text-xs text-slate-500 block mb-1 uppercase">Name</label>
                <input type="text" id="pn_${p.id}" value="${(p.name||'').replace(/"/g,'&quot;')}" class="inp text-sm py-1 ${p.active?'':'opacity-50'}">
              </div>
              <div>
                <label class="text-xs text-slate-500 block mb-1 uppercase">Type</label>
                <select id="pt_${p.id}" class="inp text-sm py-1" onchange="document.getElementById('pf_${p.id}').disabled=this.value!=='fixed'">
                  <option value="tier" ${p.commission_type==='tier'?'selected':''}>Tier</option>
                  <option value="fixed" ${p.commission_type==='fixed'?'selected':''}>Fixed</option>
                  <option value="zero" ${p.commission_type==='zero'?'selected':''}>Zero</option>
                </select>
              </div>
              <div>
                <label class="text-xs text-slate-500 block mb-1 uppercase">Fixed $</label>
                <input type="number" id="pf_${p.id}" value="${p.fixed_amount||0}" min="0" step="1" class="inp w-24 text-sm py-1" ${p.commission_type==='fixed'?'':'disabled'}>
              </div>
              <label class="flex items-center gap-2 text-sm text-slate-300 pb-1"><input type="checkbox" id="pc_${p.id}" ${p.cash_bonus_eligible?'checked':''} class="w-4 h-4"> Cash bonus</label>
              <button onclick="saveProd('${p.id}')" class="btn dark text-xs py-1 px-3">Save</button>
              <button onclick="togProd('${p.id}',${p.active})" class="text-xs px-2.5 py-1 rounded-full bg-slate-700 text-slate-400 hover:text-${p.active?'red':'green'}-400">${p.active?'Deactivate':'Reactivate'}</button>
              <span id="pmsg_${p.id}" class="text-xs text-green-400 hidden">Saved</span>
            </div>
          </div>`).join('')}

      window.addProd=async()=>{
        const name=$('np_name')?.value?.trim();
        if(!name){toast('Enter a product name',false);return;}
        const type=$('np_type')?.value||'tier';
        const fixed=type==='fixed'?(+$('np_fixed')?.value||0):0;
        const cb=$('np_cb')?.checked||false;
        const{error}=await sb.from('commission_products').insert({name,commission_type:type,fixed_amount:fixed,cash_bonus_eligible:cb,active:true});
        if(error){err(error);return;}
        toast(`${name} added`);await render();
      };
      window.saveProd=async(id)=>{
        const name=$('pn_'+id)?.value?.trim();
        if(!name){toast('Product name cannot be blank',false);return;}
        const type=$('pt_'+id)?.value||'tier';
        const fixed=type==='fixed'?(+$('pf_'+id)?.value||0):0;
        const cb=$('pc_'+id)?.checked||false;
        const{error}=await sb.from('commission_products').update({name,commission_type:type,fixed_amount:fixed,cash_bonus_eligible:cb}).eq('id',id);

      };
      window.togProd=async(id,active)=>{
        const{error}=await sb.from('commission_products').update({active:!active}).eq('id',id);
        if(error){err(error);return;}
        await render();
      };
    }
  }
  await render();
}


// ── Customer History & Cancellations ──────────────────────────────────────
async function showCustomers(){
  $('app').innerHTML='<div class="p-8 text-slate-500 text-center">Loading…</div>';
  const active=consultants.filter(c=>c.active);
  const selCons=active.find(c=>c.id===window._custConsId)||active[0];

  async function render(consId){
    window._custConsId=consId;
    const con=active.find(c=>c.id===consId);
    const{data:sales}=await sb.from('commission_sales')
      .select('*,commission_sale_items(quantity,commission_products(name))')
      .eq('consultant_id',consId)
      .order('sale_date',{ascending:false});

    const activeSales=(sales||[]).filter(s=>s.status!=='cancelled');
    const cancelledSales=(sales||[]).filter(s=>s.status==='cancelled');

    $('app').innerHTML=`
      <div class="p-8 max-w-5xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">Customer History</h1>
        <div class="flex gap-3 mb-6 flex-wrap">
          ${active.map(c=>`<button onclick="window._custConsId='${c.id}';renderCustList('${c.id}')"
            class="btn ${c.id===consId?'gold':'dark'} text-sm">${c.name}</button>`).join('')}
        </div>
        <div id="custlist"></div>
      </div>`;

    window.renderCustList=async(cid)=>{
      const con2=active.find(c=>c.id===cid);
      const{data:s2}=await sb.from('commission_sales')
        .select('*,commission_sale_items(quantity,commission_products(name))')
        .eq('consultant_id',cid).order('sale_date',{ascending:false});
      const act=(s2||[]).filter(s=>s.status!=='cancelled');
      const can=(s2||[]).filter(s=>s.status==='cancelled');
      window._custConsId=cid;
      // re-render buttons
      document.querySelectorAll('.btn').forEach(b=>{
        if(active.find(c=>c.name===b.textContent)){
          b.className=`btn ${active.find(c=>c.name===b.textContent)?.id===cid?'gold':'dark'} text-sm`;
        }
      });
      renderTable(act,can,cid);
    };

    renderTable(activeSales,cancelledSales,consId);
  }

  function renderTable(activeSales,cancelledSales,consId){
    const tbl=$('custlist');if(!tbl)return;
    const prodStr=sale=>((sale.commission_sale_items||[]).map(i=>`${i.commission_products?.name||''}${i.quantity>1?` ×${i.quantity}`:''}`).join(', '))||'—';
    tbl.innerHTML=`
      <div class="card mb-4">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-semibold text-sm uppercase tracking-wide">Active Customers <span class="text-slate-500 font-normal">(${activeSales.length})</span></h3>
        </div>
        ${!activeSales.length?'<p class="text-slate-500 text-sm text-center py-4">No active sales</p>':`
        <div class="overflow-x-auto"><table class="w-full text-sm">
          <thead><tr class="text-slate-500 text-xs">
            <th class="text-left pb-2">Date</th><th class="text-left pb-2">Customer</th>
            <th class="text-left pb-2">Products</th><th class="text-right pb-2">Commission</th><th class="pb-2 w-24"></th>
          </tr></thead>
          <tbody class="divide-y divide-slate-700/50">
            ${activeSales.map(s=>`<tr>
              <td class="py-2 pr-3 text-slate-400 whitespace-nowrap">${fmtD(s.sale_date)}</td>
              <td class="py-2 pr-3 font-medium">${s.customer_name}</td>
              <td class="py-2 pr-3 text-slate-400 text-xs">${prodStr(s)}</td>
              <td class="py-2 text-right ${s.paid_date?'text-yellow-400':'text-slate-500'}">${s.paid_date?fmt(s.commission_paid):'Not yet paid'}</td>
              <td class="py-2 pl-2 whitespace-nowrap text-right">
                <button onclick="showEditModal('${s.id}','${consId}')" class="text-xs px-2 py-1 rounded bg-slate-700 text-slate-200 hover:bg-slate-600 mr-1">Edit</button>
                <span title="Cancel customers in the main system (customer page) — that automatically claws back retention and keeps both systems in sync." class="text-xs px-2 py-1 rounded bg-slate-800 text-slate-500 cursor-help">Cancel in main system ↗</span></td>
            </tr>`).join('')}
          </tbody>
        </table></div>`}
      </div>
      ${cancelledSales.length?`
      <div class="card">
        <h3 class="font-semibold text-sm uppercase tracking-wide mb-3 text-slate-500">Cancelled <span class="font-normal">(${cancelledSales.length})</span></h3>
        <div class="overflow-x-auto"><table class="w-full text-sm">
          <thead><tr class="text-slate-500 text-xs">
            <th class="text-left pb-2">Sale Date</th><th class="text-left pb-2">Customer</th>
            <th class="text-left pb-2">Products</th><th class="text-right pb-2">Clawback</th><th class="text-left pb-2 pl-3">Notes</th>
          </tr></thead>
          <tbody class="divide-y divide-slate-700/50">
            ${cancelledSales.map(s=>`<tr class="opacity-60">
              <td class="py-2 pr-3 text-slate-400 whitespace-nowrap">${fmtD(s.sale_date)}</td>
              <td class="py-2 pr-3 line-through text-slate-400">${s.customer_name}</td>
              <td class="py-2 pr-3 text-slate-500 text-xs">${prodStr(s)}</td>
              <td class="py-2 text-right text-red-400">-${fmt(s.commission_paid)}</td>
              <td class="py-2 pl-3 text-slate-500 text-xs">${s.cancellation_notes||''}</td>
            </tr>`).join('')}
          </tbody>
        </table></div>
      </div>`:''}`;
  }

  if(selCons) await render(selCons.id);
  else $('app').innerHTML='<div class="p-8 text-slate-500 text-center">No active consultants.</div>';
}

function showCancelModal(saleId,customerName,commissionPaid,consId,isPaid){
  const paid=isPaid===true||isPaid==='true';
  openMod(`<h3 class="font-semibold text-white mb-2">Mark as Cancelled</h3>
    <p class="text-slate-400 text-sm mb-4">${paid
      ?'This customer has already been paid. The commission below will be clawed back from the consultant\'s retention account.'
      :'This sale has not been paid yet, so there is nothing to claw back — it will simply be removed from the pay run.'}</p>
    <div class="bg-slate-900 rounded-lg p-4 mb-4 space-y-2 text-sm">
      <div class="flex justify-between"><span class="text-slate-400">Customer</span><span class="font-medium">${customerName}</span></div>
      ${paid
        ?`<div class="flex justify-between"><span class="text-slate-400">Commission to claw back</span><span class="text-red-400 font-semibold">-${fmt(commissionPaid)}</span></div>`
        :`<div class="flex justify-between"><span class="text-slate-400">Status</span><span class="text-slate-300">Not yet paid — no clawback</span></div>`}
    </div>
    <label class="text-xs text-slate-400 block mb-1">Cancellation notes (optional)</label>
    <input type="text" id="mnotes" placeholder="e.g. Poor payment history" class="inp mb-4">
    <div class="flex gap-3">
      <button class="btn gold flex-1" onclick="confirmCancel('${saleId}',${commissionPaid},'${consId}',${paid})">Confirm Cancellation</button>
      <button class="btn dark flex-1" onclick="closeMod()">Back</button>
    </div>`);
}

window.confirmCancel=async(saleId,commissionPaid,consId,isPaid)=>{
  const paid=isPaid===true||isPaid==='true';
  const notes=$('mnotes')?.value?.trim()||null;
  // 1. Mark sale cancelled
  const{error:e1}=await sb.from('commission_sales').update({
    status:'cancelled',
    cancelled_date:new Date().toISOString().split('T')[0],
    cancellation_notes:notes
  }).eq('id',saleId);
  if(e1){err(e1);return;}

  if(!paid){
    closeMod();
    toast('Sale cancelled and removed from the pay run (no clawback — not yet paid).');
    if(window._custConsId) window.renderCustList(window._custConsId);
    return;
  }

  // 2. Get current retention balance
  const{data:ret}=await sb.from('commission_retention').select('*').eq('consultant_id',consId).maybeSingle();
  const currentBal=+ret?.balance||0;
  const newBal=Math.max(0,currentBal-commissionPaid);

  // 3. Update retention balance
  await sb.from('commission_retention').upsert({
    consultant_id:consId,balance:newBal,updated_at:new Date().toISOString()
  },{onConflict:'consultant_id'});

  // 4. Log adjustment
  await sb.from('commission_retention_adjustments').insert({
    consultant_id:consId,
    amount:-commissionPaid,
    reason:'cancellation_clawback',
    sale_id:saleId,
    notes:`Cancellation clawback${notes?' — '+notes:''}`
  });

  // 5. TL override — reverse exactly what was accrued for this sale (paid sales only).
  // Looks up this sale's accrual rows so the reversal hits the correct team leader by the same amount.
  let ovReversed=0;
  try{
    const{data:ovRows}=await sb.from('commission_overrides').select('*').eq('sale_id',saleId).gt('amount',0);
    const accrued=(ovRows||[]).reduce((a,r)=>a+(+r.amount||0),0);
    if(accrued>0){
      const tl=ovRows[0].team_leader_id;
      await sb.from('commission_overrides').insert({team_leader_id:tl,consultant_id:consId,sale_id:saleId,amount:-accrued,reason:'cancellation_reversal',notes:`Override reversed on cancellation${notes?' — '+notes:''}`});
      ovReversed=accrued;
    }
  }catch(e){console.error('override reversal',e);}

  closeMod();
  toast(`Cancellation recorded. Retention reduced by ${fmt(commissionPaid)}${ovReversed?`, override reduced by ${fmt(ovReversed)}`:''}.`);
  // Refresh customer list
  if(window._custConsId) window.renderCustList(window._custConsId);
};

// ── Edit / alter a sale (change products & quantities) ─────────────────────
window.showEditModal=async(saleId,consId)=>{
  const {data:sale,error}=await sb.from('commission_sales')
    .select('*,commission_sale_items(id,quantity,product_id,commission_products(name,commission_type,fixed_amount))')
    .eq('id',saleId).single();
  if(error){err(error);return;}
  // other sales in the same pay run (week) — for the weekly tier count
  const {data:week}=await sb.from('commission_sales')
    .select('id,status,commission_sale_items(quantity,commission_products(commission_type))')
    .eq('pay_run_id',sale.pay_run_id).eq('consultant_id',consId);
  let otherUnits=0;
  (week||[]).forEach(ws=>{ if(ws.id===saleId||ws.status==='cancelled')return;
    (ws.commission_sale_items||[]).forEach(it=>{ if(it.commission_products?.commission_type!=='zero')otherUnits+=(+it.quantity||0); }); });
  const prods=products||[];
  const rows=(sale.commission_sale_items||[]).map(it=>({product_id:it.product_id,quantity:it.quantity||1}));
  if(!rows.length)rows.push({product_id:prods[0]&&prods[0].id,quantity:1});
  // Derive the ACTUAL per-mattress tier rate this sale was paid at, so an edit
  // subtracts the real amount paid for a mattress (no weekly-volume ripple).
  const st=S();let origFixed=0,origTier=0,origElig=false;
  (sale.commission_sale_items||[]).forEach(it=>{const p=it.commission_products;if(!p)return;
    if(p.commission_type==='fixed'){origFixed+=(+p.fixed_amount||0)*(it.quantity||0);origElig=true;}
    if(p.commission_type==='tier'){origTier+=(it.quantity||0);origElig=true;}});
  const origBonus=(sale.paid_in_full&&origElig)?st.cash_bonus:0;
  let lockedRate=null;
  if(sale.paid_date&&origTier>0)lockedRate=((+sale.commission_paid||0)-origFixed-origBonus)/origTier;
  window._edit={saleId,consId,otherUnits,prods,rows,paidInFull:!!sale.paid_in_full,wasPaid:!!sale.paid_date,oldCommission:+sale.commission_paid||0,lockedRate,
                consName:(consultants.find(c=>c.id===consId)||{}).name||'the consultant',customer:sale.customer_name};
  renderEditModal();
};
function editCalc(){
  const s=S(),e=window._edit;
  let rate;
  if(e.lockedRate!=null)rate=e.lockedRate;            // already paid: use the rate it was actually paid at
  else{                                                // not yet paid: estimate at current weekly tier (recomputed at finalise)
    let units=e.otherUnits;
    for(const r of e.rows){const p=e.prods.find(x=>x.id===r.product_id);if(p&&p.commission_type!=='zero')units+=(+r.quantity||0);}
    rate=units<=s.tier1_max?s.tier1_amount:units<=s.tier2_max?s.tier2_amount:s.tier3_amount;
  }
  let base=0,elig=false;
  for(const r of e.rows){const p=e.prods.find(x=>x.id===r.product_id);if(!p)continue;const q=+r.quantity||0;
    if(p.commission_type==='fixed'){base+=(+p.fixed_amount||0)*q;elig=true;}
    if(p.commission_type==='tier'){base+=rate*q;elig=true;}}
  const commission=base+((elig&&e.paidInFull)?s.cash_bonus:0);
  return {commission,rate,diff:commission-e.oldCommission};
}
function editReadRows(){
  const e=window._edit;
  const sels=document.querySelectorAll('#editRows select');
  const qts=document.querySelectorAll('#editRows input[type=number]');
  const rows=[];sels.forEach((s,i)=>rows.push({product_id:s.value,quantity:+qts[i].value||0}));
  e.rows=rows.length?rows:e.rows;
  const pf=document.getElementById('editPaidFull');if(pf)e.paidInFull=pf.checked;
}
window.editChanged=()=>{editReadRows();editPreview();};
window.editRow=(i,act)=>{editReadRows();const e=window._edit;
  if(act==='del'){e.rows.splice(i,1);if(!e.rows.length)e.rows.push({product_id:e.prods[0]&&e.prods[0].id,quantity:1});}
  renderEditModal();};
window.editAddRow=()=>{editReadRows();const e=window._edit;e.rows.push({product_id:e.prods[0]&&e.prods[0].id,quantity:1});renderEditModal();};
function editPreview(){
  const e=window._edit,c=editCalc(),box=document.getElementById('editPreview');if(!box)return;
  let note;
  if(!e.wasPaid)note='<span class="text-slate-400">This sale is not yet paid — its commission will simply update.</span>';
  else if(Math.abs(c.diff)<0.005)note='<span class="text-slate-400">No change to the commission.</span>';
  else if(c.diff<0)note=`<span class="text-amber-400">Already paid — saving will claw back ${fmt(-c.diff)} from ${e.consName}'s retention.</span>`;
  else note=`<span class="text-amber-400">Already paid — saving will add ${fmt(c.diff)} to ${e.consName}'s retention.</span>`;
  box.innerHTML=`<div class="flex justify-between"><span class="text-slate-400">New commission</span><span class="font-semibold text-yellow-400">${fmt(c.commission)}</span></div>
    <div class="flex justify-between"><span class="text-slate-400">Was</span><span class="text-slate-300">${fmt(e.oldCommission)}</span></div>
    <div class="flex justify-between"><span class="text-slate-400">Rate per mattress</span><span class="text-slate-300">${fmt(c.rate)}</span></div>
    <div class="mt-2 text-xs">${note}</div>`;
}
function renderEditModal(){
  const e=window._edit;
  const opt=pid=>e.prods.map(p=>`<option value="${p.id}" ${p.id===pid?'selected':''}>${p.name}${p.commission_type==='fixed'?' (fixed $'+p.fixed_amount+')':p.commission_type==='tier'?' (tier)':' (no commission)'}</option>`).join('');
  const rowsHtml=e.rows.map((r,i)=>`<div class="flex gap-2 mb-2 items-center">
      <select class="inp" style="flex:2" onchange="editChanged()">${opt(r.product_id)}</select>
      <input type="number" min="0" class="inp" style="width:64px" value="${r.quantity}" onchange="editChanged()">
      <button onclick="editRow(${i},'del')" class="text-red-400 px-2" title="Remove">\u2715</button>
    </div>`).join('');
  openMod(`<h3 class="font-semibold text-white mb-1">Edit sale</h3>
    <p class="text-slate-500 text-xs mb-3">${e.customer}</p>
    <div id="editRows">${rowsHtml}</div>
    <button onclick="editAddRow()" class="text-xs text-yellow-400 mb-3">+ Add product</button>
    <label class="flex items-center gap-2 text-sm text-slate-300 mb-3">
      <input type="checkbox" id="editPaidFull" ${e.paidInFull?'checked':''} onchange="editChanged()"> Paid in full (cash bonus eligible)</label>
    <div id="editPreview" class="bg-slate-900 rounded-lg p-3 mb-4 space-y-1 text-sm"></div>
    <div class="flex gap-3">
      <button class="btn gold flex-1" onclick="saveEditedSale()">Save changes</button>
      <button class="btn dark flex-1" onclick="closeMod()">Cancel</button>
    </div>`);
  editPreview();
}
window.saveEditedSale=async()=>{
  editReadRows();const e=window._edit;
  const items=e.rows.filter(r=>r.product_id&&(+r.quantity||0)>0);
  if(!items.length){toast('Add at least one product, or cancel the sale instead.',false);return;}
  const c=editCalc();
  try{
    await sb.from('commission_sale_items').delete().eq('sale_id',e.saleId);
    for(const r of items)await sb.from('commission_sale_items').insert({sale_id:e.saleId,product_id:r.product_id,quantity:r.quantity});
    const upd={paid_in_full:e.paidInFull};
    if(e.wasPaid)upd.commission_paid=c.commission;
    await sb.from('commission_sales').update(upd).eq('id',e.saleId);
    if(e.wasPaid&&Math.abs(c.diff)>=0.005){
      const{data:ret}=await sb.from('commission_retention').select('*').eq('consultant_id',e.consId).maybeSingle();
      const bal=+ret?.balance||0;
      await sb.from('commission_retention').upsert({consultant_id:e.consId,balance:Math.max(0,bal+c.diff),updated_at:new Date().toISOString()},{onConflict:'consultant_id'});
      await sb.from('commission_retention_adjustments').insert({consultant_id:e.consId,amount:c.diff,reason:'sale_adjustment',sale_id:e.saleId,notes:`Sale edited — commission ${c.diff<0?'reduced':'increased'} by ${fmt(Math.abs(c.diff))}`});
    }
    closeMod();
    toast(e.wasPaid&&Math.abs(c.diff)>=0.005?`Sale updated. Retention ${c.diff<0?'reduced':'increased'} by ${fmt(Math.abs(c.diff))}.`:'Sale updated.');
    if(window.renderCustList)window.renderCustList(e.consId);
  }catch(ex){err(ex);}
};

// ── Weekly Import from Spreadsheet ────────────────────────────────────────
// ── Finalise / Un-finalise (mark a run paid, advance retention) ─────
window.finaliseRun=async(rid)=>{
  rid=rid||runId;
  if(!confirm('Finalise this pay run?\n\nThis records exactly what each consultant was paid for each customer, and adds this week\'s 25% to their retention accounts (up to the $5,000 cap). Only do this AFTER you have actually paid everyone.'))return;
  try{
    const{data:run,error:re}=await sb.from('commission_pay_runs').select('*').eq('id',rid).single();
    if(re)throw re;
    if(run.status==='finalised'){toast('This run is already finalised.',false);return;}
    const s=S();
    const today=new Date().toISOString().split('T')[0];
    const{data:retRows}=await sb.from('commission_retention').select('*');
    const retMap={};(retRows||[]).forEach(x=>retMap[x.consultant_id]=+x.balance||0);
    const active=consultants.filter(c=>c.active);
    // TL override: map consultant name -> id (to resolve each consultant's team leader), and the per-sale override amount
    const nameToId={};consultants.forEach(x=>{if(x.name)nameToId[x.name.trim().toLowerCase()]=x.id;});
    const ovRate=+s.override_rate||0;
    for(const c of active){
      const tlId=c.team_leader?nameToId[c.team_leader.trim().toLowerCase()]:null; // this consultant's team leader (override accrues here)
      const[{data:sl},{data:bo},{data:de}]=await Promise.all([
        sb.from('commission_sales').select('*,commission_sale_items(quantity,commission_products(*))').eq('pay_run_id',rid).eq('consultant_id',c.id),
        sb.from('commission_bonuses').select('*').eq('pay_run_id',rid).eq('consultant_id',c.id),
        sb.from('commission_deductions').select('*').eq('pay_run_id',rid).eq('consultant_id',c.id),
      ]);
      const sales=(sl||[]).map(x=>({...x,items:(x.commission_sale_items||[]).map(i=>({...i,product:i.commission_products}))}));
      const cv=calc(sales,bo||[],de||[],retMap[c.id]||0,c.pay_basis);
      const rate=cv.rate;
      for(const sale of sales){
        if(sale.status==='cancelled')continue;
        let base=0,elig=false;
        for(const it of(sale.items||[])){const pr=it.product;if(!pr)continue;
          if(pr.commission_type==='fixed'){base+=pr.fixed_amount*it.quantity;elig=true;}
          if(pr.commission_type==='tier'){base+=rate*it.quantity;elig=true;}}
        const paid=base+((elig&&sale.paid_in_full)?s.cash_bonus:0);
        await sb.from('commission_sales').update({commission_paid:paid,paid_date:today}).eq('id',sale.id);
        // TL override — accrue for every commissionable sale (elig), including a team leader's own sales.
        // Skipped automatically for Mk I King Single-only sales (not elig) and when the consultant has no team leader set (e.g. Matt).
        if(elig&&tlId&&ovRate>0){
          await sb.from('commission_overrides').insert({team_leader_id:tlId,consultant_id:c.id,sale_id:sale.id,pay_run_id:rid,amount:ovRate,reason:'finalise_accrual',notes:'Override accrued — week ending '+run.week_ending});
        }
      }
      const opening=retMap[c.id]||0;
      const newBal=opening+cv.ret-cv.payout;
      if(cv.ret!==0||cv.payout!==0){
        await sb.from('commission_retention').upsert({consultant_id:c.id,balance:newBal,updated_at:new Date().toISOString()},{onConflict:'consultant_id'});
      }
      if(cv.ret>0){
        await sb.from('commission_retention_adjustments').insert({consultant_id:c.id,amount:cv.ret,reason:'weekly_retention',pay_run_id:rid,notes:'Retention withheld — week ending '+run.week_ending});
      }
      if(cv.payout>0){
        await sb.from('commission_retention_adjustments').insert({consultant_id:c.id,amount:-cv.payout,reason:'retention_payout',pay_run_id:rid,notes:'Retention released — week ending '+run.week_ending});
      }
    }
    await sb.from('commission_pay_runs').update({status:'finalised'}).eq('id',rid);
    toast('Pay run finalised. Commissions recorded and retention updated.');
    showRun();
  }catch(e){err(e);}
};

window.unfinaliseRun=async(rid)=>{
  rid=rid||runId;
  if(!confirm('Un-finalise this run?\n\nThis reverses the retention added for this week and unlocks the run for editing.\n\nNote: any cancellation clawbacks already taken will NOT be reversed.'))return;
  try{
    const{data:run}=await sb.from('commission_pay_runs').select('*').eq('id',rid).single();
    if(!run||run.status!=='finalised'){toast('This run is not finalised.',false);return;}
    const{data:adjs}=await sb.from('commission_retention_adjustments').select('*').eq('pay_run_id',rid).in('reason',['weekly_retention','retention_payout']);
    const byCon={};(adjs||[]).forEach(a=>{byCon[a.consultant_id]=(byCon[a.consultant_id]||0)+(+a.amount||0);});
    for(const cid of Object.keys(byCon)){
      const{data:ret}=await sb.from('commission_retention').select('*').eq('consultant_id',cid).maybeSingle();
      const cur=+ret?.balance||0;
      await sb.from('commission_retention').upsert({consultant_id:cid,balance:Math.max(0,cur-byCon[cid]),updated_at:new Date().toISOString()},{onConflict:'consultant_id'});
    }
    if(adjs&&adjs.length)await sb.from('commission_retention_adjustments').delete().eq('pay_run_id',rid).in('reason',['weekly_retention','retention_payout']);
    // TL override — remove this run's accruals (mirrors the retention reversal above)
    await sb.from('commission_overrides').delete().eq('pay_run_id',rid).eq('reason','finalise_accrual');
    await sb.from('commission_sales').update({commission_paid:null,paid_date:null}).eq('pay_run_id',rid).neq('status','cancelled');
    await sb.from('commission_pay_runs').update({status:'draft'}).eq('id',rid);
    toast('Run un-finalised and unlocked.');
    showRun();
  }catch(e){err(e);}
};

function showImportModal(runId,weekEnding){
  openMod(`<h3 class="font-semibold text-white mb-2">Import Sales from Spreadsheet</h3>
    <p class="text-slate-400 text-sm mb-4">Upload your NZ_Sales.xlsx file. The system will import all sales for week ending <strong>${fmtD(weekEnding)}</strong> (sales dated within that Mon–Sun).</p>
    <label class="text-xs text-slate-400 block mb-1">Select spreadsheet file</label>
    <input type="file" id="mfile" accept=".xlsx,.xls" class="inp mb-4">
    <div id="mimport-status" class="text-sm text-slate-400 mb-4 hidden"></div>
    <div class="flex gap-3">
      <button class="btn gold flex-1" onclick="runImport('${runId}','${weekEnding}')">Import</button>
      <button class="btn dark flex-1" onclick="closeMod()">Cancel</button>
    </div>`);
}

window.runImport=async(runId,weekEnding)=>{
  const file=$('mfile')?.files?.[0];
  if(!file){toast('Please select a file',false);return;}
  const status=$('mimport-status');
  status.textContent='Reading file…';status.classList.remove('hidden');

  try{
    const data=await file.arrayBuffer();
    const wb=XLSX.read(data,{type:'array',cellDates:true});
    const ws=wb.Sheets['Customers'];
    if(!ws){toast('Could not find "Customers" sheet in file',false);return;}
    const rows=XLSX.utils.sheet_to_json(ws,{raw:false,dateNF:'yyyy-mm-dd'});

    // Determine week Mon-Sun
    const wkEnd=new Date(weekEnding+'T12:00:00');
    const wkStart=new Date(wkEnd);wkStart.setDate(wkStart.getDate()-6);

    const PROD_MAP={
      'M1KS':'Mk I King Single','M1Q':'Mk I Queen','M1SK':'Mk I Super King',
      'MK2 KS':'Mk II King Single','M2Q':'Mk II Queen','M2SK':'Mk II Super King',
      'M3KS':'Mk III King Single','M3Q':'Mk III Queen','M3SK':'Mk III Super King',
      'M3CK':'Mk III California King',
    };
    const ACTIVE_NAMES=new Set(consultants.filter(c=>c.active).map(c=>c.name));

    // Robust sale-date parser → returns a local-noon Date, or null if unreadable
    const parseSaleDate=v=>{
      if(v instanceof Date)return isNaN(v)?null:new Date(v.getFullYear(),v.getMonth(),v.getDate(),12);
      if(typeof v==='number'&&XLSX.SSF){const d=XLSX.SSF.parse_date_code(v);if(d)return new Date(d.y,d.m-1,d.d,12);}
      const s=String(v||'').trim();if(!s)return null;
      let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);            // yyyy-mm-dd
      if(m)return new Date(+m[1],+m[2]-1,+m[3],12);
      m=s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})/);        // dd/mm/yyyy (NZ)
      if(m)return new Date(+m[3],+m[2]-1,+m[1],12);
      const d=new Date(s);return isNaN(d)?null:d;
    };

    const num=v=>{const n=parseFloat(String(v??'').replace(/[^0-9.]/g,''));return isNaN(n)?0:n;};
    const findCol=(row,label)=>{const k=Object.keys(row).find(k=>k.trim().toLowerCase()===label);return k===undefined?undefined:row[k];};
    let imported=0,skipped=0;
    for(const row of rows){
      if(row['Cancelled Date'])continue;
      const cons=String(row['Sleep Consultant']||'').trim();
      if(!ACTIVE_NAMES.has(cons)){skipped++;continue;}

      const saleDate=parseSaleDate(row['Sale Date']);
      if(!saleDate){skipped++;continue;}
      if(saleDate<wkStart||saleDate>wkEnd){skipped++;continue;}
      const saleDateStr=`${saleDate.getFullYear()}-${String(saleDate.getMonth()+1).padStart(2,'0')}-${String(saleDate.getDate()).padStart(2,'0')}`;

      const prods=[];
      for(const[col,pname] of Object.entries(PROD_MAP)){
        const qty=parseInt(row[col])||0;
        if(qty>0)prods.push({name:pname,qty});
      }
      if(!prods.length){skipped++;continue;}

      const surname=String(row['Surname']||'').trim();
      const firstname=String(row['First Name']||'').trim();
      const customer=[surname,firstname].filter(Boolean).join(', ');
      const commission=parseFloat(row['C1 Amount'])||0;
      const contractValue=num(findCol(row,'contract value'));
      const paidManually=num(findCol(row,'paid manually'));
      const paidInFull=contractValue>0&&paidManually+0.01>=contractValue;
      const consObj=consultants.find(c=>c.name===cons);
      if(!consObj){skipped++;continue;}

      // Insert sale
      const{data:sale,error:se}=await sb.from('commission_sales').insert({
        pay_run_id:runId,consultant_id:consObj.id,
        sale_date:saleDateStr,customer_name:customer,
        commission_paid:commission,paid_in_full:paidInFull,status:'active',is_historical:false
      }).select().single();
      if(se){console.error(se);skipped++;continue;}

      // Insert items
      for(const p of prods){
        const prod=products.find(x=>x.name===p.name);
        if(prod)await sb.from('commission_sale_items').insert({sale_id:sale.id,product_id:prod.id,quantity:p.qty});
      }
      imported++;
      status.textContent=`Importing… ${imported} done`;
    }
    status.textContent=`Done! ${imported} sales imported, ${skipped} skipped.`;
    toast(`Imported ${imported} sales`);
    setTimeout(()=>{closeMod();go('run',runId);},1500);
  }catch(e){err(e);}
};
