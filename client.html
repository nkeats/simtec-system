<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Simtec — Customer lookup</title>
<script>
// Customer lookup now lives on one page: customer-detail.html.
// It searches, shows the customer, and shows every order they've had with
// all the actions attached. This file exists only so old links and bookmarks
// keep working.
var p = new URLSearchParams(location.search);
var cust = p.get("cust"), id = p.get("id");
var to = "customer-detail.html";
if (cust)      to += "?cust=" + encodeURIComponent(cust);
else if (id)   to += "?id="   + encodeURIComponent(id);
location.replace(to);
</script>
</head>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#eef1f5;color:#1a2334;padding:40px;text-align:center">
  <p>Taking you to the customer page…</p>
  <p><a href="customer-detail.html">Continue</a></p>
</body>
</html>
