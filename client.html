<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Simtec — Client Page</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2.38.4/dist/umd/supabase.js"></script>
<script src="auth.js?v=3" data-roles="admin,manager,office"></script>
<style>
body{font-family:system-ui,sans-serif}
.inp{display:block;width:100%;padding:.6rem .85rem;background:#1e293b;border:1px solid #334155;border-radius:.6rem;color:#fff;font-size:.95rem;box-sizing:border-box}
.inp:focus{outline:none;border-color:#eab308}
.card{background:#1e293b;border:1px solid #334155;border-radius:.75rem;padding:1.1rem 1.25rem}
.lbl{font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;color:#c9a84c;font-weight:700}
.k{color:#7c8aa0;font-size:.8rem}
.v{color:#e6edf6;font-size:.85rem;font-weight:600}
.sq{width:11px;height:11px;border-radius:2px;display:inline-block}
.res:hover{background:#243049}
@media print{.noprint{display:none!important}body{background:#fff;color:#000}.card{border-color:#ccc}}
</style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

<nav class="bg-slate-900 border-b border-slate-800 px-6 py-3 flex items-center gap-3 noprint">
  <span class="font-bold tracking-wide text-lg">SIMTEC</span>
  <span class="text-slate-400 text-sm">Client Page</span>
</nav>

<div class="max-w-5xl mx-auto p-6">
  <!-- Search -->
  <div class="noprint mb-6 relative">
    <input id="q" class="inp" placeholder="🔍  Search a customer by name, mobile, email or address…" autocomplete="off">
    <div id="results" class="absolute left-0 right-0 mt-1 bg-slate-800 border border-slate-700 rounded-lg overflow-hidden z-20 hidden"></div>
  </div>
  <div id="client"></div>
  <div id="empty" class="text-center text-slate-500 py-20">
    <div class="text-5xl mb-3">🛏️</div>
    One search brings up everything about a customer.
  </div>
</div>

<script>
const SUPABASE_URL='https://jvqjoenaungubpoegyvf.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2cWpvZW5hdW5ndWJwb2VneXZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MzQyMjYsImV4cCI6MjA5NjExMDIyNn0.ypVt8578XTdNwBH6TRDn30s1cF_rHTu67qCWYv5XHcQ';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const $=id=>document.getElementById(id);
const DAY=86400000;
const today=new Date();today.setHours(12,0,0,0);
const fmt=n=>'$'+(+n||0).toLocaleString('en-NZ',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD=d=>d?new Date(d+'T12:00:00').toLocaleDateString('en-NZ',{day:'2-digit',month:'short',year:'numeric'}):'—';
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const titleCase=s=>(s||'').replace(/_/g,' ').replace(/\b\w/g,m=>m.toUpperCase());

// ── Search ─────────────────────────────────────────────────────────────────
let tmr=null;
$('q').addEventListener('input',e=>{
  clearTimeout(tmr);const q=e.target.value.trim();
  if(q.length<2){$('results').classList.add('hidden');return;}
  tmr=setTimeout(()=>search(q),250);
});
document.addEventListener('click',e=>{if(!$('results').contains(e.target)&&e.target!==$('q'))$('results').classList.add('hidden');});

async function search(q){
  const like=`%${q}%`;
  const {data,error}=await sb.from('sim_customers')
    .select('id,first_name,last_name,mobile,email,address')
    .or(`first_name.ilike.${like},last_name.ilike.${like},mobile.ilike.${like},email.ilike.${like},address.ilike.${like}`)
    .limit(8);
  const box=$('results');
  if(error){box.innerHTML=`<div class="px-4 py-3 text-sm text-red-400">${esc(error.message)}</div>`;box.classList.remove('hidden');return;}
  if(!data||!data.length){box.innerHTML=`<div class="px-4 py-3 text-sm text-slate-500">No matches</div>`;box.classList.remove('hidden');return;}
  box.innerHTML=data.map(c=>`<div class="res px-4 py-2.5 cursor-pointer border-b border-slate-700/60" onclick="loadClient('${c.id}')">
      <div class="text-sm font-medium">${esc(c.first_name)} ${esc(c.last_name)}</div>
      <div class="text-xs text-slate-500">${esc(c.mobile||'')} · ${esc(c.address||'')}</div>
    </div>`).join('');
  box.classList.remove('hidden');
}

// ── Load one client ────────────────────────────────────────────────────────
async function reinstateClient(oid,cid){
  if(!confirm('Reinstate this customer as Active? This clears the cancellation and returns them to risk and arrears.')) return;
  const {error}=await sb.from('sim_orders').update({order_status:'active',cancellation_date:null,cancellation_reason:null,cancellation_type:null,refunded:null}).eq('id',oid);
  if(error){ alert("Couldn't reinstate: "+error.message); return; }
  loadClient(cid);
}
async function loadClient(custId){
  $('results').classList.add('hidden');$('q').value='';
  const {data:cust}=await sb.from('sim_customers').select('*').eq('id',custId).single();
  const {data:orders}=await sb.from('sim_orders').select('*').eq('customer_id',custId).order('order_date',{ascending:false});
  if(!orders||!orders.length){render(cust,null,[],[]);return;}
  const order=orders[0];
  const ref=order.ezidebit_payer_ref;
  const [{data:items},{data:pays},{data:dishons}]=await Promise.all([
    sb.from('sim_order_items').select('*').eq('order_id',order.id).order('line_no'),
    ref? sb.from('sim_payments').select('payment_date,amount,result').eq('payer_ref',ref).order('payment_date') : Promise.resolve({data:[]}),
    ref? sb.from('sim_dishonours').select('dishonour_date,amount').eq('payer_ref',ref) : Promise.resolve({data:[]})
  ]);
  render(cust,order,items||[],pays||[],orders,dishons||[]);
}
window.loadClient=loadClient;
// Deep-link: client.html?c=<customerId> opens straight to that customer
{const _c=new URLSearchParams(location.search).get('c');if(_c)loadClient(_c);}

// ── Payment maths + timeline (from sim_payments + sim_dishonours) ───────────
function analyse(order,pays,dishons){
  dishons=dishons||[];
  const first=order.first_payment_date;
  const total=order.instalment_count||156;
  const inst=+order.instalment_amount||0;
  const LAG=5;                        // 5-day settlement lag before a week counts as due
  const dueDate=w=>first?new Date(new Date(first+'T12:00:00').getTime()+(w-1)*7*DAY):null;
  const lagCut=new Date(today.getTime()-LAG*DAY);

  // amount paid = the running total the daily import maintains (includes any manual payments)
  let paid=+order.amount_paid_to_date||0;
  if(paid<0)paid=0;

  // paid covers the first N weeks; behind = due weeks past the lag not yet covered
  const weeksCovered = inst>0 ? Math.floor((paid+0.01)/inst) : 0;
  let dueWeeks=0;
  for(let w=1;w<=total;w++){ const d=dueDate(w); if(d && d<lagCut) dueWeeks=w; else break; }

  const cells=[]; let redCount=0;
  for(let w=1;w<=total;w++){
    const due=dueDate(w); let cls,label;
    if(w<=weeksCovered){ cls='#1faa5a'; label='Paid'; }
    else if(w<=dueWeeks){ cls='#dc2626'; label='Behind'; redCount++; }
    else { cls='#475569'; label='Upcoming'; }
    cells.push({w,cls,label,due});
  }
  // caught up but had dishonours in the past → note them as "missed, since recovered"
  const amberCount = (redCount===0 && dishons.length) ? dishons.length : 0;

  const contract=+order.contract_value||0;
  const threshold=contract*0.10;
  const pct=contract?paid/contract*100:0;
  return {paid,contract,balance:contract-paid,pct,threshold,reached:paid>=threshold&&contract>0,
          cells,redCount,amberCount,total};
}

function recommend(order,a){
  const delivered=order.delivery_status==='delivered';
  const cancelled=order.order_status==='cancelled';
  const coolStr=order.cooling_off_expires;
  const coolExpired=coolStr?new Date(coolStr+'T12:00:00')<=today:true;
  const affOk=order.affordability_passed===true;
  const historyOk=a.redCount===0;
  const reasons=[
    [a.reached, a.reached?`10% deposit threshold reached (${fmt(a.paid)} of ${fmt(a.contract)} — ${a.pct.toFixed(1)}%)`
                        :`Under 10% deposit threshold (${fmt(a.paid)} of ${fmt(a.contract)} — ${a.pct.toFixed(1)}%; need ${fmt(a.threshold)})`],
    [historyOk, historyOk?`Payment history satisfactory${a.amberCount?` (${a.amberCount} missed, since recovered)`:''}`
                         :`${a.redCount} payment(s) currently overdue`],
    [affOk, affOk?'Affordability assessment passed':'Affordability assessment not passed'],
    [coolExpired, coolExpired?'Cooling-off period expired':`Cooling-off period not yet expired (until ${fmtD(coolStr)})`]
  ];
  let level,title;
  if(cancelled){level='red';title='ORDER CANCELLED';}
  else if(delivered){level='blue';title='ALREADY DELIVERED'+(order.delivery_date?' · '+fmtD(order.delivery_date):'');}
  else if(!historyOk||!affOk){level='red';title='DO NOT DELIVER';}
  else if(!a.reached||!coolExpired){level='amber';title='HOLD — REVIEW';}
  else {level='green';title='CLEARED FOR DELIVERY';}
  return {level,title,reasons,delivered,cancelled};
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(cust,order,items,pays,orders,dishons){
  $('empty').classList.add('hidden');
  if(!cust){$('client').innerHTML='';return;}
  const name=`${esc(cust.first_name||'')} ${esc(cust.last_name||'')}`.trim();
  if(!order){
    $('client').innerHTML=`<div class="card"><div class="text-xl font-bold">${name}</div>
      <p class="text-slate-500 mt-2 text-sm">No order on file for this customer yet.</p></div>`;return;
  }
  const a=analyse(order,pays,dishons);
  const rec=recommend(order,a);

  const itemRows=items.map(it=>`<div class="flex justify-between py-1 text-sm">
      <span class="text-slate-300">${esc(it.product_name)}${it.quantity>1?` ×${it.quantity}`:''}</span>
      <span class="text-slate-300">${fmt((+it.unit_price||0)*(it.quantity||1))}</span></div>`).join('');

  const legend=[['#1faa5a','Paid'],['#dc2626','Behind'],['#475569','Upcoming']]
    .map(([c,l])=>`<span class="inline-flex items-center gap-1.5 mr-4"><span class="sq" style="background:${c}"></span><span class="text-xs text-slate-400">${l}</span></span>`).join('');
  const grid=a.cells.map(c=>`<span class="sq" title="Week ${c.w}: ${c.label}${c.due?' · '+c.due.toLocaleDateString('en-NZ'):''}" style="background:${c.cls}"></span>`).join('');

  // dated list of actual events: payments (green), refunds (amber), dishonours as $0 missed (red)
  const events=[
    ...(pays||[]).map(p=>({date:p.payment_date, amount:+p.amount||0, kind:p.result==='refund'?'refund':'paid'})),
    ...(dishons||[]).map(d=>({date:d.dishonour_date, amount:+d.amount||0, kind:'missed'}))
  ].filter(e=>e.date).sort((x,y)=>String(y.date).localeCompare(String(x.date)));
  const histRows = events.length ? events.slice(0,50).map(e=>{
    const clr = e.kind==='paid'?'#1faa5a':(e.kind==='refund'?'#e0a010':'#dc2626');
    const lbl = e.kind==='paid'?fmt(e.amount):(e.kind==='refund'?'−'+fmt(e.amount)+' refund':'$0 · missed');
    return `<div class="flex justify-between py-1 text-sm border-b border-slate-800"><span class="text-slate-400">${fmtD(e.date)}</span><span style="color:${clr};font-weight:600">${lbl}</span></div>`;
  }).join('') : '<div class="text-slate-500 text-sm py-2">No payments imported yet for this customer.</div>';

  const banner=(()=>{
    const map={green:['#0f3d2a','#1faa5a','#7ef0b5','✓'],amber:['#3d3110','#e0a010','#ffd97a','!'],
               red:['#3d1414','#dc2626','#ffb0b0','✕'],blue:['#102a3d','#2a8fb5','#9fdcff','ℹ']};
    const [bg,bd,fg,ic]=map[rec.level];
    const reasons=rec.reasons.map(([ok,t])=>`<div class="flex items-start gap-2 text-sm py-0.5">
        <span style="color:${ok?'#7ef0b5':'#ffb0b0'};font-weight:700">${ok?'✓':'✕'}</span>
        <span class="text-slate-100">${t}</span></div>`).join('');
    return `<div class="rounded-xl p-5 mt-5" style="background:${bg};border:2px solid ${bd}">
      <div class="flex items-center gap-3 mb-2">
        <span style="color:${fg};font-size:1.6rem;font-weight:800">${ic}</span>
        <span style="color:${fg};font-size:1.4rem;font-weight:800;letter-spacing:.02em">${rec.title}</span>
      </div>
      <div class="text-xs uppercase tracking-wide mb-2" style="color:${fg}">System recommendation — delivery checks</div>
      ${reasons}
    </div>`;
  })();

  const multi=(orders&&orders.length>1)?`<div class="text-xs text-amber-400 mt-1">This customer has ${orders.length} orders — showing the most recent (${esc(order.order_no)}).</div>`:'';

  $('client').innerHTML=`
    <div class="flex items-end justify-between flex-wrap gap-2 mb-4">
      <div>
        <div class="flex items-center gap-3">
          <h1 class="text-2xl font-bold">${name}</h1>
          <span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${order.order_status==='active'?'bg-green-900 text-green-300':'bg-slate-700 text-slate-300'}">${(order.order_status||'').toUpperCase()} CUSTOMER</span>
        </div>${multi}
      </div>
      <div class="text-right">
        <div class="text-slate-400 text-sm font-semibold">Order ${esc(order.order_no||'')}</div>
        ${(order.order_status==='cancelled'||order.order_status==='on_hold') ? `<button onclick="reinstateClient('${order.id}','${cust.id}')" class="noprint text-xs mt-1 mr-2 px-3 py-1 rounded bg-green-800 border border-green-600 text-green-100 hover:text-white">↩ Reinstate</button>` : ''}
        <button onclick="window.print()" class="noprint text-xs mt-1 px-3 py-1 rounded bg-slate-800 border border-slate-700 text-slate-300 hover:text-white">Print</button>
      </div>
    </div>

    <div class="grid md:grid-cols-2 gap-4">
      <div class="card">
        <div class="lbl mb-2">Customer</div>
        ${row('Mobile',esc(cust.mobile))}${row('Email',esc(cust.email))}${row('Address',esc(cust.address))}
        ${row('Consultant',esc(order.consultant_name))}${row('Sale type',titleCase(order.sale_type))}${row('Order date',fmtD(order.order_date))}
      </div>
      <div class="card">
        <div class="lbl mb-2">Order</div>
        ${itemRows}
        <div class="flex justify-between border-t border-slate-700 mt-2 pt-2 text-sm font-bold"><span>Total</span><span>${fmt(order.contract_value)}</span></div>
        ${row('Payment',`${titleCase(order.payment_method)} · ${fmt(order.instalment_amount)}/wk × ${order.instalment_count}`)}
        ${row('Ezidebit',esc(order.ezidebit_payer_ref))}
        ${order.delivery_status?row('Delivery',titleCase(order.delivery_status)+(order.delivery_date?' · '+fmtD(order.delivery_date):'')):''}
      </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-4">
      ${stat('Paid to date',fmt(a.paid))}
      ${stat('Balance owing',fmt(a.balance))}
      ${stat('% paid',a.pct.toFixed(1)+'%')}
      ${stat('10% threshold',a.reached?'✓ Reached':'Not yet',a.reached?'#1faa5a':'#e0a010')}
    </div>

    <div class="card mt-4">
      <div class="flex items-center justify-between mb-3">
        <div class="lbl">Repayment history</div>
        <div class="text-xs text-slate-500">Week ${Math.min(a.cells.filter(c=>c.cls!=='#475569').length,a.total)} of ${a.total}</div>
      </div>
      <div class="mb-3">${legend}</div>
      <div style="display:flex;flex-wrap:wrap;gap:3px;max-width:${26*14}px">${grid}</div>
      ${a.redCount?`<div class="text-xs text-red-400 mt-3">⚠ ${a.redCount} payment(s) currently overdue.</div>`:
        a.amberCount?`<div class="text-xs text-slate-400 mt-3">${a.amberCount} missed payment(s), since recovered — no payments currently outstanding.</div>`:
        `<div class="text-xs text-slate-400 mt-3">All payments on time.</div>`}
      <div class="mt-4 pt-3 border-t border-slate-800">
        <div class="lbl mb-2">Payments &amp; misses</div>
        <div style="max-height:240px;overflow:auto">${histRows}</div>
      </div>
    </div>

    ${banner}
  `;
}
function row(k,v){return `<div class="flex justify-between py-1"><span class="k">${k}</span><span class="v text-right ml-3">${v||'—'}</span></div>`;}
function stat(k,v,col){return `<div class="card text-center"><div class="lbl mb-1">${k}</div><div class="text-xl font-bold" style="${col?`color:${col}`:''}">${v}</div></div>`;}
</script>
</body>
</html>
