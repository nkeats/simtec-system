<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simtec — My Sales</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js?v=3" data-roles="admin,manager,consultant"></script>
<style>
  :root{--navy:#122347;--navy2:#1c3363;--gold:#c6a15b;--ink:#1a2334;--line:#d9e0ea;--bg:#eef1f5;--grey:#7a8798;}
  *{box-sizing:border-box}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);margin:0}
  header{background:var(--navy);color:#fff;padding:18px 22px;display:flex;align-items:center;gap:14px}
  header .back{color:#b9c6de;text-decoration:none;font-size:13px;font-weight:600}
  header .back:hover{color:#fff}
  header .brand{font-weight:700;font-size:19px;letter-spacing:.5px}
  header .brand small{display:block;font-size:10px;letter-spacing:.22em;color:var(--gold);font-weight:600}
  .wrap{max-width:920px;margin:20px auto;padding:0 16px}
  .namebar{text-align:center;font-size:16px;font-weight:700;color:var(--navy);margin-bottom:14px}
  .pickcard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 18px;margin-bottom:16px;text-align:center}
  .pickcard label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:#6b7889;margin-bottom:7px}
  .pickcard select{padding:9px 12px;border:1px solid #cbd4df;border-radius:8px;font-size:15px;min-width:260px;background:#fff}
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
  .tile{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .tile .l{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:#6b7889}
  .tile .n{font-size:28px;font-weight:800;color:var(--navy);margin-top:3px}
  .award{background:linear-gradient(135deg,#122347,#1c3363);color:#fff;border-radius:12px;padding:18px 20px;margin-bottom:18px}
  .award .l{font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);font-weight:700}
  .award .name{font-size:22px;font-weight:800;margin:2px 0 4px}
  .award .desc{font-size:13px;color:#c3d0e6}
  .bar{height:10px;background:rgba(255,255,255,.15);border-radius:99px;margin:12px 0 6px;overflow:hidden}
  .bar > div{height:100%;background:var(--gold);border-radius:99px;transition:width .4s}
  .award .prog{font-size:13px;color:#e7edf7}
  .award.max{background:linear-gradient(135deg,#6a4e12,#c6a15b);}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .card h2{font-size:13px;text-transform:uppercase;letter-spacing:.07em;color:var(--navy);margin:0;padding:16px 18px 12px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--line)}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  tr.sale{cursor:pointer} tr.sale:hover{background:#f7fafc}
  tr.det td{background:#fafbfc;padding:0}
  .detin{padding:14px 18px;display:grid;grid-template-columns:1fr 1fr;gap:8px 22px}
  .kv{display:flex;justify-content:space-between;gap:12px;font-size:13.5px;padding:3px 0;border-bottom:1px dotted #e6ebf1}
  .kv .k{color:#6b7889} .kv .v{font-weight:600;text-align:right}
  .full{grid-column:1/-1}
  .muted{color:var(--grey)} #state{padding:30px;text-align:center;color:#6b7889}
  @media(max-width:640px){.detin{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <a href="home.html" id="homeLink" class="back" style="display:none">‹ Home</a>
  <div class="brand">My Sales<small>SIMTEC THERAPEUTIC</small></div>
</header>

<div class="wrap">
  <div id="topbar"></div>
  <div id="body"><div id="state">Loading…</div></div>
</div>

<script>
const sb = supabase.createClient("https://jvqjoenaungubpoegyvf.supabase.co","sb_publishable_J4MYTdJJyEaWe-GadpwdYA_upPT2rKw");
const $=id=>document.getElementById(id);
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function auDate(v){ if(!v) return "—"; const m=String(v).match(/^(\d{4})-(\d{2})-(\d{2})/); return m? m[3]+"/"+m[2]+"/"+m[1] : v; }
function weekStart(d){ const dt=new Date(d+"T12:00:00"); const off=(dt.getDay()+6)%7; dt.setDate(dt.getDate()-off); return dt.toISOString().slice(0,10); }
const TODAY=new Date().toISOString().slice(0,10);
const THIS_WEEK=weekStart(TODAY);

const AWARDS=[
  {name:"Initial",       type:"single", target:10, desc:"10+ sales in a single week"},
  {name:"Pearl",         type:"consec", span:3, target:8,  desc:"3 straight weeks of 8+ sales"},
  {name:"Ruby",          type:"single", target:15, desc:"15+ sales in a single week (team-leader level)"},
  {name:"Emerald",       type:"window", span:4, target:35, desc:"35 sales over any 4-week period"},
  {name:"Sapphire",      type:"single", target:20, desc:"20+ sales in a single week"},
  {name:"Grand Diamond", type:"consec", span:6, target:10, desc:"6 straight weeks of 10+ sales"},
];
// Hardwired starting awards for consultants whose history predates the system.
// New consultants aren't listed — they earn Initial through their sales.
const BASELINES={
  "kenzie lam sam":"Ruby", "yazan othman":"Ruby",
  "kono harris":"Initial", "stacey numanga":"Initial", "pj tonga":"Initial"
};

(function init(){
  const u=window.SIMTEC_USER;
  if(!u){ return setTimeout(init,80); }
  if(["admin","manager","office"].indexOf(u.role)>=0){ $("homeLink").style.display=""; }
  if(u.consultant_name){
    $("topbar").innerHTML=`<div class="namebar">${esc(u.consultant_name)}</div>`;
    loadFor(u.consultant_name);
  } else {
    sb.from("commission_consultants").select("name").order("name").then(({data})=>{
      const names=[...new Set((data||[]).map(d=>d.name).filter(Boolean))];
      $("topbar").innerHTML=`<div class="pickcard"><label>Viewing consultant</label>
        <select id="pick" onchange="loadFor(this.value)"><option value="">— choose a consultant —</option>${names.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join("")}</select></div>`;
      $("state").textContent="Choose a consultant to view.";
    });
  }
})();

async function loadFor(name){
  if(!name){ $("body").innerHTML='<div id="state">Choose a consultant to view.</div>'; return; }
  $("body").innerHTML='<div id="state">Loading…</div>';
  const { data:cons } = await sb.from("commission_consultants").select("id").eq("name",name).maybeSingle();
  if(!cons){ $("body").innerHTML='<div id="state">No consultant record found for '+esc(name)+'.</div>'; return; }
  const { data:sales, error:se } = await sb.from("commission_sales")
    .select("id,sale_date,status,cancelled_date,customer_name,sim_order_id")
    .eq("consultant_id", cons.id).order("sale_date",{ascending:false});
  if(se){ $("body").innerHTML='<div id="state" style="color:#c0332e">Couldn\u2019t load sales: '+esc(se.message)+'</div>'; return; }
  const { data:orders } = await sb.from("sim_orders")
    .select("id,order_date,order_status,contract_value,customer_id, sim_customers(first_name,last_name,mobile,email,address), sim_order_items(product_name,quantity,line_no)")
    .eq("consultant_name", name).order("order_date",{ascending:false});
  render(name, sales||[], orders||[], BASELINES[name.toLowerCase().trim()]||null);
}

// A sale drops off the award count only if cancelled BEFORE THE END OF THE
// FOLLOWING WEEK (the Sunday after its sale week). Cancelled later → still counts.
function cancelCutoff(d){ const x=new Date(weekStart(d)+"T12:00:00"); x.setDate(x.getDate()+13); return x.toISOString().slice(0,10); }
function eligible(s){
  if(!s.sale_date) return false;
  if((s.status||"active")!=="cancelled") return true;
  if(!s.cancelled_date) return true;
  return s.cancelled_date > cancelCutoff(s.sale_date);
}
function weeklySeries(sales){
  const seen={};
  sales.forEach(s=>{ if(!s.sale_date) return; const w=weekStart(s.sale_date); const key=(s.customer_name||"").toLowerCase().trim()||s.id; (seen[w]=seen[w]||new Set()).add(key); });
  const weeks=Object.keys(seen); if(!weeks.length) return [];
  const first=weeks.sort()[0]; const series=[]; let d=new Date(first+"T12:00:00"); const end=new Date(THIS_WEEK+"T12:00:00");
  while(d<=end){ const k=d.toISOString().slice(0,10); series.push({week:k, count:(seen[k]?seen[k].size:0)}); d.setDate(d.getDate()+7); }
  return series;
}
function bestSingle(s){ return s.reduce((m,x)=>Math.max(m,x.count),0); }
function bestConsec(s,t){ let b=0,r=0; s.forEach(x=>{ r=x.count>=t?r+1:0; b=Math.max(b,r); }); return b; }
function bestWindow(s,span,t){ let b=0; for(let i=0;i+span<=s.length;i++){ let sum=0; for(let j=0;j<span;j++) sum+=s[i+j].count; b=Math.max(b,sum);} if(s.length<span) b=s.reduce((a,x)=>a+x.count,0); return b; }
function met(a,s){ if(a.type==="single")return bestSingle(s)>=a.target; if(a.type==="consec")return bestConsec(s,a.target)>=a.span; if(a.type==="window")return bestWindow(s,a.span,a.target)>=a.target; return false; }
function prog(a,s){
  if(a.type==="single"){ const b=bestSingle(s); return {have:b,need:a.target,label:`Best week: ${b} of ${a.target}`}; }
  if(a.type==="consec"){ const b=bestConsec(s,a.target); return {have:b,need:a.span,label:`Best run: ${b} of ${a.span} weeks at ${a.target}+`}; }
  if(a.type==="window"){ const b=bestWindow(s,a.span,a.target); return {have:b,need:a.target,label:`Best ${a.span} weeks: ${b} of ${a.target}`}; }
  return {have:0,need:1,label:""};
}

function render(name, sales, orders, baseline){
  const elig = sales.filter(eligible);
  const series = weeklySeries(elig);
  const thisWeek = elig.filter(s=>s.sale_date && weekStart(s.sale_date)===THIS_WEEK).length;
  const last4 = series.slice(-4).reduce((a,x)=>a+x.count,0);

  let achieved=0; for(const a of AWARDS){ if(met(a,series)) achieved++; else break; }
  const baseIdx = baseline ? AWARDS.findIndex(a=>a.name===baseline) : -1;
  achieved = Math.max(achieved, baseIdx+1);
  const next = achieved < AWARDS.length ? AWARDS[achieved] : null;

  let awardHTML;
  if(!next){
    awardHTML=`<div class="award max"><div class="l">Top honour reached</div><div class="name">Grand Diamond 💎</div><div class="desc">Every award earned. Outstanding.</div></div>`;
  } else {
    const p=prog(next,series); const pct=Math.max(4,Math.min(100,Math.round(p.have/p.need*100)));
    awardHTML=`<div class="award"><div class="l">Next award${achieved?` · ${achieved} earned`:""}</div>
      <div class="name">${next.name}</div><div class="desc">${next.desc}</div>
      <div class="bar"><div style="width:${pct}%"></div></div><div class="prog">${p.label}</div></div>`;
  }

  const active = orders.filter(o=>(o.order_status||"active")!=="cancelled");
  const rows = active.map((o,i)=>{
    const c=o.sim_customers||{}; const cname=`${c.first_name||""} ${c.last_name||""}`.trim()||"(no name)";
    const items=(o.sim_order_items||[]).slice().sort((a,b)=>(a.line_no||0)-(b.line_no||0));
    const pd=items.map(it=>(it.quantity>1?it.quantity+"× ":"")+it.product_name).join(", ")||"—";
    const det=`<tr class="det" id="det${i}" style="display:none"><td colspan="3"><div class="detin">
      <div class="kv"><span class="k">Phone</span><span class="v">${esc(c.mobile)||"—"}</span></div>
      <div class="kv"><span class="k">Email</span><span class="v">${esc(c.email)||"—"}</span></div>
      <div class="kv full"><span class="k">Address</span><span class="v">${esc(c.address)||"—"}</span></div>
      <div class="kv full"><span class="k">Products</span><span class="v">${esc(pd)}</span></div>
    </div></td></tr>`;
    return `<tr class="sale" onclick="tog(${i})">
      <td><b>${esc(cname)}</b><div class="muted" style="font-size:12px">${esc(pd)}</div></td>
      <td>${auDate(o.order_date)}</td><td class="num">$${Math.round(+o.contract_value||0).toLocaleString()}</td>
    </tr>${det}`;
  }).join("");

  const gap = elig.length > active.length;
  $("body").innerHTML=`
    <div class="tiles">
      <div class="tile"><div class="l">Sales this week</div><div class="n">${thisWeek}</div></div>
      <div class="tile"><div class="l">Sales · last 4 weeks</div><div class="n">${last4}</div></div>
    </div>
    ${awardHTML}
    <div class="card">
      <h2>My customers · ${active.length} in the system</h2>
      ${active.length ? `<table><thead><tr><th>Customer / products</th><th>Sale date</th><th class="num">Value</th></tr></thead><tbody>${rows}</tbody></table>`
        : `<div id="state">No customers to show here yet.</div>`}
      ${gap ? `<div style="padding:10px 18px;font-size:12px;color:#7a8798;border-top:1px solid #eef1f4">Your sales count comes from the pay record. A few older/imported sales aren\u2019t in the operating system yet, so they don\u2019t appear in this contact list — new sales entered here will.</div>` : ""}
    </div>`;
}
window.tog=i=>{ const d=$("det"+i); if(d) d.style.display = d.style.display==="none" ? "table-row" : "none"; };
</script>
</body>
</html>
