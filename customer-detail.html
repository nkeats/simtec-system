<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simtec — Customer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js?v=3" data-roles="admin,manager,office"></script>
<style>
  :root{--navy:#122347;--navy2:#1c3363;--gold:#c6a15b;--ink:#1a2334;--line:#d9e0ea;--bg:#eef1f5;
        --red:#c0332e;--amber:#b8860b;--green:#1c6b34;--grey:#7a8798;}
  *{box-sizing:border-box}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg);margin:0}
  .sheet{max-width:820px;margin:0 auto;padding:22px 18px}
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .brand{font-weight:700;color:var(--navy);font-size:20px;letter-spacing:.5px}
  .brand small{display:block;font-size:11px;color:var(--gold);letter-spacing:.18em;font-weight:600}
  .btns{margin-left:auto;display:flex;gap:8px}
  button{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer}
  button.ghost{background:#fff;color:var(--navy);border:1px solid #cbd4df}
  button.danger{background:#c0332e}
  button.danger:hover{background:#a82a26}
  .cancelbanner{background:#fdecec;color:#a02020;border:1px solid #f2bdbd;border-radius:10px;padding:11px 15px;margin-top:12px;font-weight:600;font-size:14px}
  .modalbg{display:none;position:fixed;inset:0;background:rgba(10,20,40,.55);z-index:1000;align-items:center;justify-content:center;padding:20px}
  .modal{background:#fff;border-radius:14px;max-width:440px;width:100%;padding:24px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
  .modal h3{margin:0 0 16px;color:#122347;font-size:18px}
  .modal .ml{display:block;font-weight:600;font-size:12.5px;color:#3a4759;margin:14px 0 5px}
  .modal .mi{width:100%;padding:10px 11px;border:1px solid #cbd4df;border-radius:8px;font-size:14.5px;font-family:inherit}
  .modal .mchk{display:flex;align-items:center;gap:8px;font-size:14px;margin-top:14px;color:#1a2334}
  .modal .mchk input{width:auto}
  .mbtns{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
  .mbtns button{padding:10px 18px;border-radius:9px;font-size:14.5px;font-weight:600;cursor:pointer;border:none}
  .mghost{background:#fff;color:#122347;border:1px solid #cbd4df !important}
  .mdanger{background:#a02020;color:#fff}
  .holdbanner{background:#fff6da;color:#8a6d00;border:1px solid #ecd98a;border-radius:10px;padding:11px 15px;margin-top:12px;font-weight:600;font-size:14px}
  .head{background:var(--navy);color:#fff;border-radius:12px;padding:18px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .head h1{margin:0;font-size:22px}
  .badge{margin-left:auto;font-weight:700;font-size:13px;padding:5px 12px;border-radius:20px;background:#fff}
  .badge.red{color:var(--red)} .badge.amber{color:var(--amber)} .badge.green{color:var(--green)} .badge.grey{color:var(--grey)}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .card.full{grid-column:1/-1}
  .card h2{margin:0 0 12px;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--navy);border-bottom:2px solid var(--gold);padding-bottom:7px;display:inline-block}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:5px 0;font-size:14px;border-bottom:1px dotted #e6ebf1}
  .kv:last-child{border-bottom:none}
  .kv .k{color:#6b7889} .kv .v{font-weight:600;text-align:right}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:7px 9px;border-bottom:1px solid var(--line);text-align:left}
  th{background:#f3f6fa;color:var(--navy);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .muted{color:#8a97a6}
  .missed{background:#fdecec;color:#a02020;border:1px solid #f2bdbd;border-radius:8px;padding:10px 13px;margin-bottom:11px;font-size:13.5px;line-height:1.5}
  @media print{.missed{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
  .big{font-size:20px;font-weight:700}
  #err{padding:30px;text-align:center;color:#a02020}
  @media print{
    body{background:#fff} .no-print{display:none!important}
    .sheet{max-width:100%;padding:0}
    .card,.head{break-inside:avoid;border:1px solid #ccc}
    .head{background:var(--navy)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
  @media(max-width:640px){.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="sheet" id="sheet">
  <div class="topbar no-print">
    <div class="brand">SIMTEC<small>THERAPEUTIC</small></div>
    <div class="btns">
      <button class="ghost" onclick="location.href='home.html'">Home</button>
      <button class="ghost" onclick="history.length>1?history.back():window.close()">Back</button>
      <span id="statusBtns"></span>
      <button onclick="window.print()">Print</button>
    </div>
  </div>
  <div id="content"><p class="muted" style="padding:20px">Loading…</p></div>
</div>

<script>
const sb = supabase.createClient("https://jvqjoenaungubpoegyvf.supabase.co","sb_publishable_J4MYTdJJyEaWe-GadpwdYA_upPT2rKw");
const params=new URLSearchParams(location.search);
const orderId=params.get("id");

const fmt=n=>(n==null||n==="")?"—":"$"+Number(n).toLocaleString(undefined,{maximumFractionDigits:0});
function auDate(v){ if(!v) return "—"; const m=String(v).match(/^(\d{4})-(\d{2})-(\d{2})/); if(m) return m[3]+"/"+m[2]+"/"+m[1]; const d=new Date(v); return isNaN(d)?v:String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear(); }
const cap=s=>s?s.charAt(0).toUpperCase()+s.slice(1):"—";
const PM={weekly_dd:"Weekly direct debit",fortnightly_dd:"Fortnightly direct debit",deposit_50:"50% deposit",pay_in_full:"Pay in full",cash:"Cash"};
const DS={pending:"Pending",scheduled:"Scheduled",delivered:"Delivered",on_hold:"On hold",cancelled:"Cancelled"};
const CXT={customer_request:"customer requested",company_overcommit:"we cancelled — over-committed",company_other:"we cancelled"};
const PERIODS={weekly:{per:7,total:156,word:"wk"},fortnightly:{per:14,total:78,word:"fn"},monthly:{per:30.44,total:36,word:"mo"}};

function position(o){
  const contract=o.contract_value!=null?Number(o.contract_value):null;
  const paid=o.amount_paid_to_date!=null?Number(o.amount_paid_to_date):0;
  const delivered=(o.delivery_status||"")==="delivered";
  const freq=PERIODS[o.payment_frequency]||PERIODS.weekly;
  const start=o.first_payment_date||o.order_date;
  let expected=null,behindBy=0,periodsBehind=0,cls="grey",label="No plan";
  if(contract==null||contract<=0) return {cls:"grey",label:"No contract value",contract,paid,expected:null,behindBy:0,periodsBehind:0,freq,balance:null};
  if(paid>=contract*0.999) return {cls:"green",label:"Paid up",contract,paid,expected:contract,behindBy:0,periodsBehind:0,freq,balance:0};
  if(start){
    const days=(new Date()-new Date(start))/86400000;
    const perAmt=contract/freq.total;
    expected=Math.min(contract,perAmt*Math.max(0,days/freq.per));
    behindBy=expected-paid; periodsBehind=perAmt>0?behindBy/perAmt:0;
    if(behindBy<=perAmt){cls="green";label="On track";}
    else if(!delivered){cls="amber";label="Behind — not delivered";}
    else {cls="red";label="Behind — DELIVERED";}
  } else { cls=delivered?"amber":"grey"; label=delivered?"Delivered, no payments seen":"No payment plan yet"; }
  return {cls,label,contract,paid,expected,behindBy:Math.max(0,behindBy),periodsBehind:Math.max(0,periodsBehind),freq,balance:contract-paid};
}

async function run(){
  if(!orderId){ document.getElementById("content").innerHTML='<div id="err">No customer specified.</div>'; return; }
  try{
    const {data:o,error}=await sb.from("sim_orders").select("*").eq("id",orderId).single();
    if(error||!o) throw new Error("Customer record not found.");
    let cust={};
    if(o.customer_id){ const {data}=await sb.from("sim_customers").select("*").eq("id",o.customer_id).single(); cust=data||{}; }
    const {data:items}=await sb.from("sim_order_items").select("product_name,quantity,unit_price").eq("order_id",orderId).order("line_no");
    let pays=[];
    if(o.ezidebit_payer_ref){ const {data}=await sb.from("sim_payments").select("payment_date,amount").eq("payer_ref",o.ezidebit_payer_ref).order("payment_date",{ascending:false}); pays=data||[]; }
    render(o,cust,items||[],pays);
  }catch(e){ document.getElementById("content").innerHTML='<div id="err">'+(e.message||e)+'</div>'; }
}

function render(o,c,items,pays){
  const name=[c.first_name,c.last_name].filter(Boolean).join(" ")||"(no name)";
  const p=position(o);
  const behindTxt = p.behindBy>1 ? `${fmt(p.behindBy)} behind (${p.periodsBehind.toFixed(0)} ${p.freq.word})` : (p.cls==="green"?"On track":"—");

  const contact=`<div class="card"><h2>Contact</h2>
    ${kv("Mobile",c.mobile||"—")}
    ${kv("Email",c.email||"—")}
    ${kv("Address",c.address||"—")}
    ${o.joint_purchase?kv("Joint purchaser",(o.second_customer_name||"—")+(o.second_customer_mobile?" · "+o.second_customer_mobile:"")):""}
    ${o.referrer_name?kv("Referred by",o.referrer_name):""}
  </div>`;

  const sale=`<div class="card"><h2>Sale</h2>
    ${kv("Consultant",o.consultant_name||"—")}
    ${o.team_leader_name?kv("Team leader",o.team_leader_name):""}
    ${kv("Sale date",auDate(o.order_date))}
    ${kv("Sale type",cap(o.sale_type))}
    ${kv("Payment method",PM[o.payment_method]||o.payment_method||"—")}
    ${kv("Frequency",cap(o.payment_frequency))}
    ${kv("Ezidebit Payer ID",o.ezidebit_payer_ref||"—")}
    ${kv("First payment",auDate(o.first_payment_date))}
  </div>`;

  const money=`<div class="card"><h2>Account</h2>
    ${kv("Total sale value",fmt(o.contract_value))}
    ${kv("Paid to date",fmt(o.amount_paid_to_date))}
    ${kv("Balance owing",fmt(p.balance))}
    ${kv("Expected by now",fmt(p.expected))}
    ${kv("Position",`<span class="${p.cls==='red'?'':''}" style="color:${p.cls==='red'?'var(--red)':p.cls==='amber'?'var(--amber)':p.cls==='green'?'var(--green)':'var(--grey)'}">${behindTxt}</span>`)}
    ${kv("Paid in full",o.paid_in_full?"Yes":"No")}
  </div>`;

  const delivery=`<div class="card"><h2>Delivery</h2>
    ${kv("Status",DS[o.delivery_status]||o.delivery_status||"—")}
    ${kv("Delivery date",auDate(o.delivery_date))}
    ${o.driver_name?kv("Driver",o.driver_name):""}
    ${kv("Order status",cap(o.order_status))}
  </div>`;

  const prodRows = items.length
    ? items.map(i=>`<tr><td>${i.product_name||""}</td><td class="num">${i.quantity}</td><td class="num">${i.unit_price!=null?fmt(i.unit_price):""}</td></tr>`).join("")
    : `<tr><td colspan="3" class="muted">No product lines recorded.</td></tr>`;
  const products=`<div class="card full"><h2>Products</h2>
    <table><thead><tr><th>Product</th><th class="num">Qty</th><th class="num">Unit price</th></tr></thead><tbody>${prodRows}</tbody></table></div>`;

  const payRows = pays.length
    ? pays.slice(0,60).map(x=>`<tr><td>${auDate(x.payment_date)}</td><td class="num">${fmt(x.amount)}</td></tr>`).join("")
    : `<tr><td colspan="2" class="muted">No payments recorded yet.</td></tr>`;
  const totalPaidLedger = pays.reduce((s,x)=>s+Number(x.amount||0),0);

  let missedBlock="";
  if(p.cls==="red"||p.cls==="amber"){
    const startStr=o.first_payment_date||o.order_date;
    if(startStr){
      const due=[]; let d=new Date(startStr); const now=new Date();
      while(d<=now && due.length<500){ due.push(new Date(d)); d=new Date(d.getTime()+p.freq.per*86400000); }
      const missedN=Math.min(due.length, Math.max(1, Math.round(p.periodsBehind)));
      if(missedN>0){
        const missedDates=due.slice(due.length-missedN).map(x=>auDate(x.toISOString().slice(0,10)));
        missedBlock=`<div class="missed"><b>Behind by about ${missedN} payment${missedN>1?"s":""}</b> (based on the ${cap(o.payment_frequency||"weekly")} plan). Due dates not covered by payments to date: ${missedDates.join(", ")}.</div>`;
      }
    }
  }

  const history=`<div class="card full"><h2>Payment history${pays.length?` — ${pays.length} payments, ${fmt(totalPaidLedger)}`:""}</h2>
    ${missedBlock}
    <table><thead><tr><th>Date</th><th class="num">Amount</th></tr></thead><tbody>${payRows}</tbody></table></div>`;

  const st = (o.order_status||"active");
  const isCancelled = st==="cancelled";
  const isHold = st==="on_hold";
  const badgeCls = isCancelled ? "grey" : (isHold ? "amber" : p.cls);
  const badgeLabel = isCancelled ? "Cancelled" : (isHold ? "On hold" : p.label);
  let banner = "";
  if(isCancelled){ const ct=CXT[o.cancellation_type]||""; banner = `<div class="cancelbanner">Cancelled${o.cancellation_date?" on "+auDate(o.cancellation_date):""}${ct?" · "+ct:""}${o.refunded?" · refunded":""}${o.cancellation_reason?" — "+o.cancellation_reason:""}</div>`; }
  else if(isHold) banner = `<div class="holdbanner">On hold — excluded from risk and arrears until set back to active.</div>`;

  document.getElementById("content").innerHTML=`
    <div class="head"><h1>${name}</h1><span class="badge ${badgeCls}">${badgeLabel}</span></div>
    ${banner}
    <div class="cards">${contact}${sale}${money}${delivery}${products}${history}</div>`;
  document.title="Simtec — "+name;

  document.getElementById("statusBtns").innerHTML =
    `<label style="color:#9fb0c9;font-size:12px;margin-right:6px">Status</label>` +
    `<select id="statusSel" onchange="onStatusChange(this.value)" style="padding:8px 10px;border:1px solid #cbd4df;border-radius:8px;font-size:14px;font-weight:600">` +
      `<option value="active"${st==="active"?" selected":""}>Active</option>` +
      `<option value="on_hold"${st==="on_hold"?" selected":""}>On hold</option>` +
      `<option value="cancelled"${st==="cancelled"?" selected":""}>Cancelled</option>` +
    `</select>`;
}
function kv(k,v){ return `<div class="kv"><span class="k">${k}</span><span class="v">${v}</span></div>`; }

async function onStatusChange(newStatus){
  if(newStatus==="cancelled"){ openCancel(); return; }   // handled by the dialog below
  let patch = { order_status:newStatus, cancellation_date:null, cancellation_reason:null, cancellation_type:null, refunded:null };
  if(newStatus==="on_hold"){
    if(!confirm("Put this customer on hold? They'll be paused from risk and arrears until set back to active.")){ run(); return; }
  }
  const {error} = await sb.from("sim_orders").update(patch).eq("id",orderId);
  if(error){ alert("Couldn't update status: "+error.message); run(); return; }
  run();
}
function openCancel(){ document.getElementById("cxNotes").value=""; document.getElementById("cxRefund").checked=false; document.getElementById("cxType").value="customer_request"; document.getElementById("cancelModal").style.display="flex"; }
function closeCancel(){ document.getElementById("cancelModal").style.display="none"; run(); }
async function confirmCancel(){
  const patch = {
    order_status:"cancelled",
    cancellation_date:new Date().toISOString().slice(0,10),
    cancellation_type:document.getElementById("cxType").value,
    refunded:document.getElementById("cxRefund").checked,
    cancellation_reason:(document.getElementById("cxNotes").value||"").trim()||null
  };
  const {error} = await sb.from("sim_orders").update(patch).eq("id",orderId);
  if(error){ alert("Couldn't cancel: "+error.message); return; }
  document.getElementById("cancelModal").style.display="none"; run();
}

run();
</script>
<div id="cancelModal" class="modalbg">
  <div class="modal">
    <h3>Cancel this customer</h3>
    <label class="ml">Who initiated the cancellation?</label>
    <select id="cxType" class="mi">
      <option value="customer_request">Customer requested it</option>
      <option value="company_overcommit">We cancelled — customer was over-committed / couldn't afford it</option>
      <option value="company_other">We cancelled — other reason</option>
    </select>
    <label class="mchk"><input type="checkbox" id="cxRefund"> Money was refunded to the customer</label>
    <label class="ml">Notes (optional)</label>
    <textarea id="cxNotes" class="mi" rows="3"></textarea>
    <div class="mbtns">
      <button class="mghost" onclick="closeCancel()">Back</button>
      <button class="mdanger" onclick="confirmCancel()">Cancel customer</button>
    </div>
  </div>
</div>
</body>
</html>
