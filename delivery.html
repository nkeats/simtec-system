<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Simtec — Delivery</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2.38.4/dist/umd/supabase.js"></script>
<script src="auth.js?v=3" data-roles="admin,manager,office"></script>
<style>
body{font-family:system-ui,sans-serif}
.card{background:#1e293b;border:1px solid #334155;border-radius:.75rem;padding:1.1rem 1.25rem}
.lbl{font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;color:#c9a84c;font-weight:700}
.k{color:#7c8aa0;font-size:.75rem}
.btn{padding:.4rem .85rem;border-radius:.5rem;font-size:.8rem;font-weight:600;cursor:pointer;border:1px solid #334155;background:#1e293b;color:#94a3b8}
.btn.on{background:#c9a84c;color:#1a2438;border-color:#c9a84c}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;letter-spacing:.02em}
.pill{display:inline-block;min-width:20px;text-align:center;font-size:11px;font-weight:700;padding:1px 7px;border-radius:999px;background:#14361f;color:#4ade80;margin-left:6px}
.dl:hover{background:#243049}
.inp{display:block;width:100%;padding:.55rem .8rem;background:#0f172a;border:1px solid #334155;border-radius:.6rem;color:#fff;font-size:.95rem;box-sizing:border-box}
.maplink{color:#7dd3fc;font-size:.8rem;text-decoration:none}.maplink:hover{text-decoration:underline}
.gold{background:#c9a84c;color:#1a2438;border:none}
.ov{position:fixed;inset:0;background:rgba(2,6,23,.7);display:none;align-items:center;justify-content:center;z-index:50;padding:1rem}
.ov.show{display:flex}
.modal{background:#1e293b;border:1px solid #334155;border-radius:.9rem;padding:1.5rem;max-width:24rem;width:100%}
@media print{.noprint{display:none!important}body{background:#fff;color:#000}.card{border-color:#ccc}}
</style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

<nav class="bg-slate-900 border-b border-slate-800 px-6 py-3 flex items-center gap-3 noprint">
  <a href="home.html" style="color:#cbd5e1;text-decoration:none;font-size:.85rem;margin-right:8px">‹ Home</a><span class="font-bold tracking-wide text-lg">SIMTEC</span>
  <span class="text-slate-400 text-sm">Delivery</span>
</nav>

<div class="max-w-5xl mx-auto p-6">
  <div id="summary" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5"></div>
  <div id="tabs" class="flex flex-wrap items-center gap-2 mb-4 noprint"></div>
  <div id="runhead"></div>
  <div id="list"></div>
  <div id="state" class="text-center text-slate-500 py-20">Loading deliveries…</div>
</div>

<div class="ov" id="ov"><div class="modal">
  <h3 class="font-semibold text-white mb-1">Book delivery</h3>
  <p id="ovwho" class="text-slate-500 text-xs mb-4"></p>
  <label class="k block mb-1">Delivery date</label>
  <input type="date" id="bkdate" class="inp mb-3">
  <label class="k block mb-1">Time (optional)</label>
  <input type="time" id="bktime" class="inp mb-4">
  <div class="flex gap-3">
    <button class="btn gold flex-1" onclick="saveBooking()">Confirm booking</button>
    <button class="btn flex-1" onclick="closeOv()">Cancel</button>
  </div>
</div></div>

<script>
const SUPABASE_URL='https://jvqjoenaungubpoegyvf.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2cWpvZW5hdW5ndWJwb2VneXZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MzQyMjYsImV4cCI6MjA5NjExMDIyNn0.ypVt8578XTdNwBH6TRDn30s1cF_rHTu67qCWYv5XHcQ';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const $=id=>document.getElementById(id);
const DAY=86400000;
const today=new Date();today.setHours(12,0,0,0);
const now=new Date();
const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
const fmtD=d=>d?new Date(d+'T12:00:00').toLocaleDateString('en-NZ',{weekday:'short',day:'2-digit',month:'short'}):'—';
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const titleCase=s=>(s||'').replace(/_/g,' ').replace(/\b\w/g,m=>m.toUpperCase());
const suburb=a=>{const p=(a||'').split(',');return (p[1]||p[0]||'').trim();};

let RULES=[];
function ruleFor(depositPct){
  let r=RULES[0]||{weekly:8,fortnightly:4,monthly:2,miss_allowed:1};
  for(const x of RULES){ if(depositPct*100 >= x.min_deposit_pct) r=x; }
  return r;
}
function cleared(order,payAcct,counts){
  if(order.order_status==='cancelled')return false;
  if(order.delivery_authorised===true) return true;                 // admin override
  const coolStr=order.cooling_off_expires;
  const coolExpired=coolStr?new Date(coolStr+'T12:00:00')<=today:true;
  if(!coolExpired) return false;                                     // never deliver inside cooling-off
  if(order.affordability_passed===false) return false;              // explicit affordability fail
  const contract=+payAcct.contract_value||0;
  const isCash=(payAcct.payment_method||'').toLowerCase()==='cash';
  const depositPct = contract>0 ? (+payAcct.deposit_amount||0)/contract : 0;
  if(payAcct.paid_in_full || isCash || depositPct>=0.5) return true; // immediate
  const rule=ruleFor(depositPct);
  const freq=payAcct.payment_frequency||'weekly';
  const required = rule[freq]!=null ? rule[freq] : rule.weekly;
  const ref=payAcct.ezidebit_payer_ref;
  const c = ref && counts[ref] ? counts[ref] : {paid_count:0,dishonour_count:0};
  if(c.dishonour_count > rule.miss_allowed) return false;            // too many fails
  return c.paid_count >= required;                                    // deposit counts as payment #1
}

let rows=[], filter='ready';

async function load(){
  const {data:rules}=await sb.from('delivery_rules').select('*').order('min_deposit_pct');
  RULES=rules||[];
  const {data:orders,error}=await sb.from('sim_orders')
    .select('*, sim_customers(*), sim_order_items(product_name,quantity)')
    .eq('order_status','active');
  if(error){$('state').innerHTML=`<span class="text-red-400">${esc(error.message)}</span>`;return;}
  // payer accounts for any third-party-paid orders
  const pvIds=[...new Set((orders||[]).map(o=>o.paid_via_order_id).filter(Boolean))];
  let payerMap={};
  if(pvIds.length){
    const {data:po}=await sb.from('sim_orders').select('id,contract_value,amount_paid_to_date,first_payment_date,payment_frequency,order_date,payment_method,paid_in_full,deposit_amount,ezidebit_payer_ref').in('id',pvIds);
    (po||[]).forEach(p=>payerMap[p.id]=p);
  }
  // payment + dishonour counts per payer ref (one RPC)
  const refs=[...new Set((orders||[]).map(o=>{const pa=o.paid_via_order_id?(payerMap[o.paid_via_order_id]||o):o; return pa.ezidebit_payer_ref;}).filter(Boolean))];
  let counts={};
  if(refs.length){ const {data:cd}=await sb.rpc('sim_delivery_counts',{refs}); (cd||[]).forEach(r=>counts[r.payer_ref]={paid_count:r.paid_count,dishonour_count:r.dishonour_count}); }
  rows=[];
  for(const o of (orders||[])){
    const payAcct = o.paid_via_order_id ? (payerMap[o.paid_via_order_id]||o) : o;
    const cust=o.sim_customers||{};
    const items=(o.sim_order_items||[]).map(i=>({name:i.product_name,qty:+i.quantity||1}));
    rows.push({
      id:o.id, custId:cust.id||o.customer_id,
      name:`${cust.first_name||''} ${cust.last_name||''}`.trim()||'(no name)',
      phone:cust.mobile||'', address:o.delivery_address||cust.address||'',
      items, product:items.map(i=>(i.qty>1?i.qty+'× ':'')+i.name).join(', ')||'—',
      cleared:cleared(o,payAcct,counts),
      authorised:o.delivery_authorised===true,
      delivered:o.delivery_status==='delivered',
      booked:!!o.delivery_date && o.delivery_status!=='delivered',
      deliveryDate:o.delivery_date, deliveryTime:o.delivery_time||'',
      deliveryStatus:o.delivery_status||'pending'
    });
  }
  render();
}

function mapLink(a){return a?`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(a)}`:'';}

function render(){
  $('state').classList.add('hidden');
  const readyToBook=rows.filter(r=>r.cleared&&!r.booked&&!r.delivered);
  const todayRun=rows.filter(r=>r.booked&&r.deliveryDate===todayStr).sort((x,y)=>suburb(x.address).localeCompare(suburb(y.address))||x.address.localeCompare(y.address));
  const upcoming=rows.filter(r=>r.booked&&r.deliveryDate>todayStr).sort((x,y)=>(x.deliveryDate||'').localeCompare(y.deliveryDate||''));
  const delivered=rows.filter(r=>r.delivered);

  const stat=(l,v,t)=>`<div class="card" style="padding:1rem"><div class="lbl">${l}</div><div class="text-2xl font-bold mt-1 ${t}">${v}</div></div>`;
  $('summary').innerHTML=
    stat('Ready to book',readyToBook.length,'text-green-400')+
    stat("Today's run",todayRun.length,'text-sky-300')+
    stat('Upcoming',upcoming.length,'text-amber-300')+
    stat('Delivered',delivered.length,'text-slate-200');

  const tab=(id,label,n)=>`<button class="btn ${filter===id?'on':''}" onclick="setFilter('${id}')">${label}${n?`<span class="pill" ${filter===id?'style="background:#1a2438;color:#c9a84c"':''}>${n}</span>`:''}</button>`;
  $('tabs').innerHTML=tab('ready','Ready to book',readyToBook.length)+tab('today',"Today's run",todayRun.length)+tab('upcoming','Upcoming',upcoming.length)+tab('delivered','Delivered',0)
    +`<button class="btn ml-auto noprint" onclick="window.print()">🖨 Print run sheet</button>`;

  $('runhead').innerHTML='';
  let view;
  if(filter==='ready')      { view=readyToBook; renderList(view,'ready'); }
  else if(filter==='today') { renderRunHead(todayRun); renderList(todayRun,'today'); }
  else if(filter==='upcoming'){ view=upcoming; renderList(view,'upcoming'); }
  else                      { view=delivered; renderList(view,'delivered'); }
}

function renderRunHead(run){
  if(!run.length){$('runhead').innerHTML='';return;}
  const load={};run.forEach(r=>r.items.forEach(i=>{load[i.name]=(load[i.name]||0)+i.qty;}));
  const loadStr=Object.entries(load).map(([n,q])=>`${q}× ${esc(n)}`).join(' · ');
  const stops=run.map(r=>r.address).filter(Boolean);
  let route='';
  if(stops.length){const dest=encodeURIComponent(stops[stops.length-1]);const wp=stops.slice(0,-1).map(encodeURIComponent).join('|');
    route=`https://www.google.com/maps/dir/?api=1&destination=${dest}${wp?`&waypoints=${wp}`:''}&travelmode=driving`;}
  $('runhead').innerHTML=`<div class="card mb-4" style="border-color:#c9a84c">
      <div class="lbl mb-1">Load list — ${run.length} stop${run.length>1?'s':''} today</div>
      <div class="text-slate-100 text-sm mb-3">${loadStr||'—'}</div>
      ${route?`<a class="btn gold noprint" style="display:inline-block;text-decoration:none" href="${route}" target="_blank">🧭 Open full route in Maps</a>`:''}
    </div>`;
}

function renderList(view,mode){
  if(!view.length){$('list').innerHTML=`<div class="text-center text-slate-500 py-16">Nothing here right now.</div>`;return;}
  $('list').innerHTML=view.map((r,i)=>{
    const maps=r.address?`<a class="maplink" href="${mapLink(r.address)}" target="_blank" onclick="event.stopPropagation()">Open in Maps ↗</a>`:'';
    let right='', warn='';
    if(mode==='ready') right=`<button class="btn gold noprint" onclick="event.stopPropagation();openBook('${r.id}','${esc(r.name).replace(/'/g,"\\'")}')">Book delivery</button>`;
    else if(mode==='today'){
      right=`<div class="text-right"><div class="k">${r.deliveryTime?esc(r.deliveryTime):'Any time'}</div>
        <button class="btn noprint mt-2" onclick="event.stopPropagation();window.open('docket.html?id='+'${r.id}','_blank')">🖨 Docket</button>
        <button class="btn gold noprint mt-2" onclick="event.stopPropagation();markDelivered('${r.id}')">Mark delivered</button></div>`;
      if(!r.cleared)warn=`<div class="mt-2 text-xs font-semibold" style="color:#f87171">⚠ No longer cleared — check payments before delivering</div>`;
    }
    else if(mode==='upcoming') right=`<div class="text-right"><div class="k">Booked</div><div class="text-sm font-semibold text-slate-200">${fmtD(r.deliveryDate)}</div>${r.deliveryTime?`<div class="k mt-1">${esc(r.deliveryTime)}</div>`:''}<button class="btn noprint mt-2" onclick="event.stopPropagation();window.open('docket.html?id='+'${r.id}','_blank')">🖨 Docket</button></div>`;
    else right=`<div class="text-right"><div class="k">Delivered</div><div class="text-sm font-semibold text-slate-200">${fmtD(r.deliveryDate)}</div></div>`;
    const num=mode==='today'?`<span class="text-slate-500 font-bold mr-2">${i+1}.</span>`:'';
    return `<div class="card dl mb-3" style="cursor:pointer" onclick="location.href='client.html?c=${r.custId}'" title="Open ${esc(r.name)}'s details">
      <div class="flex flex-wrap items-start gap-4">
        <div class="flex-1 min-w-[220px]">
          <div class="flex items-center mb-1">${num}<span class="font-semibold text-white">${esc(r.name)}</span></div>
          <div class="text-base text-slate-100 mt-1">${esc(r.address)||'<span class="text-slate-500">No delivery address on file</span>'}</div>
          <div class="mt-1">${maps}</div>
          <div class="text-xs text-slate-400 mt-2">${esc(r.phone)}${r.phone&&r.product?' · ':''}${esc(r.product)}</div>
          ${warn}
        </div>
        <div class="min-w-[120px] flex justify-end">${right}</div>
      </div>
    </div>`;
  }).join('');
}

window.setFilter=f=>{filter=f;render();};

let bookId=null;
window.openBook=(id,name)=>{bookId=id;$('ovwho').textContent=name;
  const t=new Date(now.getTime()+DAY);$('bkdate').value=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  $('bktime').value='';$('ov').classList.add('show');};
window.closeOv=()=>{$('ov').classList.remove('show');bookId=null;};
window.saveBooking=async()=>{
  const d=$('bkdate').value;if(!d){alert('Pick a delivery date');return;}
  const t=$('bktime').value||null;
  const {error}=await sb.from('sim_orders').update({delivery_date:d,delivery_time:t,delivery_status:'scheduled'}).eq('id',bookId);
  if(error){alert(error.message);return;}
  closeOv();await load();
};
window.markDelivered=async(id)=>{
  const {error}=await sb.from('sim_orders').update({delivery_status:'delivered'}).eq('id',id);
  if(error){alert(error.message);return;}
  await load();
};

load();
</script>
</body>
</html>
