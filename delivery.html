let RULES=[];
function ruleFor(depositPct){
  let r=RULES[0]||{weekly:8,fortnightly:4,monthly:2,miss_allowed:1};
  for(const x of RULES){ if(depositPct*100 >= x.min_deposit_pct) r=x; }
  return r;
}

// How many of the MOST RECENT debit attempts were clean, before hitting a miss.
// Builds one timeline from real payments (success) + dishonours (miss), newest first,
// and counts the leading run of successes. Refunds are ignored (not a debit attempt).
// Returns {run, total} — run = consecutive clean from most recent, total = attempts seen.
function cleanRun(pays, dishonours){
  const events=[
    ...(pays||[]).filter(p=>!(p.result&&p.result.toLowerCase()==='refund'))
                 .map(p=>({d:p.payment_date, ok:true})),
    ...(dishonours||[]).map(x=>({d:x.payment_date, ok:false}))
  ].sort((a,b)=>(b.d||'').localeCompare(a.d||''));   // newest first
  let run=0;
  for(const e of events){ if(e.ok) run++; else break; }   // stop at the first (most recent) miss
  return {run, total:events.length};
}
// Clean-payment run required before delivery, by payment frequency.
// Slower frequencies need fewer payments (each represents more elapsed time),
// so the "have they stuck with it" signal stays strong without an absurd wait.
const CLEAN_RUN_BY_FREQ = { weekly:5, fortnightly:4, monthly:3 };
function cleanRunRequired(freq){
  return CLEAN_RUN_BY_FREQ[(freq||'weekly').toLowerCase()] || 5;
}

function cleared(order,payAcct,pays,dishonours){
  if(order.order_status==='cancelled')return false;
  if(order.delivery_authorised===true) return true;                 // admin override
  const coolStr=order.cooling_off_expires;
  const coolExpired=coolStr?new Date(coolStr+'T12:00:00')<=today:true;
  if(!coolExpired) return false;                                     // never deliver inside cooling-off
  if(order.affordability_passed===false) return false;              // explicit affordability fail
  const contract=+payAcct.contract_value||0;
  const paid=+payAcct.amount_paid_to_date||0;                       // includes manual payments
  const isCash=(payAcct.payment_method||'').toLowerCase()==='cash';
  if(contract<=0) return false;
  const paidPct = paid/contract*100;
  // Immediate clearance: paid in full, cash, OR total paid has reached 50%
  // (half the contract in hand is proof enough — bypasses the streak rule).
  if(payAcct.paid_in_full || isCash || paidPct>=50) return true;
  const freq=payAcct.payment_frequency||order.payment_frequency||'weekly';
  const runNeeded=cleanRunRequired(freq);
  const rule=ruleFor(contract>0 ? (+payAcct.deposit_amount||0)/contract : 0);
  const need=(rule && rule.required_pct!=null) ? rule.required_pct : 10;   // % of contract required
  // RULE: need 10% paid AND the most recent N debit attempts all clean (N by frequency).
  const {run}=cleanRun(pays,dishonours);
  if(run < runNeeded) return false;                                  // not enough clean-in-a-row
  return paidPct >= need;                                            // AND % paid threshold
}

let rows=[], filter='ready', BOOKED=[];

// ── Delivery forecast ────────────────────────────────────────────────────────
// Projects, for a not-yet-cleared customer, WHICH future payment date would tip
// them over the delivery threshold — ASSUMING every scheduled payment succeeds.
// It's a best-case forecast for stock planning, clearly labelled as such.
const FREQ_DAYS={weekly:7,fortnightly:14,monthly:30};
function projectReadyDate(r){
  // already cleared or no schedule → not a forecast candidate
  if(r.cleared || r.booked || r.delivered) return null;
  const contract=r.contract, instal=r.instal;
  if(contract<=0 || instal<=0) return null;
  const freq=(r.freq||'weekly').toLowerCase();
  const stepDays=FREQ_DAYS[freq]||7;
  const needPct=r.needPct||10;
  const runNeeded=r.runNeeded||5;
  // starting point: their next scheduled payment date
  let nd=r.nextDate?new Date(r.nextDate+'T12:00:00'):null;
  if(!nd) return null;
  let paid=r.paid;
  let streak=r.cleanStreak;
  // step forward up to ~40 future payments looking for the crossover
  for(let i=0;i<40;i++){
    // apply this scheduled payment (assumed successful)
    paid+=instal;
    streak+=1;
    const pct=paid/contract*100;
    const moneyOK = pct>=needPct;
    const fiftyOK = pct>=50;
    const streakOK = streak>=runNeeded;
    if(fiftyOK || (moneyOK && streakOK)){
      return new Date(nd);   // the date this payment lands = predicted ready date
    }
    nd=new Date(nd.getTime()+stepDays*DAY);
  }
  return null;   // won't clear within horizon
}
// Monday of the current week (weeks run Mon–Sun)
function weekStart(d){
  const x=new Date(d); x.setHours(12,0,0,0);
  const dow=(x.getDay()+6)%7;   // 0=Mon
  x.setDate(x.getDate()-dow);
  return x;
}

async function load(quiet){
  const {data:rules}=await sb.from('delivery_rules').select('*').order('min_deposit_pct');
  RULES=rules||[];
  const {data:orders,error}=await sb.from('sim_orders')
    .select('*, sim_customers(*), sim_order_items(product_name,quantity)')
    .eq('order_status','active');
  if(error){$('state').innerHTML=`<span class="text-red-400">${esc(error.message)}</span>`;return;}
  // payer accounts for any third-party-paid orders
  const pvIds=[...new Set((orders||[]).map(o=>o.paid_via_order_id).filter(Boolean))];
  let payerMap={};
  if(pvIds.length){
    const {data:po}=await sb.from('sim_orders').select('id,contract_value,amount_paid_to_date,first_payment_date,next_payment_date,instalment_amount,payment_frequency,order_date,payment_method,paid_in_full,deposit_amount,ezidebit_payer_ref').in('id',pvIds);
    (po||[]).forEach(p=>payerMap[p.id]=p);
  }
  // payment + dishonour counts per payer ref (one RPC)
  const refs=[...new Set((orders||[]).map(o=>{const pa=o.paid_via_order_id?(payerMap[o.paid_via_order_id]||o):o; return pa.ezidebit_payer_ref;}).filter(Boolean))];
  let counts={};
  if(refs.length){ const {data:cd}=await sb.rpc('sim_delivery_counts',{refs}); (cd||[]).forEach(r=>counts[r.payer_ref]={paid_count:r.paid_count,dishonour_count:r.dishonour_count}); }
  // actual payment + dishonour rows per payer ref (for the scorecard + inline history)
  let paysByRef={}, disByRef={};
  if(refs.length){
    const {data:pmts}=await sb.from('sim_payments').select('payer_ref,payment_date,amount,result').in('payer_ref',refs).order('payment_date',{ascending:false});
    (pmts||[]).forEach(p=>{ (paysByRef[p.payer_ref]=paysByRef[p.payer_ref]||[]).push(p); });
    const {data:dis}=await sb.from('sim_dishonours').select('payer_ref,payment_date,amount').in('payer_ref',refs).order('payment_date',{ascending:false});
    (dis||[]).forEach(d=>{ (disByRef[d.payer_ref]=disByRef[d.payer_ref]||[]).push(d); });
  }
  rows=[];
  for(const o of (orders||[])){
    const payAcct = o.paid_via_order_id ? (payerMap[o.paid_via_order_id]||o) : o;
    const cust=o.sim_customers||{};
    const items=(o.sim_order_items||[]).map(i=>({name:i.product_name,qty:+i.quantity||1}));
    const ref=payAcct.ezidebit_payer_ref;
    const contract=+payAcct.contract_value||0;
    const paid=+payAcct.amount_paid_to_date||0;
    const instal=+payAcct.instalment_amount||0;
    const pct = contract>0 ? paid/contract*100 : 0;
    const misses = ref&&counts[ref] ? (counts[ref].dishonour_count||0) : 0;
    const payCount = ref&&counts[ref] ? (counts[ref].paid_count||0) : 0;
    const pays = (ref?paysByRef[ref]:[])||[];
    const dishonours = (ref?disByRef[ref]:[])||[];
    const {run:cleanStreak} = cleanRun(pays,dishonours);
    const isCleared = cleared(o,payAcct,pays,dishonours);
    const freq=payAcct.payment_frequency||o.payment_frequency||'weekly';
    const runNeeded=cleanRunRequired(freq);
    // Requirements for full clearance: 10% paid AND N most-recent debits clean (N by freq) — OR 50% paid.
    const rule=ruleFor(contract>0?(+payAcct.deposit_amount||0)/contract:0);
    const needPct=(rule&&rule.required_pct!=null)?rule.required_pct:10;
    const coolStr=o.cooling_off_expires;
    const coolOK = coolStr?new Date(coolStr+'T12:00:00')<=today:true;
    const baseOK = o.affordability_passed!==false && coolOK && o.order_status!=='cancelled';
    // "one payment away": one more CLEAN payment would satisfy the rule.
    //   money side: (paid + instal) crosses needPct, OR crosses the 50% fast-track
    //   streak side: cleanStreak is one short of the frequency's requirement
    const moneyOK_now = pct>=needPct;
    const moneyAfterNext = contract>0 && instal>0 ? ((paid+instal)/contract*100)>=needPct : false;
    const fiftyAfterNext = contract>0 && instal>0 ? ((paid+instal)/contract*100)>=50 : false;
    const streakAfterNext = (cleanStreak+1) >= runNeeded;
    const nearReady = !isCleared && baseOK && (
        fiftyAfterNext ||                                            // one payment hits 50% (auto-clears)
        ((moneyOK_now || moneyAfterNext) && (cleanStreak>=runNeeded || streakAfterNext))
      );
    // rating from the recent clean run (aligns with the delivery rule)
    let rating='good';
    if(cleanStreak<2) rating='risky'; else if(cleanStreak<runNeeded) rating='watch';
    rows.push({
      id:o.id, custId:cust.id||o.customer_id,
      name:`${cust.first_name||''} ${cust.last_name||''}`.trim()||'(no name)',
      phone:cust.mobile||'', address:o.delivery_address||cust.address||'',
      items, product:items.map(i=>(i.qty>1?i.qty+'× ':'')+i.name).join(', ')||'—',
      cleared:isCleared,
      authorised:o.delivery_authorised===true,
      delivered:o.delivery_status==='delivered',
      booked:!!o.delivery_date && o.delivery_status!=='delivered',
      deliveryDate:o.delivery_date, deliveryTime:o.delivery_time||'',
      deliveryStatus:o.delivery_status||'pending',
      // scorecard
      contract, paid, pct, instal, misses, payCount, rating, needPct, nearReady, cleanStreak, runNeeded,
      freq:(payAcct.payment_frequency||o.payment_frequency||'weekly'),
      nextDate:(o.next_payment_date||payAcct.next_payment_date||null),
      pays:(ref?paysByRef[ref]:[])||[], dishonours:(ref?disByRef[ref]:[])||[]
    });
  }
  render();
}

function mapLink(a){return a?`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(a)}`:'';}

function render(){
  $('state').classList.add('hidden');
  const readyToBook=rows.filter(r=>r.cleared&&!r.booked&&!r.delivered);
  const nearReady=rows.filter(r=>r.nearReady&&!r.booked&&!r.delivered).sort((a,b)=>b.pct-a.pct);
  const booked=rows.filter(r=>r.booked&&!r.delivered).sort((x,y)=>(x.deliveryDate||'').localeCompare(y.deliveryDate||'')||suburb(x.address).localeCompare(suburb(y.address)));
  const delivered=rows.filter(r=>r.delivered);
  BOOKED=booked;

  const stat=(l,v,t)=>`<div class="card" style="padding:1rem"><div class="lbl">${l}</div><div class="text-2xl font-bold mt-1 ${t}">${v}</div></div>`;

  // Today's booked deliveries — a reminder banner at the very top
  const todaysDeliveries=booked.filter(r=>r.deliveryDate===todayStr);
  let todayBanner='';
  if(todaysDeliveries.length){
    const rows_=todaysDeliveries
      .sort((a,b)=>(a.deliveryTime||'').localeCompare(b.deliveryTime||'')||suburb(a.address).localeCompare(suburb(b.address)))
      .map(r=>`<div class="flex flex-wrap items-center justify-between gap-2" style="padding:5px 0;border-bottom:1px solid #2a2410">
        <div><span class="font-semibold text-white">${esc(r.name)}</span>${r.deliveryTime?`<span class="k"> · ${esc(r.deliveryTime)}</span>`:''}<span class="k"> · ${esc(r.product)}</span></div>
        <div>${r.address?`<a class="maplink" href="${mapLink(r.address)}" target="_blank">${esc(suburb(r.address))} ↗</a>`:'<span class="k">no address</span>'}</div>
      </div>`).join('');
    todayBanner=`<div class="card mb-4" style="border-color:#c9a84c;background:#211d0f">
      <div class="flex items-center justify-between mb-1">
        <div class="lbl" style="color:#e6c260">📦 Booked for today — ${today.toLocaleDateString('en-NZ',{weekday:'long',day:'2-digit',month:'short'})}</div>
        <span class="text-xl font-bold text-amber-300">${todaysDeliveries.length}</span>
      </div>
      ${rows_}
      <button class="btn gold noprint mt-3" onclick="window.open('docket.html?date='+encodeURIComponent('${todayStr}'),'_blank')">🖨 Print today's dockets</button>
    </div>`;
  }

  $('summary').innerHTML= todayBanner +
    '<div class="grid grid-cols-2 md:grid-cols-4 gap-3">'+
    stat('Ready to book',readyToBook.length,'text-green-400')+
    stat('One payment away',nearReady.length,'text-amber-300')+
    stat('Booked',booked.length,'text-sky-300')+
    stat('Delivered',delivered.length,'text-slate-200')+
    '</div>';

  // forecast count (projected to become ready within 5 weeks) for the tab badge
  const fcMon=weekStart(today), fcEnd=new Date(fcMon.getTime()+5*7*DAY);
  const fcCount=rows.filter(r=>!r.cleared&&!r.booked&&!r.delivered).reduce((n,r)=>{
    const w=projectReadyDate(r); return n+(w&&w>=fcMon&&w<fcEnd?1:0);
  },0);

  const tab=(id,label,n)=>`<button class="btn ${filter===id?'on':''}" onclick="setFilter('${id}')">${label}${n?`<span class="pill" ${filter===id?'style="background:#1a2438;color:#c9a84c"':''}>${n}</span>`:''}</button>`;
  $('tabs').innerHTML=tab('ready','Ready to book',readyToBook.length)+tab('near','One payment away',nearReady.length)+tab('forecast','Forecast',fcCount)+tab('booked','Booked',booked.length)+tab('delivered','Delivered',delivered.length);

  $('runhead').innerHTML='';
  if(filter==='ready')       { renderList(readyToBook,'ready'); }
  else if(filter==='near')   { renderList(nearReady,'near'); }
  else if(filter==='forecast'){ renderForecast(); }
  else if(filter==='booked') { renderBookedHead(booked); renderList(booked,'booked'); }
  else                       { renderList(delivered,'delivered'); }
}

function renderBookedHead(booked){
  const dates=[...new Set(booked.map(r=>r.deliveryDate).filter(Boolean))].sort();
  const def=dates.includes(todayStr)?todayStr:(dates[0]||todayStr);
  $('runhead').innerHTML=`<div class="card mb-4" style="border-color:#c9a84c">
      <div class="lbl mb-2">Print dockets for a delivery day</div>
      <div class="flex items-center gap-3 flex-wrap">
        <input type="date" id="docketDate" value="${def}" onchange="updateDocketCount()"
          style="background:#0d1424;border:1px solid #26324a;color:#e2e8f0;border-radius:8px;padding:8px 10px;font-size:14px">
        <button class="btn gold noprint" onclick="printDayDockets()">🖨 Print all dockets for this day</button>
        <span class="k" id="docketCount"></span>
      </div>
      <div class="text-xs text-slate-500 mt-2">Opens the dockets for every delivery booked on that day — two copies each (customer &amp; office) — ready to print and hand to the driver.</div>
    </div>`;
  updateDocketCount();
}
window.updateDocketCount=function(){
  const d=document.getElementById('docketDate'); if(!d) return;
  const n=BOOKED.filter(r=>r.deliveryDate===d.value).length;
  const el=document.getElementById('docketCount');
  if(el) el.textContent = n ? `${n} deliver${n>1?'ies':'y'} booked for this day` : 'No deliveries booked for this day';
};
window.printDayDockets=function(){
  const d=document.getElementById('docketDate'); if(!d||!d.value) return;
  const n=BOOKED.filter(r=>r.deliveryDate===d.value).length;
  if(!n){ alert('No deliveries are booked for that day.'); return; }
  window.open('docket.html?date='+encodeURIComponent(d.value),'_blank');
};

// Builds the payment scorecard + inline history for a delivery card.
function scorecard(r){
  const need=r.runNeeded||5;
  const ratingMap={
    good:{txt:'GOOD',bg:'#14361f',fg:'#4ade80'},
    watch:{txt:'WATCH',bg:'#3a2f10',fg:'#fbbf24'},
    risky:{txt:'RISKY',bg:'#3a1616',fg:'#f87171'}
  };
  const rt=ratingMap[r.rating]||ratingMap.good;
  const pctTxt=r.pct.toFixed(1)+'%';
  const thresholdMet=r.pct>=r.needPct;
  const streakMet=r.cleanStreak>=need;
  const fiftyMet=r.pct>=50;
  // recommendation reflects the actual rule: (10% paid AND N clean in a row) OR 50% paid
  let rec;
  if(fiftyMet) rec='50% paid — clears immediately regardless of payment run.';
  else if(thresholdMet && streakMet) rec=`Meets both rules (10% paid + ${need} clean payments) — safe to deliver.`;
  else if(!streakMet && !thresholdMet) rec=`Not yet: needs 10% paid and ${need} clean payments in a row (has ${r.cleanStreak}).`;
  else if(!streakMet) rec=`10% is met, but only ${r.cleanStreak} of ${need} recent payments are clean — not yet safe.`;
  else rec=`Payment run is clean (${r.cleanStreak}), but under 10% paid — not yet.`;
  const recColour = ((thresholdMet&&streakMet)||fiftyMet)?'#4ade80':'#fbbf24';
  // combine payments (result) + dishonours into one date-sorted history
  const hist=[
    ...r.pays.map(p=>({d:p.payment_date, amt:+p.amount||0, kind:(p.result&&p.result.toLowerCase()==='refund')?'refund':'paid'})),
    ...r.dishonours.map(x=>({d:x.payment_date, amt:+x.amount||0, kind:'missed'}))
  ].sort((a,b)=>(b.d||'').localeCompare(a.d||''));
  const kindStyle={paid:'color:#4ade80',refund:'color:#94a3b8',missed:'color:#f87171'};
  const kindLbl={paid:'✓ Paid',refund:'↩ Refund',missed:'✗ Missed'};
  const histRows = hist.length
    ? hist.map(h=>`<div class="flex justify-between" style="font-size:11.5px;padding:2px 0;border-bottom:1px solid #1e293b">
        <span class="text-slate-400">${shortD(h.d)}</span>
        <span style="${kindStyle[h.kind]}">${kindLbl[h.kind]}</span>
        <span class="text-slate-300">${fmt(h.amt)}</span></div>`).join('')
    : '<div class="text-slate-500" style="font-size:11.5px">No payment records yet.</div>';
  const histId='hist_'+r.id;
  return `<div style="margin-top:10px;background:#0f1830;border:1px solid #26324a;border-radius:.6rem;padding:10px 12px">
    <div class="flex flex-wrap items-center gap-2 mb-2">
      <span class="badge" style="background:${rt.bg};color:${rt.fg}">${rt.txt}</span>
      <span class="k">Clean run</span><span class="text-sm font-semibold" style="color:${streakMet?'#4ade80':'#fbbf24'}">${r.cleanStreak}/${need}</span>
      <span class="k">·</span><span class="k">Paid</span><span class="text-sm font-semibold" style="color:${thresholdMet?'#4ade80':'#e2e8f0'}">${fmt(r.paid)} <span class="text-slate-500 font-normal">/ ${fmt(r.contract)}</span> (${pctTxt})</span>
      ${r.misses?`<span class="k">·</span><span class="text-sm" style="color:#f87171">${r.misses} missed total</span>`:''}
    </div>
    <div class="text-xs" style="color:${recColour}">${rec}</div>
    <button class="btn noprint" style="margin-top:8px;font-size:11px;padding:3px 9px" onclick="event.stopPropagation();var e=document.getElementById('${histId}');e.style.display=e.style.display==='none'?'block':'none'">Payment history ▾</button>
    <div id="${histId}" style="display:none;margin-top:8px;max-height:180px;overflow-y:auto">${histRows}</div>
  </div>`;
}

function renderForecast(){
  const thisMon=weekStart(today);
  // 5 buckets: this week + next 4
  const buckets=[];
  for(let i=0;i<5;i++){
    const start=new Date(thisMon.getTime()+i*7*DAY);
    const end=new Date(start.getTime()+7*DAY);
    buckets.push({start,end,label:i===0?'This week':`Week of ${start.toLocaleDateString('en-NZ',{day:'2-digit',month:'short'})}`,items:[]});
  }
  // project every pending customer
  const candidates=rows.filter(r=>!r.cleared&&!r.booked&&!r.delivered);
  let beyond=0;
  candidates.forEach(r=>{
    const when=projectReadyDate(r);
    if(!when) { beyond++; return; }
    const idx=buckets.findIndex(b=>when>=b.start && when<b.end);
    if(idx>=0) buckets[idx].items.push({r,when});
    else if(when>=buckets[4].end) beyond++;   // clears, but past our 5-week horizon
    // (when < thisMon shouldn't happen — those are already cleared)
  });

  const stock=items=>{
    const m={};
    items.forEach(({r})=>r.items.forEach(it=>{ m[it.name]=(m[it.name]||0)+(it.qty||1); }));
    const keys=Object.keys(m).sort();
    return keys.length? keys.map(k=>`${m[k]}× ${esc(k)}`).join(' · ') : '—';
  };

  let html=`<div class="card mb-4" style="border-color:#c9a84c">
    <div class="lbl mb-1">Delivery forecast — next 5 weeks</div>
    <div class="text-xs text-slate-400">Projected dates a customer will become deliverable, <b>assuming every scheduled payment goes through</b>. Use for stock and delivery planning — not a commitment. A missed payment pushes a customer back.</div>
  </div>`;

  html+=buckets.map(b=>{
    const n=b.items.length;
    const dateRange=`${b.start.toLocaleDateString('en-NZ',{day:'2-digit',month:'short'})} – ${new Date(b.end.getTime()-DAY).toLocaleDateString('en-NZ',{day:'2-digit',month:'short'})}`;
    const list = n? b.items
        .sort((a,c)=>a.when-c.when)
        .map(({r,when})=>`<div class="flex flex-wrap items-center justify-between gap-2" style="padding:6px 0;border-bottom:1px solid #1e293b">
          <div><a href="client.html?c=${r.custId}" style="color:#e2e8f0;text-decoration:none;font-weight:600">${esc(r.name)}</a>
            <span class="k"> · ${esc(r.product)}</span></div>
          <div class="text-right"><span class="k">${when.toLocaleDateString('en-NZ',{weekday:'short',day:'2-digit',month:'short'})}</span>
            <span class="text-xs" style="color:#fbbf24"> · ${r.pct.toFixed(0)}% now</span></div>
        </div>`).join('')
      : `<div class="text-slate-500 text-sm py-2">No deliveries projected to become ready this week.</div>`;
    return `<div class="card mb-3">
      <div class="flex items-center justify-between mb-1">
        <div><span class="font-semibold text-white">${b.label}</span> <span class="k">${dateRange}</span></div>
        <span class="text-2xl font-bold ${n?'text-green-400':'text-slate-600'}">${n}</span>
      </div>
      ${n?`<div class="text-xs mb-2" style="color:#7dd3fc">Stock needed: ${stock(b.items)}</div>`:''}
      ${list}
    </div>`;
  }).join('');

  if(beyond) html+=`<div class="text-center text-slate-500 text-sm py-3">+${beyond} more pending customer${beyond>1?'s':''} will become ready beyond the next 5 weeks (or can't be projected).</div>`;

  $('list').innerHTML=html;
}

function renderList(view,mode){
  if(!view.length){$('list').innerHTML=`<div class="text-center text-slate-500 py-16">Nothing here right now.</div>`;return;}
  $('list').innerHTML=view.map((r,i)=>{
    const maps=r.address?`<a class="maplink" href="${mapLink(r.address)}" target="_blank" onclick="event.stopPropagation()">Open in Maps ↗</a>`:'';
    let right='', warn='';
    if(mode==='ready') right=`<button class="btn gold noprint" onclick="event.stopPropagation();openBook('${r.id}','${esc(r.name).replace(/'/g,"\\'")}')">Book delivery</button>`;
    else if(mode==='near'){
      const shortfall=Math.max(0, (r.contract*r.needPct/100)-r.paid);
      right=`<div class="text-right"><div class="k">One payment away</div>
        <div class="text-sm font-semibold text-amber-300 mt-1">${fmt(shortfall)} to go</div>
        <div class="k mt-1">next instalment ${fmt(r.instal)}</div></div>`;
    }
    else if(mode==='booked'){
      right=`<div class="text-right"><div class="text-sm font-semibold text-slate-200">${fmtD(r.deliveryDate)}</div>${r.deliveryTime?`<div class="k">${esc(r.deliveryTime)}</div>`:''}
        <button class="btn noprint mt-2" onclick="event.stopPropagation();openBook('${r.id}','${esc(r.name).replace(/'/g,"\\'")}')">Reschedule</button>
        <button class="btn noprint mt-2" onclick="event.stopPropagation();window.open('docket.html?id='+'${r.id}','_blank')">🖨 Docket</button>
        <button class="btn gold noprint mt-2" onclick="event.stopPropagation();markDelivered('${r.id}')">Mark delivered</button></div>`;
      if(!r.cleared)warn=`<div class="mt-2 text-xs font-semibold" style="color:#f87171">⚠ No longer cleared — check payments before delivering</div>`;
    }
    else right=`<div class="text-right"><div class="k">Delivered</div><div class="text-sm font-semibold text-slate-200">${fmtD(r.deliveryDate)}</div></div>`;
    return `<div class="card dl mb-3" style="cursor:pointer" onclick="location.href='client.html?c=${r.custId}'" title="Open ${esc(r.name)}'s details">
      <div class="flex flex-wrap items-start gap-4">
        <div class="flex-1 min-w-[220px]">
          <div class="flex items-center mb-1"><span class="font-semibold text-white">${esc(r.name)}</span></div>
          <div class="text-base text-slate-100 mt-1">${esc(r.address)||'<span class="text-slate-500">No delivery address on file</span>'}</div>
          <div class="mt-1">${maps}</div>
          <div class="text-xs text-slate-400 mt-2">${esc(r.phone)}${r.phone&&r.product?' · ':''}${esc(r.product)}</div>
          ${warn}
          ${(mode==='ready'||mode==='near')?scorecard(r):''}
        </div>
        <div class="min-w-[120px] flex justify-end">${right}</div>
      </div>
    </div>`;
  }).join('');
}

window.setFilter=f=>{filter=f;render();};

let bookId=null;
window.openBook=(id,name)=>{bookId=id;$('ovwho').textContent=name;
  const t=new Date(now.getTime()+DAY);$('bkdate').value=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  $('bktime').value='';$('ov').classList.add('show');};
window.closeOv=()=>{$('ov').classList.remove('show');bookId=null;};
window.saveBooking=async()=>{
  const d=$('bkdate').value;if(!d){alert('Pick a delivery date');return;}
  const t=$('bktime').value||null;
  const {error}=await sb.from('sim_orders').update({delivery_date:d,delivery_time:t,delivery_status:'scheduled'}).eq('id',bookId);
  if(error){alert(error.message);return;}
  closeOv();await load();
};
window.markDelivered=async(id)=>{
  const {error}=await sb.from('sim_orders').update({delivery_status:'delivered'}).eq('id',id);
  if(error){alert(error.message);return;}
  await load();
};

// live.js calls this when the database changes, when this tab regains focus,
// and once a minute as a safety net. Nobody has to remember to refresh.
window.SIMTEC_RELOAD = function(){ load(true); };

load();
</script>
