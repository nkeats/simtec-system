<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Simtec Commission Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2.38.4/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
<style>
body{font-family:system-ui,sans-serif}
.inp{display:block;width:100%;padding:.5rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:.5rem;color:#fff;font-size:.875rem;box-sizing:border-box}

select.inp{appearance:auto}

.gold{background:#eab308;color:#0f172a}.gold:hover:not(:disabled){background:#fbbf24}

<body class="bg-slate-950 text-white min-h-screen">

<nav class="bg-slate-900 border-b border-slate-800 px-6 py-3 flex items-center gap-6 noprint" id="nav"></nav>
<div id="app"></div>
<div id="toast" class="fixed bottom-6 right-6 px-4 py-3 rounded-lg text-sm font-medium hidden noprint"></div>

<!-- Modal -->
<div id="moverlay" class="fixed inset-0 bg-black/70 z-50 hidden noprint" onclick="if(event.target===this)closeMod()">
  <div class="flex items-center justify-center min-h-full p-4">
    <div class="bg-slate-800 border border-slate-700 rounded-xl p-6 w-full max-w-md max-h-[90vh] overflow-y-auto" id="mbox"></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://jvqjoenaungubpoegyvf.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2cWpvZW5hdW5ndWJwb2VneXZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MzQyMjYsImV4cCI6MjA5NjExMDIyNn0.ypVt8578XTdNwBH6TRDn30s1cF_rHTu67qCWYv5XHcQ'; // ← replace with your key
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// ── State ──────────────────────────────────────────────────────────────────
let page='runs',runId=null,consId=null;
let settings=null,consultants=[],products=[];

// ── Defaults ───────────────────────────────────────────────────────────────
const DEF={tier1_max:4,tier1_amount:200,tier2_max:9,tier2_amount:300,
  tier3_amount:400,cash_bonus:100,retention_rate:0.25,retention_cap:5000,pillow_charge:40};
const S=()=>({...DEF,...settings}); // safe settings with defaults

// ── Helpers ────────────────────────────────────────────────────────────────
const fmt=n=>'$'+(+n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
const fmtD=d=>d?new Date(d+'T12:00:00').toLocaleDateString('en-NZ',{day:'2-digit',month:'short',year:'numeric'}):'';
const toMon=d=>{const dt=new Date(d+'T12:00:00');const dy=dt.getDay();dt.setDate(dt.getDate()+(dy===0?-6:1-dy));return dt.toISOString().split('T')[0]};
const $=id=>document.getElementById(id);
const go=(p,r,c)=>{page=p;runId=r||runId;consId=c||consId;renderNav();renderApp()};
const openMod=html=>{$('mbox').innerHTML=html;$('moverlay').classList.remove('hidden')};
const closeMod=()=>$('moverlay').classList.add('hidden');
const toast=(msg,ok=true)=>{const t=$('toast');t.textContent=msg;t.className=`fixed bottom-6 right-6 px-4 py-3 rounded-lg text-sm font-medium noprint ${ok?'bg-green-700 text-green-100':'bg-red-700 text-red-100'}`;t.classList.remove('hidden');setTimeout(()=>t.classList.add('hidden'),3000)};
const err=e=>{console.error(e);toast(e?.message||'An error occurred',false)};

// ── Commission calc ────────────────────────────────────────────────────────
function calc(sales,bonuses,deds,retBal){
  const s=S();
  let units=0;
  for(const sale of sales)for(const it of(sale.items||[]))
    if(it.product?.commission_type!=='zero')units+=it.quantity;
  const rate=units<=s.tier1_max?s.tier1_amount:units<=s.tier2_max?s.tier2_amount:s.tier3_amount;
  let sc=0,ac=0;
  for(const sale of sales){
    let elig=false;
    for(const it of(sale.items||[])){
      const p=it.product;if(!p)continue;
      if(p.commission_type==='fixed'){sc+=p.fixed_amount*it.quantity;elig=true;}
      if(p.commission_type==='tier'){sc+=rate*it.quantity;elig=true;}
    }
    if(elig)ac+=s.cash_bonus;
  }
  const payout=(bonuses||[]).find(b=>b.description==='__RETENTION_PAYOUT__');
  const payoutAmt=+payout?.amount||0;
  const mb=(bonuses||[]).filter(b=>b.description!=='__RETENTION_PAYOUT__').reduce((a,b)=>a+(+b.amount||0),0);
  const gs=sc+ac,gross=gs+mb;
  let ret=0;
  if(retBal<s.retention_cap)ret=Math.min(gs*s.retention_rate,s.retention_cap-retBal);
  const td=(deds||[]).reduce((a,d)=>a+(+d.amount||0),0);
  return{units,rate,sc,ac,mb,gs,gross,ret,td,payout:payoutAmt,net:gross-ret-td+payoutAmt,retAfter:retBal+ret-payoutAmt};
}

// ── Nav ────────────────────────────────────────────────────────────────────
function renderNav(){
  $('nav').innerHTML=`
    <div class="flex items-center gap-2 mr-4"><div class="w-1.5 h-5 bg-yellow-500 rounded-sm"></div>
    <span class="font-bold text-sm tracking-wide">SIMTEC COMMISSIONS</span></div>
    ${[['runs','Pay Runs'],['customers','Customer History'],['setup','Consultants & Products'],['settings','Commission Rates']].map(([p,l])=>
      `<button onclick="go('${p}')" class="text-sm font-medium pb-0.5 border-b-2 transition-colors ${page===p?'border-yellow-500 text-yellow-400':'border-transparent text-slate-400 hover:text-white'}">${l}</button>`
    ).join('')}`;
}

// ── Main render ────────────────────────────────────────────────────────────
async function renderApp(){
  $('app').innerHTML='<div class="p-8 text-slate-500 text-center">Loading…</div>';
  try{
    if(!settings){
      const[{data:s,error:se},{data:c},{data:p}]=await Promise.all([
        sb.from('commission_settings').select('*').eq('id',1).maybeSingle(),
        sb.from('commission_consultants').select('*').order('name'),
        sb.from('commission_products').select('*').order('name'),
      ]);
      if(se)throw se;
      if(!s||s.tier1_max==null){
        await sb.from('commission_settings').upsert({id:1,...DEF});
        settings={id:1,...DEF};
      }else settings=s;
      consultants=c||[];products=p||[];
    }
    if(page==='runs')    await showRuns();
    else if(page==='customers') await showCustomers();
    else if(page==='run')await showRun();
    else if(page==='con')await showCon();
    else if(page==='inv')await showInv();
    else if(page==='settings')showSettings();
    else if(page==='setup')  await showSetup();
  }catch(e){
    $('app').innerHTML=`<div class="p-8 text-center"><div class="text-red-400 font-semibold mb-2">Error</div><div class="text-slate-400 text-sm">${e.message}</div><div class="text-slate-500 text-xs mt-3">Check your Supabase key and that the migration has been run.</div></div>`;
  }
}

// ── Pay Runs list ──────────────────────────────────────────────────────────
async function showRuns(){
  const{data:runs,error}=await sb.from('commission_pay_runs').select('*').order('week_ending',{ascending:false});
  if(error)throw error;
  $('app').innerHTML=`
    <div class="p-8 max-w-4xl mx-auto">
      <div class="flex items-center justify-between mb-8">
        <div><h1 class="text-2xl font-bold">Weekly Pay Runs</h1>
        <p class="text-slate-400 text-sm mt-1">Select a week to process commissions</p></div>
        <button class="btn gold" onclick="newRun()">+ New Pay Run</button>
      </div>
      <div id="runlist">${!runs?.length
        ?'<p class="text-center text-slate-500 py-16">No pay runs yet. Create your first one above.</p>'
        :runs.map(r=>`
          <div class="w-full card hover:border-yellow-500/40 mb-3 transition-all group flex items-center justify-between gap-3">
            <button onclick="go('run','${r.id}')" class="flex-1 text-left">
              <div class="font-semibold text-white">Week ending ${fmtD(r.week_ending)}</div>
              <div class="text-slate-400 text-sm mt-0.5">${fmtD(r.week_start)} – ${fmtD(r.week_ending)}</div>
            </button>
            <span class="text-xs px-2.5 py-1 rounded-full ${r.status==='finalised'?'bg-green-900 text-green-400':'bg-slate-700 text-slate-400'}">${r.status==='finalised'?'Finalised':'Draft'}</span>
            <button onclick="delRun('${r.id}','${r.week_ending}')" title="Delete this pay run" class="text-slate-500 hover:text-red-400 px-2 py-1 text-lg leading-none">🗑</button>
            <span class="text-slate-500 group-hover:text-yellow-400" onclick="go('run','${r.id}')">→</span>
          </div>`).join('')
      }</div>
    </div>`;
}

function newRun(){
  const today=new Date().toISOString().split('T')[0];
  openMod(`<h3 class="font-semibold text-white mb-4">New Pay Run</h3>
    <label class="text-xs text-slate-400 block mb-1">Week Ending (Sunday)</label>
    <input type="date" id="md" value="${today}" class="inp mb-4">
    <div class="flex gap-3">
      <button class="btn gold flex-1" onclick="createRun()">Create</button>
      <button class="btn dark flex-1" onclick="closeMod()">Cancel</button>
    </div>`);
}
async function createRun(){
  const d=$('md')?.value;
  if(!d){toast('Please select a date',false);return;}
  const mon=toMon(d);
  const{error}=await sb.from('commission_pay_runs').insert({week_start:mon,week_ending:d,status:'draft'});
  if(error){err(error);return;}
  closeMod();settings=null;toast('Pay run created');go('runs');
}

window.delRun=async(id,weekEnding)=>{
  // Find dependent sales so we can clear their line items first
  const{data:saleRows,error:eLook}=await sb.from('commission_sales').select('id').eq('pay_run_id',id);
  if(eLook){err(eLook);return;}
  const saleIds=(saleRows||[]).map(s=>s.id);
  const n=saleIds.length;
  if(!confirm(`Delete the pay run for week ending ${fmtD(weekEnding)}?\n\nThis permanently removes the run and its ${n} sale${n===1?'':'s'}, plus any bonuses and deductions on it. Retention balances are NOT affected.\n\nThis cannot be undone.`))return;
  try{
    if(saleIds.length){
      const{error:eItems}=await sb.from('commission_sale_items').delete().in('sale_id',saleIds);
      if(eItems)throw eItems;
    }
    for(const tbl of ['commission_sales','commission_bonuses','commission_deductions']){
      const{error}=await sb.from(tbl).delete().eq('pay_run_id',id);
      if(error)throw error;
    }
    const{error:eRun}=await sb.from('commission_pay_runs').delete().eq('id',id);
    if(eRun)throw eRun;
    toast('Pay run deleted');
    go('runs');
  }catch(e){err(e);}
};

// ── Pay Run detail ─────────────────────────────────────────────────────────
async function showRun(){
  const[{data:run,error:re},{data:ret}]=await Promise.all([
    sb.from('commission_pay_runs').select('*').eq('id',runId).single(),
    sb.from('commission_retention').select('*'),
  ]);
  if(re)throw re;
  const retMap={};(ret||[]).forEach(x=>retMap[x.consultant_id]=+x.balance||0);
  const active=consultants.filter(c=>c.active);

  const sums={};
  await Promise.all(active.map(async c=>{
    const[{data:sl},{data:bo},{data:de}]=await Promise.all([
      sb.from('commission_sales').select('*,commission_sale_items(quantity,commission_products(*))').eq('pay_run_id',runId).eq('consultant_id',c.id),
      sb.from('commission_bonuses').select('*').eq('pay_run_id',runId).eq('consultant_id',c.id),
      sb.from('commission_deductions').select('*').eq('pay_run_id',runId).eq('consultant_id',c.id),
    ]);
    const sales=(sl||[]).map(s=>({...s,items:(s.commission_sale_items||[]).map(i=>({...i,product:i.commission_products}))}));
    sums[c.id]=calc(sales,bo||[],de||[],retMap[c.id]||0);
  }));

  $('app').innerHTML=`
    <div class="p-8 max-w-5xl mx-auto">
      <button onclick="go('runs')" class="text-slate-400 hover:text-white text-sm mb-6 block">← Back to Pay Runs</button>
      <div class="flex items-start justify-between mb-8">
        <div><h1 class="text-2xl font-bold">Week ending ${fmtD(run.week_ending)}</h1>
        <p class="text-slate-400 text-sm mt-1">${fmtD(run.week_start)} — ${fmtD(run.week_ending)}</p></div>
        <div class="flex items-center gap-3">
        <button onclick="showImportModal('${run.id}','${run.week_ending}')" class="btn dark text-sm">⬆ Import from Spreadsheet</button>
        <span class="text-sm px-3 py-1.5 rounded-full ${run.status==='finalised'?'bg-green-900 text-green-400':'bg-slate-700 text-slate-400'}">${run.status==='finalised'?'Finalised':'Draft'}</span>
      </div>
      </div>
      ${!active.length
        ?'<p class="text-center text-slate-500 py-16">No active consultants. Add them in Consultants & Products.</p>'
        :`<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${active.map(c=>{
          const s=sums[c.id];
          return`<button onclick="go('con','${runId}','${c.id}')" class="text-left card hover:border-yellow-500/40 transition-all group w-full">
            <div class="flex items-start justify-between mb-3">
              <div class="font-semibold text-white">${c.name}</div>
              <span class="text-slate-500 group-hover:text-yellow-400">→</span>
            </div>
            ${s&&s.sc>0?`<div class="space-y-1 text-sm">
              <div class="flex justify-between"><span class="text-slate-400">Commission</span><span>${fmt(s.sc)}</span></div>
              <div class="flex justify-between"><span class="text-slate-400">Bonuses</span><span>${fmt(s.ac+s.mb)}</span></div>
              <div class="flex justify-between"><span class="text-slate-400">Deductions</span><span>-${fmt(s.ret+s.td)}</span></div>
              <div class="border-t border-slate-600 pt-1.5 flex justify-between font-semibold">
                <span class="text-slate-300">Net Pay</span><span class="text-yellow-400">${fmt(s.net)}</span>
              </div>
            </div>`:'<p class="text-slate-500 text-sm">No sales entered</p>'}
          </button>`;}).join('')}</div>`
      }
    </div>`;
}

// ── Consultant detail ──────────────────────────────────────────────────────
async function showCon(){
  const con=consultants.find(c=>c.id===consId);
  const[{data:run},{data:rawSales},{data:bonuses},{data:deds},{data:ret}]=await Promise.all([
    sb.from('commission_pay_runs').select('*').eq('id',runId).single(),
    sb.from('commission_sales').select('*,commission_sale_items(id,quantity,product_id,commission_products(*))').eq('pay_run_id',runId).eq('consultant_id',consId).order('sale_date'),
    sb.from('commission_bonuses').select('*').eq('pay_run_id',runId).eq('consultant_id',consId),
    sb.from('commission_deductions').select('*').eq('pay_run_id',runId).eq('consultant_id',consId),
    sb.from('commission_retention').select('*').eq('consultant_id',consId).maybeSingle(),
  ]);
  const sales=(rawSales||[]).map(s=>({...s,items:(s.commission_sale_items||[]).map(i=>({...i,product:i.commission_products}))}));
  const retBal=+ret?.balance||0;

  function saleComm(sale){
    const s=S();let c=0,el=false;
    const r=calc(sales,bonuses||[],deds||[],retBal).rate;
    for(const it of sale.items){const p=it.product;if(!p)continue;
      if(p.commission_type==='fixed'){c+=p.fixed_amount*it.quantity;el=true;}
      if(p.commission_type==='tier'){c+=r*it.quantity;el=true;}
    }if(el)c+=S().cash_bonus;return c;
  }

  function render(){
    const cv=calc(sales,bonuses||[],deds||[],retBal);
    const s=S();
    $('app').innerHTML=`
      <div class="p-8 max-w-5xl mx-auto">
        <button onclick="go('run')" class="text-slate-400 hover:text-white text-sm mb-6 block">← Back to Pay Run</button>
        <div class="flex items-start justify-between mb-8">
          <div><h1 class="text-2xl font-bold">${con?.name}</h1>
          <p class="text-slate-400 text-sm mt-1">Week ending ${fmtD(run?.week_ending)}</p></div>
          <button class="btn gold" onclick="go('inv')">View / Print Invoice</button>
        </div>

        <!-- SALES -->
        <div class="card mb-4">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-semibold text-sm uppercase tracking-wide">Sales <span class="text-slate-500 font-normal normal-case">(${cv.units} eligible mattress${cv.units!==1?'es':''} — Tier ${cv.units<=s.tier1_max?1:cv.units<=s.tier2_max?2:3}: ${fmt(cv.rate)}/mattress)</span></h3>
            <button class="btn gold text-xs py-1.5 px-3" onclick="addSaleModal('${run?.week_ending}')">+ Add Sale</button>
          </div>
          ${!sales.length?'<p class="text-slate-500 text-sm text-center py-4">No sales entered yet</p>':`
          <div class="overflow-x-auto"><table class="w-full text-sm">
            <thead><tr class="text-slate-500 text-xs">
              <th class="text-left pb-2">Date</th><th class="text-left pb-2">Customer</th>
              <th class="text-left pb-2">Products</th><th class="text-right pb-2">Commission</th><th class="w-8"></th>
            </tr></thead>
            <tbody class="divide-y divide-slate-700/50">
              ${sales.map(sale=>`<tr>
                <td class="py-2 pr-3 text-slate-400 whitespace-nowrap">${fmtD(sale.sale_date)}</td>
                <td class="py-2 pr-3 font-medium">${sale.customer_name}</td>
                <td class="py-2 pr-3 text-slate-400 text-xs">${sale.items.map(it=>`${it.product?.name||''}${it.quantity>1?` ×${it.quantity}`:''}`).join(', ')}</td>
                <td class="py-2 text-right text-yellow-400 font-medium">${fmt(saleComm(sale))}</td>
                <td class="py-2 pl-2"><button onclick="delSale('${sale.id}')" class="text-slate-600 hover:text-red-400 text-xs">✕</button></td>
              </tr>`).join('')}
            </tbody>
          </table></div>`}
        </div>

        <!-- BONUSES -->
        <div class="card mb-4">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-semibold text-sm uppercase tracking-wide">Bonuses</h3>
            <button class="btn gold text-xs py-1.5 px-3" onclick="addBonusModal()">+ Add Bonus</button>
          </div>
          ${cv.ac>0?`<div class="flex justify-between text-sm py-1.5 text-slate-400 italic">
            <span>Auto cash bonuses (${sales.filter(s=>s.items.some(i=>i.product?.cash_bonus_eligible)).length} × ${fmt(s.cash_bonus)})</span>
            <span>${fmt(cv.ac)}</span></div>`:''}
          ${(bonuses||[]).filter(b=>b.description!=='__RETENTION_PAYOUT__').map(b=>`<div class="flex items-center justify-between text-sm py-1.5 border-t border-slate-700/50">
            <span class="text-slate-300">${b.description}</span>
            <div class="flex items-center gap-3"><span class="text-yellow-400 font-medium">${fmt(b.amount)}</span>
            <button onclick="delBonus('${b.id}')" class="text-slate-600 hover:text-red-400 text-xs">✕</button></div>
          </div>`).join('')}
          ${!(bonuses||[]).filter(b=>b.description!=='__RETENTION_PAYOUT__').length&&cv.ac===0?'<p class="text-slate-500 text-sm text-center py-3">No bonuses</p>':''}
        </div>

        <!-- DEDUCTIONS -->
        <div class="card mb-4">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-semibold text-sm uppercase tracking-wide">Deductions</h3>
            <button class="btn gold text-xs py-1.5 px-3" onclick="addDedModal()">+ Add Deduction</button>
          </div>
          ${cv.ret>0?`<div class="flex justify-between text-sm py-1.5 text-slate-400 italic">
            <span>Retention (${s.retention_rate*100}% of ${fmt(cv.gs)})</span><span>-${fmt(cv.ret)}</span></div>`:''}
          ${(deds||[]).map(d=>`<div class="flex items-center justify-between text-sm py-1.5 border-t border-slate-700/50">
            <span class="text-slate-300">${d.description||d.deduction_type}${d.quantity>1?` ×${d.quantity}`:''} <span class="text-xs text-slate-500">(${d.deduction_type})</span></span>
            <div class="flex items-center gap-3"><span class="text-red-400 font-medium">-${fmt(d.amount)}</span>
            <button onclick="delDed('${d.id}')" class="text-slate-600 hover:text-red-400 text-xs">✕</button></div>
          </div>`).join('')}
          ${!deds?.length&&cv.ret===0?'<p class="text-slate-500 text-sm text-center py-3">No deductions</p>':''}
        </div>

        <!-- SUMMARY -->
        <div class="border border-yellow-500/30 rounded-xl p-6 bg-slate-800/50">
          <h3 class="font-semibold mb-4">Pay Summary</h3>
          <div class="grid grid-cols-2 gap-y-2 text-sm max-w-xs">
            <span class="text-slate-400">Sales commission</span><span class="text-right">${fmt(cv.sc)}</span>
            <span class="text-slate-400">Cash bonuses</span><span class="text-right">${fmt(cv.ac)}</span>
            ${cv.mb>0?`<span class="text-slate-400">Extra bonuses</span><span class="text-right">${fmt(cv.mb)}</span>`:''}
            <span class="text-slate-400">Less: retention</span><span class="text-right text-red-400">-${fmt(cv.ret)}</span>
            ${cv.td>0?`<span class="text-slate-400">Less: deductions</span><span class="text-right text-red-400">-${fmt(cv.td)}</span>`:''}
            <div class="col-span-2 border-t border-slate-600 mt-2 pt-3 flex justify-between items-center">
              <span class="font-bold text-base">Net Payable</span>
              <span class="font-bold text-yellow-400 text-xl">${fmt(cv.net)}</span>
            </div>
          </div>
          <div class="mt-4 pt-4 border-t border-slate-700 text-sm space-y-1">
            <div class="flex justify-between text-slate-400"><span>Opening retention</span><span>${fmt(retBal)}</span></div>
            <div class="flex justify-between text-slate-400"><span>+ This week</span><span>+${fmt(cv.ret)}</span></div>
            <div class="flex items-center justify-between text-slate-400">
              <span>- Release to consultant</span>
              <div class="flex items-center gap-2">
                <span class="text-slate-500">$</span>
                <input type="number" id="retpayout" value="${cv.payout||0}" min="0" step="0.01" class="inp w-24 text-sm py-1" onchange="updateRetPayout(this.value)">
              </div>
            </div>
            <div class="flex justify-between font-medium"><span>Closing balance</span>
              <span id="retclose" class="${(cv.retAfter-(cv.payout||0))>=s.retention_cap?'text-green-400':'text-yellow-400'}">${fmt(cv.retAfter-(cv.payout||0))} ${(cv.retAfter-(cv.payout||0))>=s.retention_cap?'✓ CAPPED':'/ '+fmt(s.retention_cap)}</span>
            </div>
          </div>
        </div>
      </div>`;
  }

  window.updateRetPayout=async(val)=>{
    const payout=+val||0;
    // Store as a special bonus entry (upsert by description marker)
    const existing=(bonuses||[]).find(b=>b.description==='__RETENTION_PAYOUT__');
    if(existing){
      if(payout===0){await sb.from('commission_bonuses').delete().eq('id',existing.id);bonuses.splice(bonuses.indexOf(existing),1);}
      else{await sb.from('commission_bonuses').update({amount:payout}).eq('id',existing.id);existing.amount=payout;}
    }else if(payout>0){
      const{data,error}=await sb.from('commission_bonuses').insert({pay_run_id:runId,consultant_id:consId,description:'__RETENTION_PAYOUT__',amount:payout}).select().single();
      if(!error)(bonuses||(bonuses=[])).push(data);
    }
    render();
  };
  window.delSale=async id=>{if(!confirm('Delete this sale?'))return;const{error}=await sb.from('commission_sales').delete().eq('id',id);if(error){err(error);return;}const i=sales.findIndex(s=>s.id===id);if(i>-1)sales.splice(i,1);render();toast('Sale removed');};
  window.delBonus=async id=>{const{error}=await sb.from('commission_bonuses').delete().eq('id',id);if(error){err(error);return;}const i=(bonuses||[]).findIndex(b=>b.id===id);if(i>-1)bonuses.splice(i,1);render();toast('Bonus removed');};
  window.delDed=async id=>{const{error}=await sb.from('commission_deductions').delete().eq('id',id);if(error){err(error);return;}const i=(deds||[]).findIndex(d=>d.id===id);if(i>-1)deds.splice(i,1);render();toast('Deduction removed');};

  window.addSaleModal=weekEnd=>{
    const prods=products.filter(p=>p.active);
    let items=[{pid:'',qty:1}];
    const drawItems=()=>$('mitems').innerHTML=items.map((it,i)=>`
      <div class="flex gap-2 mb-2">
        <select class="inp flex-1" onchange="items[${i}].pid=this.value">
          <option value="">Select product</option>
          ${prods.map(p=>`<option value="${p.id}" ${it.pid===p.id?'selected':''}>${p.name}</option>`).join('')}
        </select>
        <input type="number" min="1" value="${it.qty}" class="inp w-16 text-center" onchange="items[${i}].qty=+this.value">
        ${items.length>1?`<button onclick="items.splice(${i},1);drawItems()" class="text-slate-500 hover:text-red-400 flex-shrink-0">✕</button>`:''}
      </div>`).join('');
    openMod(`<h3 class="font-semibold text-white mb-4">Add Sale</h3>
      <label class="text-xs text-slate-400 block mb-1">Sale Date</label>
      <input type="date" id="mdate" value="${weekEnd||''}" class="inp mb-3">
      <label class="text-xs text-slate-400 block mb-1">Customer Name</label>
      <input type="text" id="mcust" placeholder="Customer surname" class="inp mb-3">
      <label class="text-xs text-slate-400 block mb-2">Products</label>
      <div id="mitems"></div>
      <button onclick="items.push({pid:'',qty:1});drawItems()" class="text-yellow-400 text-xs mt-1 hover:text-yellow-300">+ Add another product</button>
      <div class="flex gap-3 mt-4">
        <button class="btn gold flex-1" onclick="saveSale()">Save Sale</button>
        <button class="btn dark flex-1" onclick="closeMod()">Cancel</button>
      </div>`);
    window.items=items;window.drawItems=drawItems;drawItems();
    window.saveSale=async()=>{
      const date=$('mdate')?.value,cust=$('mcust')?.value?.trim();
      if(!date||!cust){toast('Please fill in date and customer name',false);return;}
      const{data:sale,error}=await sb.from('commission_sales').insert({pay_run_id:runId,consultant_id:consId,sale_date:date,customer_name:cust}).select().single();
      if(error){err(error);return;}
      const validItems=window.items.filter(i=>i.pid);
      if(validItems.length){
        const inserts=validItems.map(it=>({sale_id:sale.id,product_id:it.pid,quantity:it.qty}));
        const{data:si,error:sie}=await sb.from('commission_sale_items').insert(inserts).select('id,quantity,product_id,commission_products(*)');
        if(sie){err(sie);return;}
        sales.push({...sale,items:(si||[]).map(i=>({...i,product:i.commission_products}))});
      }else{sales.push({...sale,items:[]});}
      closeMod();render();toast('Sale added');
    };
  };

  window.addBonusModal=()=>{
    openMod(`<h3 class="font-semibold text-white mb-4">Add Bonus</h3>
      <label class="text-xs text-slate-400 block mb-1">Description</label>
      <input type="text" id="mdesc" placeholder="e.g. Performance bonus" class="inp mb-3">
      <label class="text-xs text-slate-400 block mb-1">Amount ($)</label>
      <input type="number" id="mamt" min="0" step="0.01" class="inp mb-4">
      <div class="flex gap-3">
        <button class="btn gold flex-1" onclick="saveBonus()">Save</button>
        <button class="btn dark flex-1" onclick="closeMod()">Cancel</button>
      </div>`);
    window.saveBonus=async()=>{
      const desc=$('mdesc')?.value?.trim(),amt=+$('mamt')?.value;
      if(!desc||!amt){toast('Please fill in all fields',false);return;}
      const{data,error}=await sb.from('commission_bonuses').insert({pay_run_id:runId,consultant_id:consId,description:desc,amount:amt}).select().single();
      if(error){err(error);return;}
      (bonuses||(bonuses=[])).push(data);closeMod();render();toast('Bonus added');
    };
  };

  window.addDedModal=()=>{
    const pc=S().pillow_charge;
    openMod(`<h3 class="font-semibold text-white mb-4">Add Deduction</h3>
      <label class="text-xs text-slate-400 block mb-1">Type</label>
      <select id="mtype" class="inp mb-3" onchange="updDed()">
        <option value="pillow">Pillow / Giveaway</option>
        <option value="advance">Advance Repayment</option>
        <option value="giveaway">Product Giveaway</option>
        <option value="retainer">Retainer</option>
        <option value="other">Other</option>
      </select>
      <div id="mqtyrow">
        <label class="text-xs text-slate-400 block mb-1">Quantity</label>
        <input type="number" id="mqty" value="1" min="1" class="inp w-24 mb-3" oninput="updDed()">
      </div>
      <label class="text-xs text-slate-400 block mb-1">Description</label>
      <input type="text" id="mdesc" placeholder="Optional details" class="inp mb-3">
      <label class="text-xs text-slate-400 block mb-1">Amount ($)</label>
      <input type="number" id="mamt" value="${pc}" min="0" step="0.01" class="inp mb-4">
      <div class="flex gap-3">
        <button class="btn gold flex-1" onclick="saveDed()">Save</button>
        <button class="btn dark flex-1" onclick="closeMod()">Cancel</button>
      </div>`);
    window.updDed=()=>{
      const t=$('mtype')?.value,q=+$('mqty')?.value||1;
      $('mqtyrow').style.display=t==='pillow'?'':'none';
      if(t==='pillow')$('mamt').value=(q*pc).toFixed(2);
    };
    window.saveDed=async()=>{
      const amt=+$('mamt')?.value;if(!amt){toast('Please enter an amount',false);return;}
      const{data,error}=await sb.from('commission_deductions').insert({
        pay_run_id:runId,consultant_id:consId,
        deduction_type:$('mtype').value,
        description:$('mdesc')?.value?.trim()||null,
        quantity:+$('mqty')?.value||1,amount:amt
      }).select().single();
      if(error){err(error);return;}
      (deds||(deds=[])).push(data);closeMod();render();toast('Deduction added');
    };
  };

  render();
}

    window.setTab=t=>{tab=t;render();};

    if(tab==='consultants'){
      const{data:retData}=await sb.from('commission_retention').select('*');
      const retMap={};(retData||[]).forEach(x=>retMap[x.consultant_id]=+x.balance||0);
      $('tabc').innerHTML=`
        <div class="flex gap-3 mb-4">
          <input type="text" id="newcons" placeholder="Consultant full name" class="inp flex-1" onkeydown="if(event.key==='Enter')addCons()">
          <button class="btn gold px-4" onclick="addCons()">Add</button>
        </div>
        <div class="card divide-y divide-slate-700">
          ${!consultants.length?'<p class="text-slate-500 text-sm text-center py-4">No consultants yet</p>':
            consultants.map(c=>`<div class="py-4">
              <div class="flex items-center justify-between mb-2">
                <span class="text-sm font-medium ${c.active?'text-white':'text-slate-500 line-through'}">${c.name}</span>
                <button onclick="togCons('${c.id}',${c.active})" class="text-xs px-2.5 py-1 rounded-full bg-slate-700 text-slate-400 hover:text-${c.active?'red':'green'}-400">
                  ${c.active?'Deactivate':'Reactivate'}
                </button>
              </div>
              <div class="flex items-center gap-3">
                <span class="text-xs text-slate-500">Opening retention balance:</span>
                <div class="flex items-center gap-1"><span class="text-slate-500 text-xs">$</span>
                  <input type="number" id="ret_${c.id}" value="${retMap[c.id]||0}" min="0" step="0.01" class="inp w-28 text-sm py-1">
                </div>
                <button onclick="saveRetBal('${c.id}')" class="btn dark text-xs py-1 px-3">Update</button>
                <span id="retmsg_${c.id}" class="text-xs text-green-400 hidden">Saved</span>
              </div>
            </div>`).join('')}
        </div>`;

      window.addCons=async()=>{
        const inp=$('newcons');
        const v=inp?.value?.trim();if(!v)return;
        inp.disabled=true;
        const{error}=await sb.from('commission_consultants').insert({name:v});
        inp.disabled=false;
        if(error){err(error);return;}
        inp.value='';toast(`${v} added`);await render();
      };
      window.togCons=async(id,active)=>{
        const{error}=await sb.from('commission_consultants').update({active:!active}).eq('id',id);
        if(error){err(error);return;}
        await render();
      };
      window.saveRetBal=async(id)=>{
        const val=+($('ret_'+id)?.value||0);
        const{error}=await sb.from('commission_retention').upsert({consultant_id:id,balance:val,updated_at:new Date().toISOString()},{onConflict:'consultant_id'});
        if(error){err(error);return;}
        const msg=$('retmsg_'+id);if(msg){msg.classList.remove('hidden');setTimeout(()=>msg.classList.add('hidden'),2000);}
      };
    }else{
      $('tabc').innerHTML=`<div class="card">
        <div class="grid grid-cols-4 px-1 py-2 text-xs text-slate-500 font-medium uppercase">
          <span>Product</span><span>Type</span><span>Fixed $</span><span>Cash Bonus</span>
        </div>
        ${products.map(p=>`<div class="grid grid-cols-4 px-1 py-3 text-sm items-center border-t border-slate-700">
          <span class="${p.active?'text-white':'text-slate-500'}">${p.name}</span>
          <span class="capitalize text-slate-400">${p.commission_type}</span>
          <span class="text-slate-400">${p.commission_type==='fixed'?fmt(p.fixed_amount):'—'}</span>
          <span class="${p.cash_bonus_eligible?'text-green-400':'text-slate-600'}">${p.cash_bonus_eligible?'Yes':'No'}</span>
        </div>`).join('')}
      </div>`;
    }
  }
  await render();
}


// ── Customer History & Cancellations ──────────────────────────────────────
async function showCustomers(){
  $('app').innerHTML='<div class="p-8 text-slate-500 text-center">Loading…</div>';
  const active=consultants.filter(c=>c.active);
  const selCons=active.find(c=>c.id===window._custConsId)||active[0];

  async function render(consId){
    window._custConsId=consId;
    const con=active.find(c=>c.id===consId);
    const{data:sales}=await sb.from('commission_sales')
      .select('*,commission_sale_items(quantity,commission_products(name))')
      .eq('consultant_id',consId)
      .order('sale_date',{ascending:false});

    const activeSales=(sales||[]).filter(s=>s.status!=='cancelled');
    const cancelledSales=(sales||[]).filter(s=>s.status==='cancelled');

    $('app').innerHTML=`
      <div class="p-8 max-w-5xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">Customer History</h1>
        <div class="flex gap-3 mb-6 flex-wrap">
          ${active.map(c=>`<button onclick="window._custConsId='${c.id}';renderCustList('${c.id}')"
            class="btn ${c.id===consId?'gold':'dark'} text-sm">${c.name}</button>`).join('')}
        </div>
        <div id="custlist"></div>
      </div>`;

    window.renderCustList=async(cid)=>{
      const con2=active.find(c=>c.id===cid);
      const{data:s2}=await sb.from('commission_sales')
        .select('*,commission_sale_items(quantity,commission_products(name))')
        .eq('consultant_id',cid).order('sale_date',{ascending:false});
      const act=(s2||[]).filter(s=>s.status!=='cancelled');
      const can=(s2||[]).filter(s=>s.status==='cancelled');
      window._custConsId=cid;
      // re-render buttons
      document.querySelectorAll('.btn').forEach(b=>{
        if(active.find(c=>c.name===b.textContent)){
          b.className=`btn ${active.find(c=>c.name===b.textContent)?.id===cid?'gold':'dark'} text-sm`;
        }
      });
      renderTable(act,can,cid);
    };

    renderTable(activeSales,cancelledSales,consId);
  }

  function renderTable(activeSales,cancelledSales,consId){
    const tbl=$('custlist');if(!tbl)return;
    const prodStr=sale=>((sale.commission_sale_items||[]).map(i=>`${i.commission_products?.name||''}${i.quantity>1?` ×${i.quantity}`:''}`).join(', '))||'—';
    tbl.innerHTML=`
      <div class="card mb-4">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-semibold text-sm uppercase tracking-wide">Active Customers <span class="text-slate-500 font-normal">(${activeSales.length})</span></h3>
        </div>
        ${!activeSales.length?'<p class="text-slate-500 text-sm text-center py-4">No active sales</p>':`
        <div class="overflow-x-auto"><table class="w-full text-sm">
          <thead><tr class="text-slate-500 text-xs">
            <th class="text-left pb-2">Date</th><th class="text-left pb-2">Customer</th>
            <th class="text-left pb-2">Products</th><th class="text-right pb-2">Commission</th><th class="pb-2 w-24"></th>
          </tr></thead>
          <tbody class="divide-y divide-slate-700/50">
            ${activeSales.map(s=>`<tr>
              <td class="py-2 pr-3 text-slate-400 whitespace-nowrap">${fmtD(s.sale_date)}</td>
              <td class="py-2 pr-3 font-medium">${s.customer_name}</td>
              <td class="py-2 pr-3 text-slate-400 text-xs">${prodStr(s)}</td>
              <td class="py-2 text-right text-yellow-400">${fmt(s.commission_paid)}</td>
              <td class="py-2 pl-2"><button onclick="showCancelModal('${s.id}','${s.customer_name.replace(/'/g,"\'")}',${s.commission_paid||0},'${consId}')"
                class="text-xs px-2 py-1 rounded bg-red-900/40 text-red-400 hover:bg-red-900 whitespace-nowrap">Mark Cancelled</button></td>
            </tr>`).join('')}
          </tbody>
        </table></div>`}
      </div>
      ${cancelledSales.length?`
      <div class="card">
        <h3 class="font-semibold text-sm uppercase tracking-wide mb-3 text-slate-500">Cancelled <span class="font-normal">(${cancelledSales.length})</span></h3>
        <div class="overflow-x-auto"><table class="w-full text-sm">
          <thead><tr class="text-slate-500 text-xs">
            <th class="text-left pb-2">Sale Date</th><th class="text-left pb-2">Customer</th>
            <th class="text-left pb-2">Products</th><th class="text-right pb-2">Clawback</th><th class="text-left pb-2 pl-3">Notes</th>
          </tr></thead>
          <tbody class="divide-y divide-slate-700/50">
            ${cancelledSales.map(s=>`<tr class="opacity-60">
              <td class="py-2 pr-3 text-slate-400 whitespace-nowrap">${fmtD(s.sale_date)}</td>
              <td class="py-2 pr-3 line-through text-slate-400">${s.customer_name}</td>
              <td class="py-2 pr-3 text-slate-500 text-xs">${prodStr(s)}</td>
              <td class="py-2 text-right text-red-400">-${fmt(s.commission_paid)}</td>
              <td class="py-2 pl-3 text-slate-500 text-xs">${s.cancellation_notes||''}</td>
            </tr>`).join('')}
          </tbody>
        </table></div>
      </div>`:''}`;
  }

  if(selCons) await render(selCons.id);
  else $('app').innerHTML='<div class="p-8 text-slate-500 text-center">No active consultants.</div>';
}

function showCancelModal(saleId,customerName,commissionPaid,consId){
  openMod(`<h3 class="font-semibold text-white mb-2">Mark as Cancelled</h3>
    <p class="text-slate-400 text-sm mb-4">This will deduct the original commission from the retention account.</p>
    <div class="bg-slate-900 rounded-lg p-4 mb-4 space-y-2 text-sm">
      <div class="flex justify-between"><span class="text-slate-400">Customer</span><span class="font-medium">${customerName}</span></div>
      <div class="flex justify-between"><span class="text-slate-400">Commission to claw back</span><span class="text-red-400 font-semibold">-${fmt(commissionPaid)}</span></div>
    </div>
    <label class="text-xs text-slate-400 block mb-1">Cancellation notes (optional)</label>
    <input type="text" id="mnotes" placeholder="e.g. Poor payment history" class="inp mb-4">
    <div class="flex gap-3">
      <button class="btn gold flex-1" onclick="confirmCancel('${saleId}',${commissionPaid},'${consId}')">Confirm Cancellation</button>
      <button class="btn dark flex-1" onclick="closeMod()">Back</button>
    </div>`);
}

window.confirmCancel=async(saleId,commissionPaid,consId)=>{
  const notes=$('mnotes')?.value?.trim()||null;
  // 1. Mark sale cancelled
  const{error:e1}=await sb.from('commission_sales').update({
    status:'cancelled',
    cancelled_date:new Date().toISOString().split('T')[0],
    cancellation_notes:notes
  }).eq('id',saleId);
  if(e1){err(e1);return;}

  // 2. Get current retention balance
  const{data:ret}=await sb.from('commission_retention').select('*').eq('consultant_id',consId).maybeSingle();
  const currentBal=+ret?.balance||0;
  const newBal=Math.max(0,currentBal-commissionPaid);

  // 3. Update retention balance
  await sb.from('commission_retention').upsert({
    consultant_id:consId,balance:newBal,updated_at:new Date().toISOString()
  },{onConflict:'consultant_id'});

  // 4. Log adjustment
  await sb.from('commission_retention_adjustments').insert({
    consultant_id:consId,
    amount:-commissionPaid,
    reason:'cancellation_clawback',
    sale_id:saleId,
    notes:`Cancellation clawback${notes?' — '+notes:''}`
  });

  closeMod();
  toast(`Cancellation recorded. Retention reduced by ${fmt(commissionPaid)}.`);
  // Refresh customer list
  if(window._custConsId) window.renderCustList(window._custConsId);
};

// ── Weekly Import from Spreadsheet ────────────────────────────────────────
function showImportModal(runId,weekEnding){
  openMod(`<h3 class="font-semibold text-white mb-2">Import Sales from Spreadsheet</h3>
    <p class="text-slate-400 text-sm mb-4">Upload your NZ_Sales.xlsx file. The system will import all sales for week ending <strong>${fmtD(weekEnding)}</strong> (sales dated within that Mon–Sun).</p>
    <label class="text-xs text-slate-400 block mb-1">Select spreadsheet file</label>
    <input type="file" id="mfile" accept=".xlsx,.xls" class="inp mb-4">
    <div id="mimport-status" class="text-sm text-slate-400 mb-4 hidden"></div>
    <div class="flex gap-3">
      <button class="btn gold flex-1" onclick="runImport('${runId}','${weekEnding}')">Import</button>
      <button class="btn dark flex-1" onclick="closeMod()">Cancel</button>
    </div>`);
}

window.runImport=async(runId,weekEnding)=>{
  const file=$('mfile')?.files?.[0];
  if(!file){toast('Please select a file',false);return;}
  const status=$('mimport-status');
  status.textContent='Reading file…';status.classList.remove('hidden');

  try{
    const data=await file.arrayBuffer();
    const wb=XLSX.read(data,{type:'array',cellDates:true});
    const ws=wb.Sheets['Customers'];
    if(!ws){toast('Could not find "Customers" sheet in file',false);return;}
    const rows=XLSX.utils.sheet_to_json(ws,{raw:false,dateNF:'yyyy-mm-dd'});

    // Determine week Mon-Sun
    const wkEnd=new Date(weekEnding+'T12:00:00');
    const wkStart=new Date(wkEnd);wkStart.setDate(wkStart.getDate()-6);

    const PROD_MAP={
      'M1KS':'Mk I King Single','M1Q':'Mk I Queen','M1SK':'Mk I Super King',
      'MK2 KS':'Mk II King Single','M2Q':'Mk II Queen','M2SK':'Mk II Super King',
      'M3KS':'Mk III King Single','M3Q':'Mk III Queen','M3SK':'Mk III Super King',
      'M3CK':'Mk III California King',
    };
    const ACTIVE_NAMES=new Set(consultants.filter(c=>c.active).map(c=>c.name));

    // Robust sale-date parser → returns a local-noon Date, or null if unreadable
    const parseSaleDate=v=>{
      if(v instanceof Date)return isNaN(v)?null:new Date(v.getFullYear(),v.getMonth(),v.getDate(),12);
      if(typeof v==='number'&&XLSX.SSF){const d=XLSX.SSF.parse_date_code(v);if(d)return new Date(d.y,d.m-1,d.d,12);}
      const s=String(v||'').trim();if(!s)return null;
      let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);            // yyyy-mm-dd
      if(m)return new Date(+m[1],+m[2]-1,+m[3],12);
      m=s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})/);        // dd/mm/yyyy (NZ)
      if(m)return new Date(+m[3],+m[2]-1,+m[1],12);
      const d=new Date(s);return isNaN(d)?null:d;
    };

    let imported=0,skipped=0;
    for(const row of rows){
      if(row['Cancelled Date'])continue;
      const cons=String(row['Sleep Consultant']||'').trim();
      if(!ACTIVE_NAMES.has(cons)){skipped++;continue;}

      const saleDate=parseSaleDate(row['Sale Date']);
      if(!saleDate){skipped++;continue;}
      if(saleDate<wkStart||saleDate>wkEnd){skipped++;continue;}
      const saleDateStr=`${saleDate.getFullYear()}-${String(saleDate.getMonth()+1).padStart(2,'0')}-${String(saleDate.getDate()).padStart(2,'0')}`;

      const prods=[];
      for(const[col,pname] of Object.entries(PROD_MAP)){
        const qty=parseInt(row[col])||0;
        if(qty>0)prods.push({name:pname,qty});
      }
      if(!prods.length){skipped++;continue;}

      const surname=String(row['Surname']||'').trim();
      const firstname=String(row['First Name']||'').trim();
      const customer=[surname,firstname].filter(Boolean).join(', ');
      const commission=parseFloat(row['C1 Amount'])||0;
      const consObj=consultants.find(c=>c.name===cons);
      if(!consObj){skipped++;continue;}

      // Insert sale
      const{data:sale,error:se}=await sb.from('commission_sales').insert({
        pay_run_id:runId,consultant_id:consObj.id,
        sale_date:saleDateStr,customer_name:customer,
        commission_paid:commission,status:'active',is_historical:false
      }).select().single();
      if(se){console.error(se);skipped++;continue;}

      // Insert items
      for(const p of prods){
        const prod=products.find(x=>x.name===p.name);
        if(prod)await sb.from('commission_sale_items').insert({sale_id:sale.id,product_id:prod.id,quantity:p.qty});
      }
      imported++;
      status.textContent=`Importing… ${imported} done`;
    }
    status.textContent=`Done! ${imported} sales imported, ${skipped} skipped.`;
    toast(`Imported ${imported} sales`);
    setTimeout(()=>{closeMod();go('run',runId);},1500);
  }catch(e){err(e);}
};
